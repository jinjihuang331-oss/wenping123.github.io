<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捕虫游戏原型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #2d2d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
        }

        #gameCanvas {
            border: 4px solid #444;
            image-rendering: pixelated;
            background-color: #7cba3f;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            text-shadow: 2px 2px 0 #000;
            font-size: 16px;
        }

        #bugCounter {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            border: 2px solid #ff6b35;
        }

        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
        }

        #dialog {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            border: 3px solid #ff6b35;
            max-width: 400px;
            display: none;
            text-align: center;
        }

        #dialog.show {
            display: block;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="ui">
            <div id="bugCounter">🐛 捕虫数量: <span id="bugCount">0</span></div>
        </div>

        <div id="controls">
            <strong>操作说明:</strong><br>
            WASD/方向键: 移动<br>
            E: 与NPC互动<br>
            空格: 使用捕虫网
        </div>

        <div id="dialog">
            <div id="dialogText"></div>
            <div style="margin-top: 10px; font-size: 12px; color: #aaa;">按任意键继续</div>
        </div>
    </div>

    <script>
        // 游戏常量
        const TILE_SIZE = 32;
        const PLAYER_WIDTH = 28;
        const PLAYER_HEIGHT = 32;
        const BUG_SIZE = 16;
        const NPC_WIDTH = 32;
        const NPC_HEIGHT = 36;

        // Canvas设置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        // 游戏状态
        const gameState = {
            bugCount: 0,
            dialogOpen: false,
            currentDialog: null
        };

        // 输入处理
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;

            if (gameState.dialogOpen) {
                closeDialog();
                e.preventDefault();
                return;
            }

            if (e.key.toLowerCase() === 'e') {
                handleInteraction();
            }

            if (e.key === ' ') {
                handleBugCatch();
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // 玩家类
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = PLAYER_WIDTH;
                this.height = PLAYER_HEIGHT;
                this.speed = 3;
                this.direction = 'down'; // up, down, left, right
                this.isMoving = false;
                this.animationFrame = 0;
                this.animationTimer = 0;
                this.animationSpeed = 8; // 帧间隔
            }

            update() {
                let moving = false;
                let newX = this.x;
                let newY = this.y;

                if (keys['w'] || keys['arrowup']) {
                    newY -= this.speed;
                    this.direction = 'up';
                    moving = true;
                }
                if (keys['s'] || keys['arrowdown']) {
                    newY += this.speed;
                    this.direction = 'down';
                    moving = true;
                }
                if (keys['a'] || keys['arrowleft']) {
                    newX -= this.speed;
                    this.direction = 'left';
                    moving = true;
                }
                if (keys['d'] || keys['arrowright']) {
                    newX += this.speed;
                    this.direction = 'right';
                    moving = true;
                }

                // 碰撞检测
                if (moving && !checkCollision(newX, newY, this.width, this.height)) {
                    this.x = newX;
                    this.y = newY;
                    this.isMoving = true;
                } else {
                    this.isMoving = false;
                }

                // 动画更新
                if (this.isMoving) {
                    this.animationTimer++;
                    if (this.animationTimer >= this.animationSpeed) {
                        this.animationTimer = 0;
                        this.animationFrame = (this.animationFrame + 1) % 4;
                    }
                } else {
                    this.animationFrame = 0;
                }

                // 边界检查
                this.x = Math.max(0, Math.min(canvas.width - this.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height - this.height, this.y));
            }

            draw() {
                ctx.save();

                // 根据方向绘制不同颜色的像素人
                const colors = {
                    'down': '#4a90d9',
                    'up': '#3d7bc4',
                    'left': '#2d6bb3',
                    'right': '#5a9fe8'
                };

                const baseColor = colors[this.direction];
                const frameOffset = this.animationFrame * 2;

                // 身体
                ctx.fillStyle = baseColor;
                ctx.fillRect(this.x + 6, this.y + 12, 16, 14);

                // 头部
                ctx.fillStyle = '#ffd5b5';
                ctx.fillRect(this.x + 8, this.y + 2, 12, 12);

                // 眼睛（根据方向变化）
                ctx.fillStyle = '#000';
                if (this.direction === 'down') {
                    ctx.fillRect(this.x + 10, this.y + 6, 2, 2);
                    ctx.fillRect(this.x + 16, this.y + 6, 2, 2);
                } else if (this.direction === 'up') {
                    // 背面不画眼睛
                } else if (this.direction === 'left') {
                    ctx.fillRect(this.x + 9, this.y + 6, 2, 2);
                } else if (this.direction === 'right') {
                    ctx.fillRect(this.x + 17, this.y + 6, 2, 2);
                }

                // 腿部动画
                ctx.fillStyle = '#2d5a87';
                if (this.isMoving) {
                    const legOffset = Math.sin(this.animationFrame * Math.PI / 2) * 3;
                    ctx.fillRect(this.x + 8, this.y + 26 + legOffset, 4, 6);
                    ctx.fillRect(this.x + 16, this.y + 26 - legOffset, 4, 6);
                } else {
                    ctx.fillRect(this.x + 8, this.y + 26, 4, 6);
                    ctx.fillRect(this.x + 16, this.y + 26, 4, 6);
                }

                // 手臂动画
                ctx.fillStyle = '#ffd5b5';
                if (this.isMoving) {
                    const armOffset = Math.cos(this.animationFrame * Math.PI / 2) * 2;
                    ctx.fillRect(this.x + 2, this.y + 14 + armOffset, 4, 8);
                    ctx.fillRect(this.x + 22, this.y + 14 - armOffset, 4, 8);
                } else {
                    ctx.fillRect(this.x + 2, this.y + 14, 4, 8);
                    ctx.fillRect(this.x + 22, this.y + 14, 4, 8);
                }

                ctx.restore();
            }
        }

        // NPC类
        class NPC {
            constructor(x, y, name, dialogue, color) {
                this.x = x;
                this.y = y;
                this.width = NPC_WIDTH;
                this.height = NPC_HEIGHT;
                this.name = name;
                this.dialogue = dialogue;
                this.color = color;
                this.animationFrame = 0;
                this.animationTimer = 0;
            }

            update() {
                this.animationTimer++;
                if (this.animationTimer >= 15) {
                    this.animationTimer = 0;
                    this.animationFrame = (this.animationFrame + 1) % 2;
                }
            }

            draw() {
                ctx.save();

                // 身体
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x + 4, this.y + 12, 24, 16);

                // 头部
                ctx.fillStyle = '#ffd5b5';
                ctx.fillRect(this.x + 6, this.y + 2, 20, 12);

                // 眼睛
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 10, this.y + 6, 3, 3);
                ctx.fillRect(this.x + 19, this.y + 6, 3, 3);

                // 嘴巴（轻微动画）
                ctx.fillStyle = '#d46a6a';
                if (this.animationFrame === 0) {
                    ctx.fillRect(this.x + 14, this.y + 10, 4, 2);
                } else {
                    ctx.fillRect(this.x + 13, this.y + 10, 6, 3);
                }

                // 腿
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(this.x + 8, this.y + 28, 6, 8);
                ctx.fillRect(this.x + 18, this.y + 28, 6, 8);

                // 手臂
                ctx.fillStyle = '#ffd5b5';
                ctx.fillRect(this.x, this.y + 14, 4, 10);
                ctx.fillRect(this.x + 28, this.y + 14, 4, 10);

                ctx.restore();
            }
        }

        // 虫子类
        class Bug {
            constructor() {
                this.respawn();
            }

            respawn() {
                this.x = Math.random() * (canvas.width - BUG_SIZE);
                this.y = Math.random() * (canvas.height - BUG_SIZE);
                this.width = BUG_SIZE;
                this.height = BUG_SIZE;
                this.direction = Math.random() * Math.PI * 2;
                this.speed = 0.5 + Math.random() * 0.5;
                this.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
                this.alive = true;
                this.moveTimer = 0;
                this.moveInterval = 60 + Math.random() * 120;
            }

            update() {
                if (!this.alive) return;

                this.moveTimer++;
                if (this.moveTimer >= this.moveInterval) {
                    this.moveTimer = 0;
                    this.direction = Math.random() * Math.PI * 2;
                }

                this.x += Math.cos(this.direction) * this.speed;
                this.y += Math.sin(this.direction) * this.speed;

                // 边界检查
                if (this.x < 0 || this.x > canvas.width - BUG_SIZE) {
                    this.direction = Math.PI - this.direction;
                    this.x = Math.max(0, Math.min(canvas.width - BUG_SIZE, this.x));
                }
                if (this.y < 0 || this.y > canvas.height - BUG_SIZE) {
                    this.direction = -this.direction;
                    this.y = Math.max(0, Math.min(canvas.height - BUG_SIZE, this.y));
                }
            }

            draw() {
                if (!this.alive) return;

                ctx.save();

                // 身体
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.ellipse(this.x + BUG_SIZE/2, this.y + BUG_SIZE/2, BUG_SIZE/2, BUG_SIZE/3, 0, 0, Math.PI * 2);
                ctx.fill();

                // 头部
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x + BUG_SIZE/2 + Math.cos(this.direction) * 4, this.y + BUG_SIZE/2 + Math.sin(this.direction) * 4, 4, 0, Math.PI * 2);
                ctx.fill();

                // 眼睛
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + BUG_SIZE/2 + Math.cos(this.direction) * 5 - 1, this.y + BUG_SIZE/2 + Math.sin(this.direction) * 5 - 1, 2, 2);

                // 腿
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                for (let i = 0; i < 3; i++) {
                    const angle = this.direction + (i - 1) * 0.5;
                    ctx.beginPath();
                    ctx.moveTo(this.x + BUG_SIZE/2, this.y + BUG_SIZE/2);
                    ctx.lineTo(this.x + BUG_SIZE/2 + Math.cos(angle) * 8, this.y + BUG_SIZE/2 + Math.sin(this.direction) * 8 + Math.sin(angle) * 4);
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        // 障碍物类
        class Obstacle {
            constructor(x, y, width, height, color) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.color = color;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);

                // 添加一些纹理
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 2;
                for (let i = 0; i < this.width; i += 8) {
                    ctx.beginPath();
                    ctx.moveTo(this.x + i, this.y);
                    ctx.lineTo(this.x + i, this.y + this.height);
                    ctx.stroke();
                }
                for (let i = 0; i < this.height; i += 8) {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y + i);
                    ctx.lineTo(this.x + this.width, this.y + i);
                    ctx.stroke();
                }
            }
        }

        // 游戏对象
        let player;
        let npcs = [];
        let bugs = [];
        let obstacles = [];

        // 初始化游戏
        function initGame() {
            player = new Player(100, 100);

            // 创建NPC
            npcs = [
                new NPC(300, 100, "村民A", ["你好，旅行者！", "这一带的虫子最近特别多。", "小心点，有些虫子会咬人！"], "#e74c3c"),
                new NPC(500, 200, "村民B", ["你需要捕虫网才能抓虫子。", "按空格键使用捕虫网。", "祝你捕虫愉快！"], "#27ae60"),
                new NPC(200, 400, "村民C", ["听说你是个捕虫高手？", "让我看看你的技术！", "多抓点虫子给我看看！"], "#9b59b6")
            ];

            // 创建虫子
            bugs = [];
            for (let i = 0; i < 8; i++) {
                bugs.push(new Bug());
            }

            // 创建障碍物
            obstacles = [
                new Obstacle(150, 250, 64, 64, "#8b4513"), // 树木
                new Obstacle(400, 350, 96, 48, "#654321"), // 石头
                new Obstacle(600, 150, 48, 96, "#2e7d32"),  // 树木
                new Obstacle(100, 480, 80, 40, "#5d4037"),  // 木头
                new Obstacle(650, 450, 60, 60, "#795548")   // 石头
            ];
        }

        // 碰撞检测
        function checkCollision(x, y, width, height) {
            // 边界检查
            if (x < 0 || y < 0 || x + width > canvas.width || y + height > canvas.height) {
                return true;
            }

            // 障碍物碰撞
            for (let obstacle of obstacles) {
                if (x < obstacle.x + obstacle.width &&
                    x + width > obstacle.x &&
                    y < obstacle.y + obstacle.height &&
                    y + height > obstacle.y) {
                    return true;
                }
            }

            return false;
        }

        // NPC互动
        function handleInteraction() {
            for (let npc of npcs) {
                const distance = Math.sqrt(
                    Math.pow(player.x + player.width/2 - (npc.x + npc.width/2), 2) +
                    Math.pow(player.y + player.height/2 - (npc.y + npc.height/2), 2)
                );

                if (distance < 60) {
                    showDialog(npc.dialogue[Math.floor(Math.random() * npc.dialogue.length)]);
                    return;
                }
            }
        }

        // 显示对话框
        function showDialog(text) {
            gameState.dialogOpen = true;
            document.getElementById('dialog').classList.add('show');
            document.getElementById('dialogText').textContent = text;
        }

        // 关闭对话框
        function closeDialog() {
            gameState.dialogOpen = false;
            document.getElementById('dialog').classList.remove('show');
        }

        // 捕虫机制
        function handleBugCatch() {
            const catchRange = 50;
            let caughtSomething = false;

            for (let bug of bugs) {
                if (!bug.alive) continue;

                const distance = Math.sqrt(
                    Math.pow(player.x + player.width/2 - (bug.x + BUG_SIZE/2), 2) +
                    Math.pow(player.y + player.height/2 - (bug.y + BUG_SIZE/2), 2)
                );

                if (distance < catchRange) {
                    bug.alive = false;
                    caughtSomething = true;

                    // 延迟重生
                    setTimeout(() => {
                        bug.respawn();
                    }, 5000 + Math.random() * 5000);
                }
            }

            if (caughtSomething) {
                gameState.bugCount++;
                updateBugCounter();

                // 显示捕捉效果
                showCatchEffect();
            }
        }

        // 更新捕虫计数器
        function updateBugCounter() {
            document.getElementById('bugCount').textContent = gameState.bugCount;
        }

        // 捕捉效果
        function showCatchEffect() {
            const centerX = player.x + player.width/2;
            const centerY = player.y + player.height/2;

            ctx.save();
            ctx.strokeStyle = '#ff6b35';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 40, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        // 绘制捕虫网范围提示
        function drawCatchRange() {
            const centerX = player.x + player.width/2;
            const centerY = player.y + player.height/2;

            ctx.save();
            ctx.strokeStyle = 'rgba(255, 107, 53, 0.2)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        // 绘制背景
        function drawBackground() {
            // 草地背景
            ctx.fillStyle = '#7cba3f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 添加一些草的纹理
            ctx.fillStyle = '#6aa835';
            for (let x = 0; x < canvas.width; x += 16) {
                for (let y = 0; y < canvas.height; y += 16) {
                    if (Math.random() > 0.7) {
                        ctx.fillRect(x + Math.random() * 8, y + Math.random() * 8, 2, 6);
                    }
                }
            }
        }

        // 绘制互动提示
        function drawInteractionPrompts() {
            for (let npc of npcs) {
                const distance = Math.sqrt(
                    Math.pow(player.x + player.width/2 - (npc.x + npc.width/2), 2) +
                    Math.pow(player.y + player.height/2 - (npc.y + npc.height/2), 2)
                );

                if (distance < 60 && distance > 30) {
                    ctx.save();
                    ctx.fillStyle = '#fff';
                    ctx.font = '12px Courier New';
                    ctx.textAlign = 'center';
                    ctx.fillText('按E互动', npc.x + npc.width/2, npc.y - 10);
                    ctx.restore();
                }
            }
        }

        // 游戏主循环
        function gameLoop() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制背景
            drawBackground();

            // 更新和绘制障碍物
            for (let obstacle of obstacles) {
                obstacle.draw();
            }

            // 更新和绘制NPC
            for (let npc of npcs) {
                npc.update();
                npc.draw();
            }

            // 更新和绘制虫子
            for (let bug of bugs) {
                bug.update();
                bug.draw();
            }

            // 更新和绘制玩家
            if (!gameState.dialogOpen) {
                player.update();
            }
            player.draw();

            // 绘制捕虫网范围
            drawCatchRange();

            // 绘制互动提示
            drawInteractionPrompts();

            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        initGame();
        gameLoop();
    </script>
</body>
</html>
