<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黄金矿工</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e; overflow: hidden;
  font-family: 'Microsoft YaHei', sans-serif;
  display: flex; justify-content: center; align-items: center;
  height: 100vh; user-select: none;
}
#gameContainer { position: relative; }
canvas { display: block; border: 3px solid #8B4513; border-radius: 8px; }
/* 首页样式 */
#homeScreen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 15%, #8B4513 15%, #3d1f0d 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 10; border-radius: 8px;
}
#homeScreen h1 {
  font-size: 52px; color: #FFD700; text-shadow: 3px 3px 6px #000, 0 0 20px #FFA500;
  margin-bottom: 50px; letter-spacing: 8px;
}
#homeScreen .subtitle {
  font-size: 18px; color: #eee; margin-bottom: 40px;
}
.btn-group { display: flex; flex-direction: column; gap: 20px; align-items: center; }
.menu-btn {
  padding: 18px 60px; font-size: 24px; font-weight: bold;
  border: 3px solid #FFD700; border-radius: 12px;
  background: linear-gradient(180deg, #FFD700, #FFA500);
  color: #4a2800; cursor: pointer; transition: all 0.2s;
  letter-spacing: 4px;
}
.menu-btn:hover {
  transform: scale(1.08); box-shadow: 0 0 25px rgba(255,215,0,0.6);
}
.controls-info {
  margin-top: 40px; color: #ddd; font-size: 15px; text-align: center;
  line-height: 2;
}
.controls-info span { color: #FFD700; font-weight: bold; }
/* 胜利弹窗 */
#victoryOverlay {
  display: none; position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; z-index: 20;
  background: rgba(0,0,0,0.7); border-radius: 8px;
  flex-direction: column; align-items: center; justify-content: center;
}
#victoryOverlay .victory-text {
  font-size: 56px; color: #FFD700; text-shadow: 0 0 30px #FFA500, 3px 3px 0 #B8860B;
  animation: victoryPulse 0.8s ease-in-out infinite alternate;
  margin-bottom: 20px;
}
@keyframes victoryPulse {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}
#victoryOverlay .score-text {
  font-size: 28px; color: #fff; margin-bottom: 30px;
}
#victoryOverlay .restart-btn {
  padding: 14px 40px; font-size: 20px; font-weight: bold;
  border: 3px solid #FFD700; border-radius: 10px;
  background: linear-gradient(180deg, #FFD700, #FFA500);
  color: #4a2800; cursor: pointer; transition: all 0.2s;
}
#victoryOverlay .restart-btn:hover {
  transform: scale(1.08); box-shadow: 0 0 20px rgba(255,215,0,0.6);
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="900" height="650"></canvas>
  <div id="homeScreen">
    <h1>⛏️ 黄金矿工 ⛏️</h1>
    <div class="subtitle">目标：获得 800 分即可胜利！</div>
    <div class="btn-group">
      <button class="menu-btn" onclick="startGame('single')">🎮 单人模式</button>
      <button class="menu-btn" onclick="startGame('double')">👥 双人模式</button>
    </div>
    <div class="controls-info">
      <span>玩家A (单人/左):</span> S 键 下放钩子<br>
      <span>玩家B (双人/右):</span> ↓ 方向键 下放钩子
    </div>
  </div>
  <div id="victoryOverlay">
    <div class="victory-text">🎉 恭喜胜利！🎉</div>
    <div class="score-text" id="finalScore">最终得分: 0</div>
    <button class="restart-btn" onclick="backToHome()">返回首页</button>
  </div>
</div>

<script>
// ==================== 游戏配置 ====================
const CONFIG = {
  canvasW: 900, canvasH: 650,
  groundY: 100,       // 地表Y坐标
  hookSwingSpeed: 0.025, // 摆动速度(弧度/帧)
  hookSwingAngle: Math.PI * 0.42, // 摆动最大角度
  hookExtendSpeed: 8,  // 钩子伸出速度
  hookRetractBase: 12, // 基础收回速度
  winScore: 800,       // 胜利分数
  timeLimit: 60,       // 时间限制(秒)
};

// 物品配置：{ type, radius, value, weight, color, name }
const ITEM_TYPES = {
  diamond: { radius: 16, value: 800, weight: 1, color: '#00E5FF', name: '钻石', draw: drawDiamond },
  pig:      { radius: 22, value: 3,   weight: 1.5, color: '#FFB6C1', name: '小猪', draw: drawPig },
  goldS:   { radius: 20, value: 50,  weight: 3,  color: '#FFD700', name: '小金矿', draw: drawGold },
  goldM:   { radius: 30, value: 150, weight: 6,  color: '#FFD700', name: '中金矿', draw: drawGold },
  goldL:   { radius: 42, value: 300, weight: 12, color: '#FFD700', name: '大金矿', draw: drawGold },
  rockS:   { radius: 25, value: 15,  weight: 8,  color: '#808080', name: '小石头', draw: drawRock },
  rockM:   { radius: 38, value: 35,  weight: 16, color: '#808080', name: '中石头', draw: drawRock },
  rockL:   { radius: 52, value: 60,  weight: 28, color: '#808080', name: '大石头', draw: drawRock },
  bomb:     { radius: 18, value: 2,   weight: 1,  color: '#FF4444', name: '炸弹', draw: drawBomb },
};

// ==================== 全局变量 ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let gameMode = 'single';  // 'single' | 'double'
let gameRunning = false;
let gameTime = CONFIG.timeLimit;
let lastTime = 0;
let animationId = null;
let particles = [];  // 爆炸粒子
let victoryShown = false;

// 玩家数据
let players = [];

// ==================== 玩家类 ====================
class Player {
  constructor(id, hookX, isPlayerA) {
    this.id = id;
    this.hookX = hookX;
    this.isPlayerA = isPlayerA;
    this.angle = 0;              // 当前摆动角度 (0=竖直向下)
    this.swingDir = 1;           // 摆动方向 1/-1
    this.state = 'swing';        // swing | extend | retract
    this.hookLength = 0;         // 钩子当前长度
    this.maxHookLength = 550;    // 钩子最大长度
    this.score = 0;
    this.grabbedItem = null;     // 抓到的物品
    this.caughtItems = [];       // 已抓取的物品列表(用于渲染)
    this.retractSpeed = CONFIG.hookRetractBase;
    this.explosionTimer = 0;     // 爆炸计时器
  }

  update(dt) {
    if (this.state === 'swing') {
      this.angle += CONFIG.hookSwingSpeed * this.swingDir;
      if (Math.abs(this.angle) >= CONFIG.hookSwingAngle) {
        this.swingDir *= -1;
      }
    } else if (this.state === 'extend') {
      this.hookLength += CONFIG.hookExtendSpeed;
      // 检测碰撞
      let hit = this.checkCollision();
      if (hit) {
        this.grabbedItem = hit;
        this.state = 'retract';
        // 计算收回速度 (越重越慢)
        if (hit.type === 'bomb') {
          this.retractSpeed = CONFIG.hookRetractBase * 2.5; // 炸弹快速收回
          this.explosionTimer = 25; // 爆炸效果帧数
          createExplosion(hit.x, hit.y);
        } else {
          this.retractSpeed = CONFIG.hookRetractBase / (1 + hit.weight * 0.12);
        }
        // 从物品列表移除
        const idx = items.indexOf(hit);
        if (idx >= 0) items.splice(idx, 1);
      }
      // 超出范围则返回
      if (this.hookLength >= this.maxHookLength) {
        this.state = 'retract';
        this.retractSpeed = CONFIG.hookRetractBase;
      }
    } else if (this.state === 'retract') {
      this.hookLength -= this.retractSpeed;
      if (this.hookLength <= 0) {
        this.hookLength = 0;
        this.state = 'swing';
        if (this.grabbedItem) {
          if (this.grabbedItem.type !== 'bomb') {
            this.score += this.grabbedItem.value;
            this.caughtItems.push({ ...this.grabbedItem, time: 60 });
          }
        }
        this.grabbedItem = null;
        this.retractSpeed = CONFIG.hookRetractBase;
      }
    }
    // 更新已抓物品显示计时
    this.caughtItems = this.caughtItems.filter(item => {
      item.time--;
      return item.time > 0;
    });
    if (this.explosionTimer > 0) this.explosionTimer--;
  }

  checkCollision() {
    const hookTipX = this.hookX + Math.sin(this.angle) * this.hookLength;
    const hookTipY = CONFIG.groundY + Math.cos(this.angle) * this.hookLength;
    for (let item of items) {
      // 跳过其他玩家已抓的物品 (物品只在items列表中存在一次)
      const dx = hookTipX - item.x;
      const dy = hookTipY - item.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < item.radius + 8) {
        return item;
      }
    }
    return null;
  }

  getHookTip() {
    return {
      x: this.hookX + Math.sin(this.angle) * this.hookLength,
      y: CONFIG.groundY + Math.cos(this.angle) * this.hookLength,
    };
  }

  draw(ctx) {
    const tip = this.getHookTip();
    // 画钩子线
    ctx.beginPath();
    ctx.moveTo(this.hookX, CONFIG.groundY);
    ctx.lineTo(tip.x, tip.y);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 3;
    ctx.stroke();
    // 画钩子头
    ctx.save();
    ctx.translate(tip.x, tip.y);
    ctx.rotate(this.angle);
    // 钩子形状
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-8, 12);
    ctx.quadraticCurveTo(-12, 18, -5, 20);
    ctx.quadraticCurveTo(2, 18, 0, 12);
    ctx.closePath();
    ctx.fillStyle = '#888';
    ctx.fill();
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
    // 画抓到的物品 (跟随钩子)
    if (this.grabbedItem && this.state === 'retract') {
      const itemType = ITEM_TYPES[this.grabbedItem.type];
      ctx.save();
      ctx.translate(tip.x, tip.y + itemType.radius * 0.6);
      if (this.explosionTimer > 0 && this.grabbedItem.type === 'bomb') {
        // 爆炸中 - 画爆炸效果
        drawExplosionItem(ctx, this.explosionTimer);
      } else {
        itemType.draw(ctx, itemType.radius * 0.9, this.grabbedItem);
      }
      ctx.restore();
    }
    // 画矿工
    drawMiner(ctx, this.hookX, CONFIG.groundY, this.id);
  }

  tryShoot() {
    if (this.state === 'swing') {
      this.state = 'extend';
      this.hookLength = 20;
    }
  }
}

// ==================== 物品列表 ====================
let items = [];

// ==================== 绘制函数 ====================
function drawMiner(ctx, x, y, id) {
  // 身体
  ctx.fillStyle = id === 'A' ? '#4A90D9' : '#E74C3C';
  ctx.fillRect(x - 14, y - 45, 28, 40);
  // 头
  ctx.fillStyle = '#FFDAB9';
  ctx.beginPath();
  ctx.arc(x, y - 55, 16, 0, Math.PI * 2);
  ctx.fill();
  // 帽子(矿工帽)
  ctx.fillStyle = id === 'A' ? '#2C3E50' : '#8E44AD';
  ctx.fillRect(x - 18, y - 72, 36, 10);
  ctx.fillRect(x - 12, y - 82, 24, 12);
  // 眼睛
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x - 5, y - 56, 2, 0, Math.PI * 2);
  ctx.arc(x + 5, y - 56, 2, 0, Math.PI * 2);
  ctx.fill();
  // 标签
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px Microsoft YaHei';
  ctx.textAlign = 'center';
  ctx.fillText(id === 'A' ? '玩家A' : '玩家B', x, y - 90);
}

function drawGold(ctx, radius, item) {
  // 金矿 - 多边形不规则形状
  ctx.beginPath();
  const points = 8;
  for (let i = 0; i < points; i++) {
    const a = (i / points) * Math.PI * 2 + (item.seed || 0);
    const r = radius * (0.85 + Math.sin(a * 3 + (item.seed || 0) * 2) * 0.15);
    const px = Math.cos(a) * r;
    const py = Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  const grad = ctx.createRadialGradient(-radius * 0.3, -radius * 0.3, 0, 0, 0, radius);
  grad.addColorStop(0, '#FFE55C');
  grad.addColorStop(0.7, '#FFD700');
  grad.addColorStop(1, '#B8860B');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#8B6914';
  ctx.lineWidth = 2;
  ctx.stroke();
  // 高光
  ctx.beginPath();
  ctx.arc(-radius * 0.25, -radius * 0.25, radius * 0.25, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fill();
}

function drawDiamond(ctx, radius, item) {
  // 钻石 - 菱形
  ctx.beginPath();
  ctx.moveTo(0, -radius);
  ctx.lineTo(radius * 0.7, -radius * 0.2);
  ctx.lineTo(radius * 0.5, radius * 0.8);
  ctx.lineTo(-radius * 0.5, radius * 0.8);
  ctx.lineTo(-radius * 0.7, -radius * 0.2);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, -radius, 0, radius);
  grad.addColorStop(0, '#E0FFFF');
  grad.addColorStop(0.3, '#00E5FF');
  grad.addColorStop(0.7, '#0099CC');
  grad.addColorStop(1, '#006688');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#0088AA';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // 闪光
  ctx.beginPath();
  ctx.moveTo(-radius * 0.15, -radius * 0.5);
  ctx.lineTo(radius * 0.1, -radius * 0.15);
  ctx.lineTo(-radius * 0.1, 0);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fill();
}

function drawRock(ctx, radius, item) {
  // 石头 - 不规则多边形
  ctx.beginPath();
  const pts = 7;
  for (let i = 0; i < pts; i++) {
    const a = (i / pts) * Math.PI * 2 + (item.seed || 0);
    const r = radius * (0.8 + Math.sin(a * 2.5 + (item.seed || 0)) * 0.2);
    const px = Math.cos(a) * r;
    const py = Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  const grad = ctx.createRadialGradient(-radius * 0.25, -radius * 0.25, 0, 0, 0, radius);
  grad.addColorStop(0, '#A0A0A0');
  grad.addColorStop(0.6, '#808080');
  grad.addColorStop(1, '#505050');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#404040';
  ctx.lineWidth = 2;
  ctx.stroke();
  // 纹理
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(
      Math.cos((item.seed || 0) + i * 2) * radius * 0.4,
      Math.sin((item.seed || 0) + i * 2.5) * radius * 0.35,
      radius * 0.12, 0, Math.PI * 2
    );
    ctx.fill();
  }
}

function drawPig(ctx, radius, item) {
  // 小猪身体
  ctx.beginPath();
  ctx.ellipse(0, 0, radius, radius * 0.7, 0, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(-radius * 0.2, -radius * 0.2, 0, 0, 0, radius);
  grad.addColorStop(0, '#FFD1DC');
  grad.addColorStop(1, '#FFB6C1');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#E0909A';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // 鼻子
  ctx.beginPath();
  ctx.ellipse(radius * 0.55, 0, radius * 0.3, radius * 0.22, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#FF9AA2';
  ctx.fill();
  ctx.strokeStyle = '#E08088';
  ctx.stroke();
  // 鼻孔
  ctx.fillStyle = '#CC6670';
  ctx.beginPath();
  ctx.arc(radius * 0.6, -radius * 0.06, 2.5, 0, Math.PI * 2);
  ctx.arc(radius * 0.6, radius * 0.06, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // 眼睛
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(radius * 0.15, -radius * 0.2, 3, 0, Math.PI * 2);
  ctx.fill();
  // 耳朵
  ctx.beginPath();
  ctx.ellipse(-radius * 0.5, -radius * 0.55, radius * 0.25, radius * 0.35, -0.3, 0, Math.PI * 2);
  ctx.ellipse(radius * 0.1, -radius * 0.55, radius * 0.2, radius * 0.3, 0.3, 0, Math.PI * 2);
  ctx.fillStyle = '#FFB6C1';
  ctx.fill();
  ctx.strokeStyle = '#E0909A';
  ctx.stroke();
  // 腿
  ctx.fillStyle = '#FFB6C1';
  ctx.fillRect(-radius * 0.5, radius * 0.5, 6, 8);
  ctx.fillRect(radius * 0.2, radius * 0.5, 6, 8);
  // 尾巴
  ctx.beginPath();
  ctx.arc(-radius * 0.85, radius * 0.1, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#FFB6C1';
  ctx.fill();
}

function drawBomb(ctx, radius, item) {
  // 炸弹圆形身体
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(-radius * 0.3, -radius * 0.3, 0, 0, 0, radius);
  grad.addColorStop(0, '#555');
  grad.addColorStop(1, '#222');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 2;
  ctx.stroke();
  // 高光
  ctx.beginPath();
  ctx.arc(-radius * 0.3, -radius * 0.3, radius * 0.25, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fill();
  // 引线
  ctx.beginPath();
  ctx.moveTo(0, -radius);
  ctx.quadraticCurveTo(radius * 0.3, -radius - 8, radius * 0.15, -radius - 14);
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  // 火花
  const sparkSize = 4 + Math.sin(Date.now() * 0.01) * 2;
  ctx.beginPath();
  ctx.arc(radius * 0.15, -radius - 14, sparkSize, 0, Math.PI * 2);
  ctx.fillStyle = `hsl(${(Date.now() * 0.2) % 60}, 100%, 55%)`;
  ctx.fill();
  // 标记 X
  ctx.strokeStyle = '#FF4444';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-radius * 0.35, -radius * 0.35);
  ctx.lineTo(radius * 0.35, radius * 0.35);
  ctx.moveTo(radius * 0.35, -radius * 0.35);
  ctx.lineTo(-radius * 0.35, radius * 0.35);
  ctx.stroke();
}

function drawExplosionItem(ctx, timer) {
  const scale = 1 + (25 - timer) * 0.05;
  const alpha = timer / 25;
  ctx.globalAlpha = alpha;
  // 爆炸圆圈
  ctx.beginPath();
  ctx.arc(0, 0, 25 * scale, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255, ${100 + timer * 6}, 0, ${alpha * 0.6})`;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 0, 15 * scale, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255, 255, ${timer * 8}, ${alpha})`;
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ==================== 粒子系统 ====================
function createExplosion(x, y) {
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      size: 3 + Math.random() * 5,
      color: Math.random() > 0.5 ? '#FF6600' : '#FFCC00',
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15; // 重力
    p.life--;
    return p.life > 0;
  });
}

function drawParticles(ctx) {
  for (let p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ==================== 关卡生成 ====================
function generateLevel() {
  items = [];
  const W = CONFIG.canvasW;
  const H = CONFIG.canvasH;
  const groundY = CONFIG.groundY;
  const usableArea = {
    x1: 30, x2: W - 30,
    y1: groundY + 50, y2: H - 30
  };

  // 尝试放置物品，确保不重叠
  function placeItem(type, count) {
    for (let c = 0; c < count; c++) {
      let placed = false;
      let attempts = 0;
      while (!placed && attempts < 100) {
        const x = usableArea.x1 + Math.random() * (usableArea.x2 - usableArea.x1);
        const y = usableArea.y1 + Math.random() * (usableArea.y2 - usableArea.y1);
        const radius = ITEM_TYPES[type].radius;
        // 检查与已有物品重叠
        let overlap = false;
        for (let item of items) {
          const dx = x - item.x;
          const dy = y - item.y;
          const minDist = radius + item.radius + 10;
          if (dx * dx + dy * dy < minDist * minDist) {
            overlap = true;
            break;
          }
        }
        if (!overlap) {
          items.push({ type, x, y, radius, seed: Math.random() * Math.PI * 2, ...ITEM_TYPES[type] });
          placed = true;
        }
        attempts++;
      }
    }
  }

  // 生成物品 (至少3个钻石)
  placeItem('diamond', 4);       // 钻石 (至少3个，放4个)
  placeItem('goldS', 5);         // 小金矿
  placeItem('goldM', 3);         // 中金矿
  placeItem('goldL', 2);         // 大金矿
  placeItem('rockS', 3);         // 小石头
  placeItem('rockM', 2);         // 中石头
  placeItem('rockL', 1);         // 大石头
  placeItem('pig', 3);           // 小猪
  placeItem('bomb', 4);          // 炸弹
}

// ==================== 小猪移动 ====================
function updatePigs() {
  for (let item of items) {
    if (item.type === 'pig') {
      item.x += item.dir || 0.8;
      if (item.x <= item.radius + 10 || item.x >= CONFIG.canvasW - item.radius - 10) {
        (item.dir || (item.dir = 0.8)) *= -1;
      }
      // 确保初始化方向
      if (!item.dir) item.dir = (Math.random() > 0.5 ? 1 : -1) * 0.8;
    }
  }
}

// ==================== 场景绘制 ====================
function drawBackground(ctx) {
  const W = CONFIG.canvasW;
  const H = CONFIG.canvasH;
  const groundY = CONFIG.groundY;

  // 天空
  const skyGrad = ctx.createLinearGradient(0, 0, 0, groundY);
  skyGrad.addColorStop(0, '#4A90D9');
  skyGrad.addColorStop(1, '#87CEEB');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, groundY);

  // 太阳
  ctx.beginPath();
  ctx.arc(W - 80, 50, 35, 0, Math.PI * 2);
  const sunGrad = ctx.createRadialGradient(W - 80, 50, 0, W - 80, 50, 35);
  sunGrad.addColorStop(0, '#FFFF99');
  sunGrad.addColorStop(1, '#FFD700');
  ctx.fillStyle = sunGrad;
  ctx.fill();

  // 云朵
  drawCloud(ctx, 100, 35, 0.8);
  drawCloud(ctx, 350, 55, 0.6);
  drawCloud(ctx, 600, 30, 0.7);

  // 草地/地表
  const grassGrad = ctx.createLinearGradient(0, groundY - 15, 0, groundY + 10);
  grassGrad.addColorStop(0, '#4CAF50');
  grassGrad.addColorStop(0.5, '#388E3C');
  grassGrad.addColorStop(1, '#8B4513');
  ctx.fillStyle = grassGrad;
  ctx.fillRect(0, groundY - 15, W, 25);

  // 地下
  const dirtGrad = ctx.createLinearGradient(0, groundY + 10, 0, H);
  dirtGrad.addColorStop(0, '#8B4513');
  dirtGrad.addColorStop(0.3, '#6B3510');
  dirtGrad.addColorStop(0.7, '#4A2508');
  dirtGrad.addColorStop(1, '#2D1605');
  ctx.fillStyle = dirtGrad;
  ctx.fillRect(0, groundY + 10, W, H - groundY - 10);

  // 地下层纹理
  ctx.strokeStyle = 'rgba(0,0,0,0.1)';
  ctx.lineWidth = 1;
  for (let y = groundY + 40; y < H; y += 25) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    for (let x = 0; x < W; x += 30) {
      ctx.lineTo(x + 15, y + (Math.sin(x * 0.05) * 3));
    }
    ctx.stroke();
  }
}

function drawCloud(ctx, x, y, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(0, 0, 25, 0, Math.PI * 2);
  ctx.arc(25, -5, 20, 0, Math.PI * 2);
  ctx.arc(50, 0, 25, 0, Math.PI * 2);
  ctx.arc(25, 10, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawItems(ctx) {
  for (let item of items) {
    ctx.save();
    ctx.translate(item.x, item.y);
    item.draw(ctx, item.radius, item);
    ctx.restore();
  }
}

function drawUI(ctx) {
  // 时间
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(CONFIG.canvasW / 2 - 50, 8, 100, 32);
  ctx.fillStyle = gameTime <= 10 ? '#FF4444' : '#fff';
  ctx.font = 'bold 20px Microsoft YaHei';
  ctx.textAlign = 'center';
  ctx.fillText(`⏱ ${Math.ceil(gameTime)}s`, CONFIG.canvasW / 2, 30);

  // 玩家分数
  for (let p of players) {
    const x = p.isPlayerA ? 80 : CONFIG.canvasW - 80;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x - 65, 8, 130, 32);
    ctx.fillStyle = p.id === 'A' ? '#4A90D9' : '#E74C3C';
    ctx.font = 'bold 18px Microsoft YaHei';
    ctx.textAlign = 'center';
    ctx.fillText(`${p.id === 'A' ? '玩家A' : '玩家B'}: ${p.score}/${CONFIG.winScore}`, x, 30);

    // 最近抓到的物品显示
    let dy = 50;
    for (let ci of p.caughtItems.slice(-3)) {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(x - 45, dy, 90, 22);
      ctx.fillStyle = '#FFD700';
      ctx.font = '13px Microsoft YaHei';
      ctx.fillText(`${ci.name} +${ci.value}`, x, dy + 16);
      dy += 24;
    }
  }
}

// ==================== 游戏主循环 ====================
function gameLoop(timestamp) {
  if (!gameRunning) return;
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;

  // 更新时间
  gameTime -= dt;
  if (gameTime <= 0) {
    gameTime = 0;
    endGame();
    return;
  }

  // 更新
  for (let p of players) p.update(dt);
  updatePigs();
  updateParticles();

  // 检查胜利
  for (let p of players) {
    if (p.score >= CONFIG.winScore && !victoryShown) {
      victoryShown = true;
      showVictory(p);
      return;
    }
  }

  // 绘制
  ctx.clearRect(0, 0, CONFIG.canvasW, CONFIG.canvasH);
  drawBackground(ctx);
  drawItems(ctx);
  for (let p of players) p.draw(ctx);
  drawParticles(ctx);
  drawUI(ctx);

  animationId = requestAnimationFrame(gameLoop);
}

// ==================== 游戏控制 ====================
function startGame(mode) {
  gameMode = mode;
  gameRunning = true;
  gameTime = CONFIG.timeLimit;
  victoryShown = false;
  particles = [];
  lastTime = performance.now();

  // 初始化玩家
  players = [];
  if (mode === 'single') {
    players.push(new Player('A', CONFIG.canvasW / 2, true));
  } else {
    players.push(new Player('A', CONFIG.canvasW / 3, true));
    players.push(new Player('B', CONFIG.canvasW * 2 / 3, false));
  }

  // 生成关卡
  generateLevel();

  // 隐藏首页
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('victoryOverlay').style.display = 'none';

  // 开始循环
  if (animationId) cancelAnimationFrame(animationId);
  animationId = requestAnimationFrame(gameLoop);
}

function showVictory(player) {
  gameRunning = false;
  const overlay = document.getElementById('victoryOverlay');
  document.getElementById('finalScore').textContent =
    `${player.id === 'A' ? '玩家A' : '玩家B'} 最终得分: ${player.score} 分！`;
  overlay.style.display = 'flex';
  // 胜利彩带粒子
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: CONFIG.canvasW / 2,
      y: CONFIG.canvasH / 2,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 12 - 3,
      life: 100 + Math.random() * 60,
      maxLife: 160,
      size: 4 + Math.random() * 6,
      color: `hsl(${Math.random() * 360}, 80%, 55%)`,
    });
  }
  // 继续渲染彩带
  function victoryAnim() {
    ctx.clearRect(0, 0, CONFIG.canvasW, CONFIG.canvasH);
    drawBackground(ctx);
    drawItems(ctx);
    for (let p of players) p.draw(ctx);
    updateParticles();
    drawParticles(ctx);
    drawUI(ctx);
    if (particles.length > 0) {
      requestAnimationFrame(victoryAnim);
    }
  }
  victoryAnim();
}

function endGame() {
  gameRunning = false;
  // 时间到了但没有达到分数
  const overlay = document.getElementById('victoryOverlay');
  document.querySelector('.victory-text').textContent = '⏰ 时间到！';
  document.getElementById('finalScore').textContent =
    `最终得分 - 玩家A: ${players[0].score} 分` +
    (players.length > 1 ? ` | 玩家B: ${players[1].score} 分` : '');
  overlay.style.display = 'flex';
}

function backToHome() {
  gameRunning = false;
  if (animationId) cancelAnimationFrame(animationId);
  document.getElementById('homeScreen').style.display = 'flex';
  document.getElementById('victoryOverlay').style.display = 'none';
  document.querySelector('.victoryText')?.remove();
  // 重置胜利文字
  document.querySelector('.victory-text').textContent = '🎉 恭喜胜利！🎉';
  victoryShown = false;
}

// ==================== 键盘输入 ====================
document.addEventListener('keydown', (e) => {
  if (!gameRunning) return;
  // 玩家A: S键
  if (e.key === 's' || e.key === 'S') {
    for (let p of players) {
      if (p.isPlayerA) p.tryShoot();
    }
  }
  // 玩家B: 下方向键
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    for (let p of players) {
      if (!p.isPlayerA) p.tryShoot();
    }
  }
});
</script>
