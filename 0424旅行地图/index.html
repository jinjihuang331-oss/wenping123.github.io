<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行地图 - Travel Map</title>

  <!-- PWA -->
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet Routing Machine -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

  <!-- Leaflet MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 顶部导航栏 -->
  <header id="header">
    <div class="header-left">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <h1>旅行地图</h1>
    </div>
    <div class="header-center">
      <span id="stats-total">景点: 0</span>
      <span class="divider">|</span>
      <span id="stats-distance">总距离: 0 km</span>
    </div>
    <div class="header-right">
      <button id="btn-install" class="header-btn" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
        </svg>
        安装应用
      </button>
      <button id="btn-clear" class="header-btn danger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        清空
      </button>
      <button id="btn-export" class="header-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
        </svg>
        导出
      </button>
    </div>
  </header>

  <!-- 主内容 -->
  <div id="app">
    <!-- 侧边栏 -->
    <aside id="sidebar">
      <div class="sidebar-section">
        <h3>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/>
          </svg>
          景点列表
        </h3>
        <p class="hint">点击地图添加景点，拖拽编号可调整路线顺序</p>
        <div id="spot-list"></div>
        <div id="empty-state" class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
            <circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/>
          </svg>
          <p>暂无景点</p>
          <p class="sub">点击地图任意位置添加</p>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
          路线信息
        </h3>
        <div id="route-info" class="route-info">
          <p class="hint">添加 2 个以上景点后自动规划路线</p>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
          </svg>
          地图样式
        </h3>
        <div class="tile-options">
          <button class="tile-btn active" data-tile="standard">标准</button>
          <button class="tile-btn" data-tile="dark">暗黑</button>
          <button class="tile-btn" data-tile="topo">地形</button>
          <button class="tile-btn" data-tile="watercolor">水彩</button>
        </div>
      </div>
    </aside>

    <!-- 地图 -->
    <div id="map"></div>
  </div>

  <!-- 模态框 -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2 id="modal-title">添加景点</h2>
      <div class="form-group">
        <label for="spot-name">景点名称 <span class="required">*</span></label>
        <input type="text" id="spot-name" placeholder="例：故宫博物院" maxlength="50" />
      </div>
      <div class="form-group">
        <label for="spot-desc">描述</label>
        <textarea id="spot-desc" placeholder="景点简介或旅行笔记..." rows="3" maxlength="500"></textarea>
      </div>
      <div class="form-group">
        <label for="spot-category">分类</label>
        <select id="spot-category">
          <option value="sights">🏛️ 景点</option>
          <option value="food">🍜 美食</option>
          <option value="hotel">🏨 住宿</option>
          <option value="transport">🚉 交通</option>
          <option value="shopping">🛍️ 购物</option>
          <option value="other">📍 其他</option>
        </select>
      </div>
      <div class="form-group">
        <label>坐标</label>
        <input type="text" id="spot-coords" readonly />
      </div>
      <div class="modal-actions">
        <button id="btn-cancel" class="btn btn-secondary">取消</button>
        <button id="btn-save" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
