<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ff8906">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>旅行地图</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 离线指示器 -->
  <div id="offline-indicator" class="offline-indicator hidden">📴 离线模式</div>

  <!-- 工具栏 -->
  <div id="toolbar" class="toolbar">
    <button id="btn-sidebar" title="侧边栏" class="toolbar-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <button id="btn-add" title="添加景点" class="toolbar-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
    </button>
    <button id="btn-route" title="绘制路线" class="toolbar-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4l7.07 16.97 2.51-7.39 7.39-2.51L3 4z"/></svg>
    </button>
    <button id="btn-export" title="导出数据" class="toolbar-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button id="btn-import" title="导入数据" class="toolbar-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </button>
    <button id="btn-locate" title="定位" class="toolbar-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>
    </button>
  </div>

  <!-- 侧边栏 -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>旅行足迹</h2>
      <button id="btn-close-sidebar" class="close-btn">&times;</button>
    </div>
    <div class="sidebar-tabs">
      <button class="tab active" data-tab="spots">景点</button>
      <button class="tab" data-tab="routes">路线</button>
    </div>
    <div id="spots-list" class="sidebar-content active">
      <div class="empty-state">点击地图添加你的第一个景点</div>
    </div>
    <div id="routes-list" class="sidebar-content">
      <div class="empty-state">使用路线工具连接景点</div>
    </div>
  </aside>

  <!-- 侧边栏遮罩 -->
  <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

  <!-- 地图 -->
  <div id="map"></div>

  <!-- 添加/编辑景点模态框 -->
  <div id="spot-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">添加景点</h3>
        <button id="btn-close-modal" class="close-btn">&times;</button>
      </div>
      <form id="spot-form">
        <div class="form-group">
          <label for="spot-name">名称</label>
          <input type="text" id="spot-name" required placeholder="输入景点名称" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="spot-desc">描述</label>
          <textarea id="spot-desc" rows="3" placeholder="描述一下这个地方..."></textarea>
        </div>
        <div class="form-group">
          <label for="spot-photo">照片</label>
          <input type="file" id="spot-photo" accept="image/*">
          <div id="photo-preview" class="photo-preview hidden"></div>
        </div>
        <input type="hidden" id="spot-lat">
        <input type="hidden" id="spot-lng">
        <input type="hidden" id="spot-id">
        <div class="modal-actions">
          <button type="button" id="btn-cancel" class="btn btn-secondary">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 路线选择提示 -->
  <div id="route-hint" class="route-hint hidden">
    <span id="route-hint-text">点击第一个景点标记</span>
    <button id="btn-cancel-route" class="btn btn-secondary btn-sm">取消</button>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <input type="file" id="import-input" accept=".json" class="hidden">

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
