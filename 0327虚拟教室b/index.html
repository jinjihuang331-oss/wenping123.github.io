<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>虚拟教室平台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --bg: #0f172a;
  --surface: #1e293b;
  --surface-2: #334155;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --border: #475569;
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 12px;
  z-index: 10;
}
.header-title {
  font-size: 18px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-title .dot {
  width: 8px; height: 8px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.header-actions { display: flex; gap: 8px; align-items: center; }

/* Buttons */
.btn {
  border: none; border-radius: 8px;
  padding: 8px 16px; cursor: pointer;
  font-size: 14px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.2s; white-space: nowrap;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-outline {
  background: transparent; color: var(--text);
  border: 1px solid var(--border);
}
.btn-outline:hover { background: var(--surface-2); }
.btn-icon {
  padding: 8px; border-radius: 8px;
  background: var(--surface-2); color: var(--text);
  border: 1px solid var(--border);
  font-size: 16px; cursor: pointer;
  transition: all 0.2s;
}
.btn-icon:hover { background: var(--border); }
.btn-icon.active { background: var(--danger); border-color: var(--danger); }
.btn-icon.recording {
  animation: rec-pulse 1.5s infinite;
  background: var(--danger); border-color: var(--danger);
}
@keyframes rec-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
}

/* Main layout */
.main {
  flex: 1; display: flex;
  overflow: hidden;
  position: relative;
}

/* Sidebar */
.sidebar {
  width: 260px; min-width: 200px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  transition: transform 0.3s;
}
.sidebar.collapsed { transform: translateX(-100%); position: absolute; height: 100%; z-index: 5; }

.sidebar-section {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-section h3 {
  font-size: 12px; text-transform: uppercase;
  color: var(--text-muted); letter-spacing: 0.5px;
  margin-bottom: 10px;
}

/* Participants */
.participant-list { list-style: none; }
.participant-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 6px; border-radius: 8px;
  cursor: default; transition: background 0.15s;
}
.participant-item:hover { background: var(--surface-2); }
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; flex-shrink: 0;
}
.avatar.me { background: var(--primary); }
.participant-info { flex: 1; min-width: 0; }
.participant-name { font-size: 14px; font-weight: 500; }
.participant-role { font-size: 12px; color: var(--text-muted); }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--success); flex-shrink: 0;
}

/* Chat */
.chat-area {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; min-height: 0;
}
.chat-messages {
  flex: 1; overflow-y: auto;
  padding: 8px 14px;
  display: flex; flex-direction: column; gap: 8px;
}
.chat-msg {
  padding: 8px 12px;
  border-radius: 12px;
  max-width: 85%;
  font-size: 13px; line-height: 1.4;
  word-break: break-word;
}
.chat-msg .msg-author {
  font-size: 11px; color: var(--text-muted);
  margin-bottom: 3px; font-weight: 600;
}
.chat-msg.others { background: var(--surface-2); align-self: flex-start; }
.chat-msg.mine { background: var(--primary); align-self: flex-end; }
.chat-msg.mine .msg-author { color: rgba(255,255,255,0.7); }

.chat-input-area {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px 14px;
  color: var(--text);
  font-size: 14px; outline: none;
}
.chat-input:focus { border-color: var(--primary); }
.emoji-btn {
  font-size: 20px; cursor: pointer;
  background: none; border: none;
  padding: 4px 6px; border-radius: 6px;
  transition: background 0.15s;
}
.emoji-btn:hover { background: var(--surface-2); }
.send-btn {
  background: var(--primary); color: #fff;
  border: none; border-radius: 50%;
  width: 36px; height: 36px;
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* Emoji picker */
.emoji-picker {
  display: none;
  position: absolute;
  bottom: 60px; left: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  z-index: 20;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  width: 280px;
}
.emoji-picker.show { display: block; }
.emoji-grid {
  display: grid; grid-template-columns: repeat(8, 1fr);
  gap: 4px;
}
.emoji-grid span {
  font-size: 22px; text-align: center;
  cursor: pointer; padding: 4px;
  border-radius: 6px; transition: background 0.15s;
  user-select: none;
}
.emoji-grid span:hover { background: var(--surface-2); }

/* Whiteboard area */
.whiteboard-area {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0; position: relative;
}
.whiteboard-toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap; flex-shrink: 0;
}
.tool-group {
  display: flex; align-items: center; gap: 4px;
  padding: 0 6px; border-right: 1px solid var(--border);
}
.tool-group:last-child { border-right: none; }
.tool-btn {
  width: 34px; height: 34px;
  border-radius: 6px; border: 1px solid transparent;
  background: none; color: var(--text);
  font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.tool-btn:hover { background: var(--surface-2); }
.tool-btn.active {
  background: var(--primary); border-color: var(--primary);
}
.color-btn {
  width: 26px; height: 26px;
  border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; transition: transform 0.15s;
}
.color-btn:hover { transform: scale(1.15); }
.color-btn.active { border-color: #fff; transform: scale(1.15); }
.size-slider {
  width: 80px; accent-color: var(--primary);
}
.canvas-wrapper {
  flex: 1; position: relative; overflow: hidden;
  background: #fff; cursor: crosshair;
}
#whiteboard {
  display: block; width: 100%; height: 100%;
  touch-action: none;
}

/* Screen share overlay */
.share-overlay {
  position: absolute;
  border: 3px dashed var(--warning);
  background: rgba(245,158,11,0.08);
  pointer-events: none;
  display: none;
  border-radius: 8px;
  z-index: 15;
}
.share-overlay.active { display: block; }
.share-label {
  position: absolute;
  top: -28px; left: 0;
  background: var(--warning);
  color: #000;
  font-size: 11px; font-weight: 700;
  padding: 2px 10px; border-radius: 4px;
  white-space: nowrap;
}
.share-mode-hint {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75);
  color: #fff;
  padding: 16px 28px;
  border-radius: 12px;
  font-size: 15px; font-weight: 600;
  z-index: 20;
  pointer-events: none;
  display: none;
  text-align: center;
}
.share-mode-hint.show { display: block; }

/* Recording indicator */
.rec-indicator {
  display: none;
  position: absolute;
  top: 12px; right: 12px;
  background: rgba(239,68,68,0.9);
  color: #fff;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px; font-weight: 700;
  z-index: 15;
  align-items: center; gap: 6px;
}
.rec-indicator.show { display: flex; }
.rec-dot {
  width: 10px; height: 10px;
  background: #fff;
  border-radius: 50%;
  animation: pulse 1s infinite;
}

/* Toggle sidebar btn (mobile) */
.toggle-sidebar {
  display: none;
}

/* Responsive */
@media (max-width: 768px) {
  .sidebar {
    position: absolute;
    height: 100%; z-index: 20;
    transform: translateX(-100%);
    width: 280px;
  }
  .sidebar.open { transform: translateX(0); }
  .toggle-sidebar { display: flex; }
  .header-title { font-size: 16px; }
  .btn { padding: 6px 12px; font-size: 13px; }
  .whiteboard-toolbar { padding: 6px 8px; gap: 4px; }
  .tool-btn { width: 32px; height: 32px; font-size: 15px; }
  .tool-group { padding: 0 4px; }
  .size-slider { width: 60px; }
  .emoji-picker { width: 240px; }
}

@media (max-width: 480px) {
  .header { padding: 8px 10px; }
  .header-title span:not(.dot) { display: none; }
  .btn span { display: none; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="btn-icon toggle-sidebar" id="toggleSidebar" title="菜单">☰</button>
    <div class="header-title">
      <span class="dot"></span>
      <span>虚拟教室平台</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="recordBtn" title="录制">⏺</button>
    <button class="btn btn-outline" id="shareBtn">共享屏幕</button>
    <button class="btn btn-primary" id="endBtn">结束课程</button>
  </div>
</header>

<div class="main">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <h3>参与者 (4)</h3>
      <ul class="participant-list" id="participantList"></ul>
    </div>
    <div class="sidebar-section chat-area">
      <h3>聊天</h3>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area" style="position:relative;">
        <button class="emoji-btn" id="emojiBtn" title="表情">😊</button>
        <input class="chat-input" id="chatInput" placeholder="输入消息..." autocomplete="off">
        <button class="send-btn" id="sendBtn" title="发送">➤</button>
        <div class="emoji-picker" id="emojiPicker">
          <div class="emoji-grid" id="emojiGrid"></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Whiteboard -->
  <section class="whiteboard-area">
    <div class="whiteboard-toolbar">
      <div class="tool-group">
        <button class="tool-btn active" data-tool="pen" title="画笔">✏️</button>
        <button class="tool-btn" data-tool="eraser" title="橡皮">🧹</button>
        <button class="tool-btn" data-tool="line" title="直线">╱</button>
        <button class="tool-btn" data-tool="rect" title="矩形">▢</button>
        <button class="tool-btn" data-tool="circle" title="圆形">○</button>
        <button class="tool-btn" data-tool="text" title="文字">T</button>
      </div>
      <div class="tool-group">
        <button class="color-btn active" data-color="#000000" style="background:#000"></button>
        <button class="color-btn" data-color="#ef4444" style="background:#ef4444"></button>
        <button class="color-btn" data-color="#22c55e" style="background:#22c55e"></button>
        <button class="color-btn" data-color="#3b82f6" style="background:#3b82f6"></button>
        <button class="color-btn" data-color="#f59e0b" style="background:#f59e0b"></button>
        <button class="color-btn" data-color="#a855f7" style="background:#a855f7"></button>
      </div>
      <div class="tool-group">
        <input type="range" class="size-slider" id="sizeSlider" min="1" max="30" value="3" title="笔刷大小">
      </div>
      <div class="tool-group">
        <button class="tool-btn" id="undoBtn" title="撤销">↩️</button>
        <button class="tool-btn" id="clearBtn" title="清空">🗑️</button>
      </div>
    </div>
    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="whiteboard"></canvas>
      <div class="share-overlay" id="shareOverlay">
        <div class="share-label">📺 共享区域</div>
      </div>
      <div class="share-mode-hint" id="shareHint">拖动选择要共享的区域</div>
      <div class="rec-indicator" id="recIndicator">
        <span class="rec-dot"></span>
        <span id="recTime">00:00</span>
      </div>
    </div>
  </section>
</div>

<script>
// ==================== State ====================
const state = {
  participants: [
    { id: 1, name: '张老师', role: '主讲人', color: '#4f46e5', isMe: true },
    { id: 2, name: '李明', role: '学生', color: '#22c55e' },
    { id: 3, name: '王芳', role: '学生', color: '#f59e0b' },
    { id: 4, name: '陈伟', role: '学生', color: '#ef4444' },
  ],
  messages: [
    { author: '李明', text: '老师好！', time: '10:00', mine: false },
    { author: '张老师', text: '同学们好，我们开始上课。', time: '10:01', mine: true },
    { author: '王芳', text: '好的老师 👍', time: '10:02', mine: false },
  ],
  drawings: [],        // history for undo
  currentPath: [],     // current stroke
  tool: 'pen',
  color: '#000000',
  size: 3,
  isDrawing: false,
  isSharing: false,
  isRecording: false,
  recStartTime: null,
  recTimer: null,
  shapeStart: null,
  textPos: null,
};

// ==================== Emoji Data ====================
const emojis = [
  '😀','😃','😄','😁','😆','😅','🤣','😂',
  '🙂','🙃','😉','😊','😇','🥰','😍','🤩',
  '😘','😗','😚','😙','🥲','😋','😛','😜',
  '🤪','😝','🤑','🤗','🤭','🤫','🤔','🫡',
  '👍','👎','👏','🙌','🤝','✌️','🤞','👋',
  '❤️','🧡','💛','💚','💙','💜','🖤','🤍',
  '🔥','⭐','✨','💯','🎉','🎊','📌','📝',
  '✅','❌','⚠️','📌','💡','🔔','📢','🎯',
];

// ==================== DOM Elements ====================
const canvas = document.getElementById('whiteboard');
const ctx = canvas.getContext('2d');
const canvasWrapper = document.getElementById('canvasWrapper');
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const emojiPicker = document.getElementById('emojiPicker');
const emojiGrid = document.getElementById('emojiGrid');
const shareOverlay = document.getElementById('shareOverlay');
const shareHint = document.getElementById('shareHint');
const recIndicator = document.getElementById('recIndicator');
const recTimeEl = document.getElementById('recTime');
const sidebar = document.getElementById('sidebar');
const participantList = document.getElementById('participantList');

// ==================== Canvas Setup ====================
function resizeCanvas() {
  const rect = canvasWrapper.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(dpr, dpr);
  redrawAll();
}

function redrawAll() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  state.drawings.forEach(item => drawItem(item));
}

function drawItem(item) {
  ctx.strokeStyle = item.color;
  ctx.fillStyle = item.color;
  ctx.lineWidth = item.size;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  switch (item.type) {
    case 'path':
      if (item.points.length < 2) return;
      ctx.beginPath();
      ctx.moveTo(item.points[0].x, item.points[0].y);
      for (let i = 1; i < item.points.length; i++) {
        ctx.lineTo(item.points[i].x, item.points[i].y);
      }
      ctx.stroke();
      break;
    case 'line':
      ctx.beginPath();
      ctx.moveTo(item.x1, item.y1);
      ctx.lineTo(item.x2, item.y2);
      ctx.stroke();
      break;
    case 'rect':
      ctx.strokeRect(item.x, item.y, item.w, item.h);
      break;
    case 'circle':
      ctx.beginPath();
      const rx = Math.abs(item.w) / 2;
      const ry = Math.abs(item.h) / 2;
      ctx.ellipse(item.x + item.w / 2, item.y + item.h / 2, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
      break;
    case 'text':
      ctx.font = `${Math.max(16, item.size * 5)}px sans-serif`;
      ctx.fillText(item.text, item.x, item.y);
      break;
  }
}

// ==================== Drawing Events ====================
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function startDraw(e) {
  if (state.isSharing) return;
  const pos = getPos(e);
  state.isDrawing = true;
  state.shapeStart = pos;

  if (state.tool === 'pen' || state.tool === 'eraser') {
    state.currentPath = [{ ...pos, color: state.tool === 'eraser' ? '#ffffff' : state.color, size: state.tool === 'eraser' ? state.size * 3 : state.size }];
  } else if (state.tool === 'text') {
    const text = prompt('请输入文字：');
    if (text) {
      state.drawings.push({ type: 'text', x: pos.x, y: pos.y, text, color: state.color, size: state.size });
      redrawAll();
    }
    state.isDrawing = false;
  }
}

function moveDraw(e) {
  if (!state.isDrawing || state.isSharing) return;
  e.preventDefault();
  const pos = getPos(e);

  if (state.tool === 'pen' || state.tool === 'eraser') {
    state.currentPath.push({ ...pos, color: state.tool === 'eraser' ? '#ffffff' : state.color, size: state.tool === 'eraser' ? state.size * 3 : state.size });
    // Draw current stroke live
    if (state.currentPath.length >= 2) {
      const prev = state.currentPath[state.currentPath.length - 2];
      ctx.strokeStyle = state.currentPath[0].color;
      ctx.lineWidth = state.currentPath[0].size;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(prev.x, prev.y);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }
  } else {
    // Preview shape
    redrawAll();
    ctx.strokeStyle = state.color;
    ctx.lineWidth = state.size;
    ctx.lineCap = 'round';
    ctx.setLineDash([5, 5]);
    const sx = state.shapeStart.x, sy = state.shapeStart.y;
    if (state.tool === 'line') {
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    } else if (state.tool === 'rect') {
      ctx.strokeRect(sx, sy, pos.x - sx, pos.y - sy);
    } else if (state.tool === 'circle') {
      ctx.beginPath();
      const rx = Math.abs(pos.x - sx) / 2, ry = Math.abs(pos.y - sy) / 2;
      ctx.ellipse(sx + (pos.x - sx) / 2, sy + (pos.y - sy) / 2, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }
}

function endDraw(e) {
  if (!state.isDrawing) return;
  state.isDrawing = false;

  if (state.tool === 'pen' || state.tool === 'eraser') {
    if (state.currentPath.length > 1) {
      state.drawings.push({ type: 'path', points: [...state.currentPath] });
    }
    state.currentPath = [];
  } else if (state.tool === 'line' || state.tool === 'rect' || state.tool === 'circle') {
    const pos = e.changedTouches ? getPos(e.changedTouches[0]) : getPos(e);
    const sx = state.shapeStart.x, sy = state.shapeStart.y;
    if (state.tool === 'line') {
      state.drawings.push({ type: 'line', x1: sx, y1: sy, x2: pos.x, y2: pos.y, color: state.color, size: state.size });
    } else if (state.tool === 'rect') {
      state.drawings.push({ type: 'rect', x: sx, y: sy, w: pos.x - sx, h: pos.y - sy, color: state.color, size: state.size });
    } else if (state.tool === 'circle') {
      state.drawings.push({ type: 'circle', x: sx, y: sy, w: pos.x - sx, h: pos.y - sy, color: state.color, size: state.size });
    }
    redrawAll();
  }
  state.shapeStart = null;
}

// Canvas events
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', moveDraw, { passive: false });
canvas.addEventListener('touchend', endDraw);

// ==================== Toolbar ====================
document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.tool = btn.dataset.tool;
  });
});

document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.color = btn.dataset.color;
  });
});

document.getElementById('sizeSlider').addEventListener('input', e => {
  state.size = parseInt(e.target.value);
});

document.getElementById('undoBtn').addEventListener('click', () => {
  if (state.drawings.length > 0) {
    state.drawings.pop();
    redrawAll();
  }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (confirm('确定清空白板吗？')) {
    state.drawings = [];
    redrawAll();
  }
});

// ==================== Participants ====================
function renderParticipants() {
  participantList.innerHTML = state.participants.map(p => `
    <li class="participant-item">
      <div class="avatar ${p.isMe ? 'me' : ''}" style="background:${p.isMe ? '' : p.color}">${p.name[0]}</div>
      <div class="participant-info">
        <div class="participant-name">${p.name} ${p.isMe ? '(我)' : ''}</div>
        <div class="participant-role">${p.role}</div>
      </div>
      <span class="status-dot"></span>
    </li>
  `).join('');
}
renderParticipants();

// ==================== Chat ====================
function renderMessages() {
  chatMessages.innerHTML = state.messages.map(m => `
    <div class="chat-msg ${m.mine ? 'mine' : 'others'}">
      <div class="msg-author">${m.author} · ${m.time}</div>
      ${m.text}
    </div>
  `).join('');
  chatMessages.scrollTop = chatMessages.scrollHeight;
}
renderMessages();

function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  state.messages.push({ author: '张老师', text, time, mine: true });
  chatInput.value = '';
  renderMessages();
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

// Emoji picker
emojis.forEach(em => {
  const span = document.createElement('span');
  span.textContent = em;
  span.addEventListener('click', () => { chatInput.value += em; chatInput.focus(); });
  emojiGrid.appendChild(span);
});

document.getElementById('emojiBtn').addEventListener('click', e => {
  e.stopPropagation();
  emojiPicker.classList.toggle('show');
});
document.addEventListener('click', e => {
  if (!e.target.closest('.emoji-picker') && !e.target.closest('.emoji-btn')) {
    emojiPicker.classList.remove('show');
  }
});

// ==================== Screen Share (Simulated) ====================
let shareDrag = false;
let shareStart = null;

document.getElementById('shareBtn').addEventListener('click', () => {
  if (state.isSharing) {
    // Stop sharing
    state.isSharing = false;
    shareOverlay.classList.remove('active');
    shareHint.classList.remove('show');
    document.getElementById('shareBtn').textContent = '共享屏幕';
    document.getElementById('shareBtn').classList.remove('btn-danger');
    document.getElementById('shareBtn').classList.add('btn-outline');
    canvasWrapper.style.cursor = 'crosshair';
  } else {
    // Start share selection mode
    state.isSharing = true;
    shareHint.classList.add('show');
    document.getElementById('shareBtn').textContent = '取消共享';
    document.getElementById('shareBtn').classList.remove('btn-outline');
    document.getElementById('shareBtn').classList.add('btn-danger');
    canvasWrapper.style.cursor = 'cell';
  }
});

canvasWrapper.addEventListener('mousedown', e => {
  if (!state.isSharing) return;
  shareDrag = true;
  shareStart = { x: e.offsetX, y: e.offsetY };
});
canvasWrapper.addEventListener('mousemove', e => {
  if (!shareDrag || !shareStart) return;
  const rect = canvasWrapper.getBoundingClientRect();
  const x = Math.min(shareStart.x, e.offsetX);
  const y = Math.min(shareStart.y, e.offsetY);
  const w = Math.abs(e.offsetX - shareStart.x);
  const h = Math.abs(e.offsetY - shareStart.y);
  shareOverlay.style.left = x + 'px';
  shareOverlay.style.top = y + 'px';
  shareOverlay.style.width = w + 'px';
  shareOverlay.style.height = h + 'px';
  shareOverlay.classList.add('active');
});
canvasWrapper.addEventListener('mouseup', () => {
  shareDrag = false;
  shareStart = null;
  if (state.isSharing) shareHint.classList.remove('show');
});

// Touch support for screen share
canvasWrapper.addEventListener('touchstart', e => {
  if (!state.isSharing) return;
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvasWrapper.getBoundingClientRect();
  shareDrag = true;
  shareStart = { x: t.clientX - rect.left, y: t.clientY - rect.top };
}, { passive: false });
canvasWrapper.addEventListener('touchmove', e => {
  if (!shareDrag || !shareStart) return;
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvasWrapper.getBoundingClientRect();
  const x = Math.min(shareStart.x, t.clientX - rect.left);
  const y = Math.min(shareStart.y, t.clientY - rect.top);
  const w = Math.abs(t.clientX - rect.left - shareStart.x);
  const h = Math.abs(t.clientY - rect.top - shareStart.y);
  shareOverlay.style.left = x + 'px';
  shareOverlay.style.top = y + 'px';
  shareOverlay.style.width = w + 'px';
  shareOverlay.style.height = h + 'px';
  shareOverlay.classList.add('active');
}, { passive: false });
canvasWrapper.addEventListener('touchend', () => {
  shareDrag = false;
  shareStart = null;
  if (state.isSharing) shareHint.classList.remove('show');
});

// ==================== Recording ====================
document.getElementById('recordBtn').addEventListener('click', function() {
  const btn = this;
  if (state.isRecording) {
    // Stop
    state.isRecording = false;
    clearInterval(state.recTimer);
    btn.classList.remove('recording');
    btn.title = '录制';
    recIndicator.classList.remove('show');
    // Show a brief confirmation
    const msg = document.createElement('div');
    msg.textContent = '✅ 录制已保存';
    msg.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:16px 32px;border-radius:12px;font-size:16px;z-index:9999;animation:fadeOut 2s forwards;';
    document.body.appendChild(msg);
    setTimeout(() => msg.remove(), 2000);
  } else {
    // Start
    state.isRecording = true;
    state.recStartTime = Date.now();
    btn.classList.add('recording');
    btn.title = '停止录制';
    recIndicator.classList.add('show');
    state.recTimer = setInterval(() => {
      const elapsed = Math.floor((Date.now() - state.recStartTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      recTimeEl.textContent = `${m}:${s}`;
    }, 1000);
  }
});

// ==================== Sidebar Toggle (Mobile) ====================
document.getElementById('toggleSidebar').addEventListener('click', () => {
  sidebar.classList.toggle('open');
});

// Close sidebar when clicking outside on mobile
document.addEventListener('click', e => {
  if (window.innerWidth <= 768 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !e.target.closest('#toggleSidebar')) {
    sidebar.classList.remove('open');
  }
});

// ==================== End Class ====================
document.getElementById('endBtn').addEventListener('click', () => {
  if (confirm('确定要结束课程吗？所有内容将被清空。')) {
    state.drawings = [];
    state.messages = [];
    state.isRecording = false;
    clearInterval(state.recTimer);
    recIndicator.classList.remove('show');
    document.getElementById('recordBtn').classList.remove('recording');
    redrawAll();
    renderMessages();
    alert('课程已结束');
  }
});

// ==================== Init ====================
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Fade out animation for recording saved message
const style = document.createElement('style');
style.textContent = '@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}';
document.head.appendChild(style);
</script>
