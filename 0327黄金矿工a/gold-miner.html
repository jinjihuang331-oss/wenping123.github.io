<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黄金矿工</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a0a00;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Microsoft YaHei', sans-serif;
  overflow: hidden;
}
#gameContainer {
  position: relative;
  width: 900px;
  height: 650px;
  border: 4px solid #8b6914;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}
canvas { display: block; }
#startScreen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(180deg, #2c1810 0%, #1a0a00 50%, #0d0500 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
#startScreen h1 {
  font-size: 56px;
  color: #ffd700;
  text-shadow: 0 0 20px #ffa500, 0 4px 8px #000;
  margin-bottom: 15px;
  letter-spacing: 8px;
}
#startScreen p {
  color: #c9a227;
  font-size: 18px;
  margin-bottom: 40px;
}
#startScreen .btn-row {
  display: flex;
  gap: 30px;
  margin-bottom: 30px;
}
#startScreen button {
  padding: 16px 50px;
  font-size: 22px;
  border: 3px solid #ffd700;
  border-radius: 12px;
  background: linear-gradient(180deg, #8b6914, #5c4409);
  color: #ffd700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.3s;
}
#startScreen button:hover {
  background: linear-gradient(180deg, #a67c00, #6b5000);
  transform: scale(1.08);
  box-shadow: 0 0 20px #ffa500;
}
#startScreen .info {
  color: #a08020;
  font-size: 14px;
  line-height: 2;
  text-align: center;
}
#startScreen .info span {
  color: #ffd700;
  font-weight: bold;
}
#overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 20;
  background: rgba(0,0,0,0.7);
  font-size: 52px;
  color: #ffd700;
  text-shadow: 0 0 30px #ff6600, 0 0 60px #ff0000;
  animation: winPulse 0.5s ease infinite alternate;
}
@keyframes winPulse {
  from { transform: scale(1); text-shadow: 0 0 30px #ff6600; }
  to { transform: scale(1.1); text-shadow: 0 0 50px #ffd700, 0 0 80px #ff6600; }
}
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  animation: confettiFall 3s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(700px) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="canvas" width="900" height="650"></canvas>
  <div id="startScreen">
    <h1>黄金矿工</h1>
    <p>挖出宝藏，成为富翁！</p>
    <div class="btn-row">
      <button id="btn1P">单人模式</button>
      <button id="btn2P">双人模式</button>
    </div>
    <div class="info">
      玩家A（红色矿工）：<span>S</span>键放钩<br>
      玩家B（蓝色矿工）：<span>↓</span>键放钩<br>
      目标分数：<span>800</span>分
    </div>
  </div>
  <div id="overlay"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startScreen = document.getElementById('startScreen');

// --- Game config ---
const WIN_SCORE = 800;
const W = 900, H = 650;
const SURFACE_Y = 95;
const GROUND_Y = SURFACE_Y + 5;
const HOOK_SWING_SPEED = 0.025;
const HOOK_EXTEND_SPEED = 6;

// Item definitions
const ITEM_TYPES = {
  gold_small:  { w: 26, h: 24, weight: 15, value: 50,  color: '#d4a000', highlight: '#ffe066' },
  gold_medium: { w: 38, h: 34, weight: 30, value: 120, color: '#c9a000', highlight: '#ffd700' },
  gold_large:  { w: 50, h: 46, weight: 55, value: 250, color: '#b8860b', highlight: '#ffc125' },
  rock_small:  { w: 28, h: 26, weight: 40, value: 10, color: '#6b6b6b', highlight: '#999' },
  rock_large:  { w: 48, h: 44, weight: 80, value: 20, color: '#5a5a5a', highlight: '#888' },
  diamond:     { w: 18, h: 22, weight: 3, value: 800, color: '#00d4ff', highlight: '#80ffff' },
  pig:         { w: 30, h: 22, weight: 4, value: 3, color: '#ffb6c1', highlight: '#ff69b4', move: true },
  bomb:        { w: 22, h: 28, weight: 6, value: 2, color: '#2a2a2a', highlight: '#444' },
};

// --- State ---
let gameMode = 1; // 1 or 2
let running = false;
let players = [];
let items = [];
let explosions = [];
let frameCount = 0;

// --- Helper ---
function rand(min, max) { return Math.random() * (max - min) + min; }
function dist(x1, y1, x2, y2) { return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2); }

// --- Player class ---
class Player {
  constructor(x, color, hookColor, name) {
    this.x = x;
    this.y = SURFACE_Y;
    this.color = color;
    this.hookColor = hookColor;
    this.name = name;
    this.score = 0;
    this.angle = 0;
    this.angleDir = 1;
    this.state = 'swing'; // swing, extend, retract
    this.hookX = x;
    this.hookY = SURFACE_Y;
    this.hookLen = 35;
    this.maxLen = 500;
    this.hookedItem = null;
    this.retractSpeed = 4;
    this.win = false;
  }

  resetHook() {
    this.state = 'swing';
    this.hookedItem = null;
    this.hookX = this.x;
    this.hookY = this.y;
    this.hookLen = 35;
  }

  update() {
    if (this.win) return;

    if (this.state === 'swing') {
      this.angle += HOOK_SWING_SPEED * this.angleDir;
      if (this.angle > Math.PI * 0.42) this.angleDir = -1;
      if (this.angle < -Math.PI * 0.42) this.angleDir = 1;
      this.hookX = this.x + Math.sin(this.angle) * this.hookLen;
      this.hookY = this.y + Math.cos(this.angle) * this.hookLen;
    }
    else if (this.state === 'extend') {
      this.hookX += Math.sin(this.angle) * HOOK_EXTEND_SPEED;
      this.hookY += Math.cos(this.angle) * HOOK_EXTEND_SPEED;
      this.hookLen += HOOK_EXTEND_SPEED;

      // Check collision with items
      if (!this.hookedItem) {
        for (let item of items) {
          if (item.caught || item.exploding) continue;
          if (this.checkCollision(item)) {
            this.hookedItem = item;
            item.caught = true;
            this.state = 'retract';
            this.retractSpeed = Math.max(1.5, 5 - item.weight * 0.04);
            if (item.type === 'bomb') {
              // Explosion effect
              explosions.push({ x: item.x, y: item.y, r: 0, maxR: 60, alpha: 1 });
              item.exploding = true;
              this.retractSpeed = 8; // fast pull after bomb
              this.hookedItem = null;
            }
            break;
          }
        }
      }

      // Check screen bounds
      if (this.hookX < -20 || this.hookX > W + 20 || this.hookY > H + 20) {
        this.state = 'retract';
        this.retractSpeed = 5;
      }
    }
    else if (this.state === 'retract') {
      const speed = this.hookedItem ? this.retractSpeed : this.retractSpeed;
      this.hookX -= Math.sin(this.angle) * speed;
      this.hookY -= Math.cos(this.angle) * speed;
      this.hookLen -= speed;

      if (this.hookLen <= 35) {
        if (this.hookedItem && !this.hookedItem.exploding) {
          this.score += this.hookedItem.value;
        }
        this.resetHook();
        this.checkWin();
      }
    }
  }

  checkCollision(item) {
    const cx = this.hookX, cy = this.hookY;
    const hw = item.w / 2, hh = item.h / 2;
    // Circle-rectangle collision (hook tip is ~8px radius)
    const closestX = Math.max(item.x - hw, Math.min(cx, item.x + hw));
    const closestY = Math.max(item.y - hh, Math.min(cy, item.y + hh));
    return dist(cx, cy, closestX, closestY) < 12;
  }

  checkWin() {
    if (this.score >= WIN_SCORE) {
      this.win = true;
      if (gameMode === 1) {
        showWin();
      }
    }
  }

  draw() {
    // Draw miner body
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y - 15, 18, 0, Math.PI * 2);
    ctx.fill();
    // Hard hat
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(this.x - 16, this.y - 40, 32, 14);
    ctx.fillRect(this.x - 12, this.y - 50, 24, 12);
    // Face
    ctx.fillStyle = '#f4c79a';
    ctx.beginPath();
    ctx.arc(this.x, this.y - 22, 10, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(this.x - 4, this.y - 24, 2, 0, Math.PI * 2);
    ctx.arc(this.x + 4, this.y - 24, 2, 0, Math.PI * 2);
    ctx.fill();
    // Smile
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(this.x, this.y - 21, 5, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();

    // Draw rope
    ctx.strokeStyle = '#8b6914';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.hookX, this.hookY);
    ctx.stroke();

    // Draw hook
    ctx.strokeStyle = this.hookColor;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(this.hookX, this.hookY);
    ctx.lineTo(this.hookX + Math.sin(this.angle + 0.3) * 12, this.hookY + Math.cos(this.angle + 0.3) * 12);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(this.hookX + Math.sin(this.angle + 0.3) * 12, this.hookY + Math.cos(this.angle + 0.3) * 12, 5, 0, Math.PI * 2);
    ctx.strokeStyle = this.hookColor;
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Draw hooked item attached to hook
    if (this.hookedItem && !this.hookedItem.exploding) {
      this.drawItem(this.hookedItem, this.hookX, this.hookY);
    }
  }

  drawItem(item, ox, oy) {
    const def = ITEM_TYPES[item.type];
    const x = ox;
    const y = oy + def.h / 2 + 8;

    if (item.type === 'diamond') {
      // Diamond shape
      ctx.fillStyle = def.color;
      ctx.beginPath();
      ctx.moveTo(x, y - def.h / 2);
      ctx.lineTo(x + def.w / 2, y - def.h / 4);
      ctx.lineTo(x, y + def.h / 2);
      ctx.lineTo(x - def.w / 2, y - def.h / 4);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = def.highlight;
      ctx.beginPath();
      ctx.moveTo(x, y - def.h / 2);
      ctx.lineTo(x + def.w / 4, y - def.h / 8);
      ctx.lineTo(x, y + def.h / 4);
      ctx.lineTo(x - def.w / 4, y - def.h / 8);
      ctx.closePath();
      ctx.fill();
    }
    else if (item.type === 'pig') {
      // Pig body
      ctx.fillStyle = def.color;
      ctx.beginPath();
      ctx.ellipse(x, y, def.w / 2, def.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Snout
      ctx.fillStyle = '#ff99aa';
      ctx.beginPath();
      ctx.ellipse(x + (item.dir || 1) * 6, y, 8, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eye
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(x + (item.dir || 1) * 4, y - 4, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    else if (item.type === 'bomb') {
      // Bomb body
      ctx.fillStyle = def.color;
      ctx.beginPath();
      ctx.arc(x, y, def.w / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = def.highlight;
      ctx.beginPath();
      ctx.arc(x - 3, y - 3, 4, 0, Math.PI * 2);
      ctx.fill();
      // Fuse
      ctx.strokeStyle = '#8b6914';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, y - def.w / 2);
      ctx.quadraticCurveTo(x + 8, y - def.w / 2 - 8, x + 5, y - def.w / 2 - 12);
      ctx.stroke();
      // Spark
      if (!item.exploding) {
        ctx.fillStyle = frameCount % 6 < 3 ? '#ff4400' : '#ffcc00';
        ctx.beginPath();
        ctx.arc(x + 5, y - def.w / 2 - 12, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    else {
      // Gold / Rock
      ctx.fillStyle = def.color;
      ctx.beginPath();
      ctx.moveTo(x - def.w / 2, y - def.h / 3);
      ctx.lineTo(x - def.w / 4, y - def.h / 2);
      ctx.lineTo(x + def.w / 4, y - def.h / 2);
      ctx.lineTo(x + def.w / 2, y - def.h / 4);
      ctx.lineTo(x + def.w / 2 + 2, y);
      ctx.lineTo(x + def.w / 3, y + def.h / 2);
      ctx.lineTo(x - def.w / 3, y + def.h / 2);
      ctx.lineTo(x - def.w / 2 - 2, y);
      ctx.closePath();
      ctx.fill();
      // Highlight
      ctx.fillStyle = def.highlight;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.moveTo(x - def.w / 4, y - def.h / 3);
      ctx.lineTo(x, y - def.h / 2);
      ctx.lineTo(x + def.w / 6, y - def.h / 3);
      ctx.lineTo(x - def.w / 6, y - def.h / 6);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  drop() {
    if (this.state !== 'swing' || this.win) return;
    this.state = 'extend';
  }
}

// --- Items ---
function createItems() {
  items = [];
  const usedZones = [];
  const zoneW = W / 4;
  const zoneH = (H - GROUND_Y) / 3;

  function isOverlapping(x, y, w, h) {
    for (let z of usedZones) {
      if (Math.abs(x - z.x) < (w + z.w) / 2 + 15 && Math.abs(y - z.y) < (h + z.h) / 2 + 15)
        return true;
    }
    return false;
  }

  function addItem(type) {
    const def = ITEM_TYPES[type];
    let x, y, attempts = 0;
    do {
      x = rand(def.w + 20, W - def.w - 20);
      y = rand(GROUND_Y + def.h / 2 + 20, H - def.h / 2 - 10);
      attempts++;
    } while (isOverlapping(x, y, def.w, def.h) && attempts < 100);

    usedZones.push({ x, y, w: def.w, h: def.h });
    return { type, x, y, caught: false, exploding: false, dir: Math.random() < 0.5 ? 1 : -1 };
  }

  // At least 3 diamonds
  items.push(addItem('diamond'));
  items.push(addItem('diamond'));
  items.push(addItem('diamond'));

  // Gold mines (various sizes)
  items.push(addItem('gold_small'));
  items.push(addItem('gold_small'));
  items.push(addItem('gold_small'));
  items.push(addItem('gold_medium'));
  items.push(addItem('gold_medium'));
  items.push(addItem('gold_large'));

  // Rocks
  items.push(addItem('rock_small'));
  items.push(addItem('rock_small'));
  items.push(addItem('rock_large'));

  // Pigs (moving)
  items.push(addItem('pig'));
  items.push(addItem('pig'));

  // Bombs
  items.push(addItem('bomb'));
  items.push(addItem('bomb'));
  items.push(addItem('bomb'));
}

// --- Drawing ---

function drawBackground() {
  // Sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, SURFACE_Y);
  skyGrad.addColorStop(0, '#1a3a6e');
  skyGrad.addColorStop(0.5, '#2d5a87');
  skyGrad.addColorStop(1, '#4a8ab8');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, SURFACE_Y);

  // Sun
  ctx.fillStyle = '#ffdd44';
  ctx.beginPath();
  ctx.arc(W - 80, 40, 25, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffee88';
  ctx.beginPath();
  ctx.arc(W - 80, 40, 18, 0, Math.PI * 2);
  ctx.fill();

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  [[120, 30], [350, 50], [600, 25]].forEach(([cx, cy]) => {
    ctx.beginPath();
    ctx.arc(cx, cy, 20, 0, Math.PI * 2);
    ctx.arc(cx + 25, cy - 5, 16, 0, Math.PI * 2);
    ctx.arc(cx - 20, cy + 2, 14, 0, Math.PI * 2);
    ctx.fill();
  });

  // Ground layers
  // Grass / topsoil
  ctx.fillStyle = '#2d5016';
  ctx.fillRect(0, SURFACE_Y, W, 8);
  // Dirt gradient
  const dirtGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  dirtGrad.addColorStop(0, '#5c3d1e');
  dirtGrad.addColorStop(0.15, '#4a2e10');
  dirtGrad.addColorStop(0.4, '#3d2a0a');
  dirtGrad.addColorStop(0.7, '#2e1e08');
  dirtGrad.addColorStop(1, '#1a1200');
  ctx.fillStyle = dirtGrad;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Dirt texture (small dots)
  ctx.fillStyle = 'rgba(80,50,20,0.3)';
  for (let i = 0; i < 80; i++) {
    const dx = rand(0, W);
    const dy = rand(GROUND_Y + 10, H);
    const dr = rand(1, 3);
    ctx.beginPath();
    ctx.arc(dx, dy, dr, 0, Math.PI * 2);
    ctx.fill();
  }

  // Underground grid lines (subtle)
  ctx.strokeStyle = 'rgba(60,40,15,0.15)';
  ctx.lineWidth = 0.5;
  for (let y = GROUND_Y + 40; y < H; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  for (let x = 40; x < W; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
}

function drawItems() {
  for (let item of items) {
    if (item.caught) continue;

    // Update pig movement
    if (item.type === 'pig') {
      item.x += (item.dir || 1) * 0.8;
      if (item.x < 30) item.dir = 1;
      if (item.x > W - 30) item.dir = -1;
    }

    players.forEach(p => {
      if (p.hookedItem === item) return;
      p.drawItem(item, item.x, item.y);
    });
  }
}

function drawExplosions() {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const e = explosions[i];
    e.r += 4;
    e.alpha -= 0.03;

    // Flash
    if (e.alpha > 0.5) {
      ctx.fillStyle = `rgba(255, 255, 200, ${e.alpha * 0.5})`;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Outer ring
    ctx.strokeStyle = `rgba(255, ${Math.floor(100 + e.r * 2)}, 0, ${e.alpha})`;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.stroke();

    // Inner ring
    ctx.strokeStyle = `rgba(255, 200, 0, ${e.alpha * 0.7})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r * 0.5, 0, Math.PI * 2);
    ctx.stroke();

    // Particles
    for (let j = 0; j < 3; j++) {
      const angle = (frameCount * 0.1 + j * 2.1) % (Math.PI * 2);
      const px = e.x + Math.cos(angle) * e.r * 0.7;
      const py = e.y + Math.sin(angle) * e.r * 0.7;
      ctx.fillStyle = `rgba(255, ${150 + Math.floor(Math.random() * 100)}, 0, ${e.alpha})`;
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    if (e.alpha <= 0) explosions.splice(i, 1);
  }
}

function drawScorePanel() {
  // Score background panel
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, 28);

  players.forEach((p, i) => {
    const label = gameMode === 1 ? '得分' : `${p.name} 得分`;
    const x = gameMode === 1 ? W / 2 : (i === 0 ? W * 0.25 : W * 0.75);
    const align = gameMode === 1 ? 'center' : 'center';

    ctx.fillStyle = p.color;
    ctx.font = 'bold 18px Microsoft YaHei';
    ctx.textAlign = align;
    ctx.fillText(`${label}: ${p.score} / ${WIN_SCORE}`, x, 20);
  });
}

function drawTargetLine() {
  // Target indicator
  if (gameMode === 1) {
    ctx.fillStyle = 'rgba(255,215,0,0.8)';
    ctx.font = 'bold 14px Microsoft YaHei';
    ctx.textAlign = 'center';
    ctx.fillText(`目标: ${WIN_SCORE}分`, W / 2, 48);
  } else {
    players.forEach((p, i) => {
      const x = i === 0 ? W * 0.25 : W * 0.75;
      ctx.fillStyle = p.color;
      ctx.font = 'bold 13px Microsoft YaHei';
      ctx.textAlign = 'center';
      ctx.fillText(`${p.name}: ${p.score}/${WIN_SCORE}`, x, 48);
    });
  }
}

// --- Win ---
function showWin() {
  running = false;
  overlay.style.display = 'flex';
  overlay.innerHTML = '<div>恭喜通关！🎉</div>';

  // Create confetti
  const colors = ['#ff0', '#f0f', '#0ff', '#0f0', '#f00', '#ff6600'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.top = '-20px';
    c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    c.style.width = (5 + Math.random() * 10) + 'px';
    c.style.height = (5 + Math.random() * 10) + 'px';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    c.style.animationDelay = Math.random() * 2 + 's';
    overlay.appendChild(c);
  }
}

// --- Input ---
document.addEventListener('keydown', (e) => {
  if (!running) return;
  if (e.key === 's' || e.key === 'S') {
    players[0].drop();
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (players[1]) players[1].drop();
  }
});

// --- Start buttons ---
document.getElementById('btn1P').addEventListener('click', () => {
  gameMode = 1;
  startGame(1);
});
document.getElementById('btn2P').addEventListener('click', () => {
  gameMode = 2;
  startGame(2);
});

// --- Game loop ---
function startGame(mode) {
  startScreen.style.display = 'none';
  overlay.style.display = 'none';
  overlay.innerHTML = '';
  explosions = [];

  players = [];
  if (mode === 1) {
    players.push(new Player(W / 2, '#e74c3c', '#c0392b', '玩家A'));
  } else {
    players.push(new Player(W * 0.3, '#e74c3c', '#c0392b', '玩家A'));
    players.push(new Player(W * 0.7, '#3498db', '#2980b9', '玩家B'));
  }

  createItems();
  running = true;
  requestAnimationFrame(gameLoop);
}

function gameLoop() {
  if (!running) return;

  ctx.clearRect(0, 0, W, H);

  drawBackground();
  drawItems();
  drawExplosions();

  players.forEach(p => {
    p.update();
    p.draw();
  });

  drawScorePanel();
  drawTargetLine();

  frameCount++;
  requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
