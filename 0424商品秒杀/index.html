<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品秒杀</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    /* ===== 秒杀卡片 ===== */
    .flash-sale {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .1);
    }

    /* 顶部横幅 */
    .flash-sale__header {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: #fff;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .flash-sale__title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* ===== 倒计时 ===== */
    .countdown {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .countdown__label {
      font-size: 12px;
      margin-right: 4px;
      opacity: .85;
    }

    .countdown__block {
      background: rgba(0, 0, 0, .25);
      border-radius: 6px;
      min-width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .countdown__sep {
      font-weight: 700;
      opacity: .6;
    }

    /* ===== 商品信息 ===== */
    .flash-sale__body { padding: 20px 24px 24px; }

    .product {
      display: flex;
      gap: 16px;
      margin-bottom: 18px;
    }

    .product__image {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      background: #fef0ef;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 48px;
    }

    .product__info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }

    .product__name {
      font-size: 16px;
      font-weight: 600;
      color: #222;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product__price {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .product__price--sale {
      font-size: 24px;
      font-weight: 800;
      color: #e74c3c;
    }

    .product__price--sale::before { content: "¥"; font-size: 14px; }

    .product__price--origin {
      font-size: 13px;
      color: #999;
      text-decoration: line-through;
    }

    /* ===== 限购提示 ===== */
    .limit-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fff4e5;
      color: #e67e22;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid #fde2bf;
      margin-bottom: 14px;
    }

    /* ===== 库存进度条 ===== */
    .stock { margin-bottom: 20px; }

    .stock__top {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    .stock__bar {
      height: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      overflow: hidden;
    }

    .stock__fill {
      height: 100%;
      border-radius: 5px;
      background: linear-gradient(90deg, #f39c12, #e74c3c);
      transition: width .6s ease;
    }

    .stock__warn {
      color: #e74c3c;
      font-weight: 600;
    }

    /* ===== 抢购按钮 ===== */
    .btn-buy {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 25px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all .25s;
      position: relative;
      overflow: hidden;
    }

    .btn-buy--before {
      background: #ccc;
      color: #888;
      cursor: not-allowed;
    }

    .btn-buy--active {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: #fff;
      box-shadow: 0 4px 15px rgba(231, 76, 60, .4);
    }

    .btn-buy--active:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(231, 76, 60, .5);
    }

    .btn-buy--active:active {
      transform: translateY(0);
    }

    /* 点击后脉冲动画 */
    .btn-buy--active::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, .3);
      border-radius: inherit;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    .btn-buy--end {
      background: #eee;
      color: #bbb;
      cursor: not-allowed;
    }

    /* ===== Toast ===== */
    .toast-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      z-index: 100;
      justify-content: center;
      align-items: center;
      animation: fadeIn .25s;
    }

    .toast-overlay.show { display: flex; }

    .toast {
      background: #fff;
      border-radius: 14px;
      padding: 32px 40px;
      text-align: center;
      min-width: 260px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .2);
      animation: popIn .3s cubic-bezier(.34, 1.56, .64, 1);
    }

    .toast__icon { font-size: 56px; margin-bottom: 12px; }

    .toast__title {
      font-size: 18px;
      font-weight: 700;
      color: #222;
      margin-bottom: 6px;
    }

    .toast__msg {
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
    }

    .toast__btn {
      background: #e74c3c;
      color: #fff;
      border: none;
      padding: 10px 36px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>

<div class="flash-sale">
  <!-- 头部 -->
  <div class="flash-sale__header">
    <div class="flash-sale__title">&#9889; 限时秒杀</div>
    <div class="countdown">
      <span class="countdown__label" id="cdLabel">距开始</span>
      <div class="countdown__block" id="cdDays">00</div>
      <span class="countdown__sep">:</span>
      <div class="countdown__block" id="cdHours">00</div>
      <span class="countdown__sep">:</span>
      <div class="countdown__block" id="cdMins">00</div>
      <span class="countdown__sep">:</span>
      <div class="countdown__block" id="cdSecs">00</div>
    </div>
  </div>

  <!-- 商品 -->
  <div class="flash-sale__body">
    <div class="product">
      <div class="product__image">&#128241;</div>
      <div class="product__info">
        <div class="product__name">Apple iPhone 16 Pro Max 256GB 全网通5G手机</div>
        <div>
          <div class="product__price">
            <span class="product__price--sale" id="salePrice">6999</span>
            <span class="product__price--origin">¥9999</span>
          </div>
          <div class="limit-tag">&#128274; 限购 <strong id="limitNum">2</strong> 件/人</div>
        </div>
      </div>
    </div>

    <!-- 库存 -->
    <div class="stock">
      <div class="stock__top">
        <span>已抢 <strong id="soldCount">0</strong> 件</span>
        <span>剩余 <strong id="leftCount">0</strong> 件</span>
      </div>
      <div class="stock__bar">
        <div class="stock__fill" id="stockFill" style="width: 0%"></div>
      </div>
    </div>

    <!-- 按钮 -->
    <button class="btn-buy btn-buy--before" id="btnBuy">秒杀未开始</button>
  </div>
</div>

<!-- Toast 弹窗 -->
<div class="toast-overlay" id="overlay">
  <div class="toast">
    <div class="toast__icon" id="toastIcon"></div>
    <div class="toast__title" id="toastTitle"></div>
    <div class="toast__msg" id="toastMsg"></div>
    <button class="toast__btn" id="toastBtn">我知道了</button>
  </div>
</div>

<script>
  // ============ 可配置参数 ============
  const CONFIG = {
    startTime: getFutureDate(0, 0, 5),   // 秒杀开始时间（5 分钟后）
    endTime:   getFutureDate(0, 1, 5),   // 秒杀结束时间（1 小时 5 分钟后）
    totalStock: 100,                     // 总库存
    limitPerUser: 2,                     // 每人限购
    successRate: 0.4,                    // 模拟抢购成功率 40%
  };

  // ============ 状态 ============
  let purchased = 0;                     // 当前用户已购买数量
  let currentStock = CONFIG.totalStock;
  let phase = 'before';                  // before | active | end

  // ============ DOM ============
  const $cdLabel  = document.getElementById('cdLabel');
  const $cdDays   = document.getElementById('cdDays');
  const $cdHours  = document.getElementById('cdHours');
  const $cdMins   = document.getElementById('cdMins');
  const $cdSecs   = document.getElementById('cdSecs');
  const $btnBuy   = document.getElementById('btnBuy');
  const $sold     = document.getElementById('soldCount');
  const $left     = document.getElementById('leftCount');
  const $fill     = document.getElementById('stockFill');
  const $overlay  = document.getElementById('overlay');
  const $tIcon    = document.getElementById('toastIcon');
  const $tTitle   = document.getElementById('toastTitle');
  const $tMsg     = document.getElementById('toastMsg');
  const $tBtn     = document.getElementById('toastBtn');

  // ============ 工具 ============
  function getFutureDate(days, hours, mins) {
    return new Date(Date.now() + days * 86400000 + hours * 3600000 + mins * 60000);
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function diff(ms) {
    if (ms <= 0) return { d: 0, h: 0, m: 0, s: 0 };
    const s = Math.floor(ms / 1000);
    return {
      d: Math.floor(s / 86400),
      h: Math.floor((s % 86400) / 3600),
      m: Math.floor((s % 3600) / 60),
      s: s % 60,
    };
  }

  // ============ 倒计时 ============
  function tick() {
    const now = Date.now();
    let remaining, label;

    if (now < CONFIG.startTime.getTime()) {
      remaining = CONFIG.startTime.getTime() - now;
      label = '距开始';
      setPhase('before');
    } else if (now < CONFIG.endTime.getTime()) {
      remaining = CONFIG.endTime.getTime() - now;
      label = '距结束';
      setPhase('active');
    } else {
      remaining = 0;
      label = '已结束';
      setPhase('end');
    }

    const t = diff(remaining);
    $cdLabel.textContent = label;
    $cdDays.textContent  = pad(t.d);
    $cdHours.textContent = pad(t.h);
    $cdMins.textContent  = pad(t.m);
    $cdSecs.textContent  = pad(t.s);
  }

  // ============ 阶段切换 ============
  function setPhase(p) {
    if (p === phase) return;
    phase = p;
    const btn = $btnBuy;
    btn.className = 'btn-buy btn-buy--' + (p === 'before' ? 'before' : p === 'active' ? 'active' : 'end');
    btn.textContent = phase === 'before' ? '秒杀未开始' : phase === 'active' ? '立即抢购' : '已结束';
  }

  // ============ 库存渲染（含模拟并发） ============
  function renderStock() {
    const sold = CONFIG.totalStock - currentStock;
    $sold.textContent = sold;
    $left.textContent = currentStock;
    const pct = ((sold / CONFIG.totalStock) * 100).toFixed(1);
    $fill.style.width = pct + '%';
  }

  // 每隔一段时间模拟其他人抢购，库存递减
  function simulateOthers() {
    if (phase !== 'active' || currentStock <= 0) return;
    const take = Math.floor(Math.random() * 3) + 1; // 1-3 件
    currentStock = Math.max(0, currentStock - take);
    renderStock();
    if (currentStock === 0) setPhase('end');
  }

  // ============ Toast ============
  function showToast(icon, title, msg) {
    $tIcon.textContent  = icon;
    $tTitle.textContent = title;
    $tMsg.textContent   = msg;
    $overlay.classList.add('show');
  }

  function closeToast() { $overlay.classList.remove('show'); }

  $tBtn.addEventListener('click', closeToast);
  $overlay.addEventListener('click', (e) => { if (e.target === $overlay) closeToast(); });

  // ============ 抢购 ============
  $btnBuy.addEventListener('click', () => {
    if (phase === 'before' || phase === 'end') return;

    // 库存不足
    if (currentStock <= 0) {
      showToast('😢', '手慢了', '商品已被抢光，下次再来吧！');
      return;
    }

    // 超出限购
    if (purchased >= CONFIG.limitPerUser) {
      showToast('🚫', '超出限购', `每人限购 ${CONFIG.limitPerUser} 件，您已购买 ${purchased} 件`);
      return;
    }

    // 模拟网络请求ing
    $btnBuy.textContent = '抢购中...';
    $btnBuy.style.pointerEvents = 'none';

    setTimeout(() => {
      $btnBuy.style.pointerEvents = '';

      if (phase !== 'active') {
        $btnBuy.textContent = '已结束';
        return;
      }

      const success = currentStock > 0 && Math.random() < CONFIG.successRate;

      if (success) {
        purchased++;
        currentStock--;
        renderStock();
        showToast('🎉', '抢购成功！', `您已成功抢购 ${purchased}/${CONFIG.limitPerUser} 件`);
      } else {
        showToast('💔', '抢购失败', '当前人数过多，请再试一次');
      }

      if (currentStock === 0) {
        setPhase('end');
      } else {
        $btnBuy.textContent = purchased >= CONFIG.limitPerUser ? `已购 ${purchased} 件` : '立即抢购';
        if (purchased >= CONFIG.limitPerUser) {
          $btnBuy.className = 'btn-buy btn-buy--end';
        }
      }
    }, 800 + Math.random() * 1200); // 模拟 0.8~2s 网络延迟
  });

  // ============ 启动 ============
  renderStock();
  tick();
  setInterval(tick, 1000);
  setInterval(simulateOthers, 2000); // 每 2 秒模拟其他人抢购
</script>

</body>
</html>
