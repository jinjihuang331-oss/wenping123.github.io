<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月度消费统计</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f6fa;
    padding: 40px 20px;
    min-height: 100vh;
  }
  .page-title {
    text-align: center;
    font-size: 28px;
    font-weight: 600;
    color: #2c3e50;
    margin-bottom: 8px;
  }
  .page-subtitle {
    text-align: center;
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 36px;
  }
  .charts-container {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
  }
  .chart-card {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .chart-title {
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 20px;
  }
  .chart-wrap {
    position: relative;
    height: 320px;
  }
  @media (max-width: 800px) {
    .charts-container {
      grid-template-columns: 1fr;
    }
    .page-title { font-size: 22px; }
    .chart-wrap { height: 280px; }
  }
</style>
</head>
<body>

<h1 class="page-title">月度消费统计</h1>
<p class="page-subtitle">2026年3月</p>

<div class="charts-container">

  <!-- 每日消费折线图 -->
  <div class="chart-card">
    <h2 class="chart-title">每日消费趋势</h2>
    <div class="chart-wrap">
      <canvas id="dailyChart"></canvas>
    </div>
  </div>

  <!-- 品类占比柱状图 -->
  <div class="chart-card">
    <h2 class="chart-title">品类消费占比</h2>
    <div class="chart-wrap">
      <canvas id="categoryChart"></canvas>
    </div>
  </div>

</div>

<script>
// 模拟数据
const days = Array.from({length: 28}, (_, i) => (i + 1) + '日');
const dailyData = [45, 120, 0, 78, 230, 56, 310, 88, 0, 165, 42, 198,
  320, 75, 0, 140, 260, 55, 190, 0, 110, 85, 340, 68, 0, 220, 95, 180];

const categoryLabels = ['餐饮', '交通', '购物', '娱乐', '居住', '其他'];
const categoryData = [1650, 580, 2100, 860, 3500, 680];
const categoryPercentages = categoryData.map(v =>
  (v / categoryData.reduce((a,b) => a+b, 0) * 100).toFixed(1)
);

// 简约配色
const lineColor = '#6366f1';
const barColors = ['#6366f1','#818cf8','#a5b4fc','#c7d2fe','#ddd6fe','#e0e7ff'];
const gridColor = '#e2e8f0';
const textColor = '#64748b';

// 图表通用配置
Chart.defaults.font.family = '-apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
Chart.defaults.color = textColor;

// 1. 每日消费折线图
new Chart(document.getElementById('dailyChart'), {
  type: 'line',
  data: {
    labels: days,
    datasets: [{
      label: '消费金额（元）',
      data: dailyData,
      borderColor: lineColor,
      backgroundColor: 'rgba(99,102,241,0.08)',
      borderWidth: 2.5,
      fill: true,
      tension: 0.35,
      pointRadius: 3,
      pointHoverRadius: 7,
      pointBackgroundColor: '#fff',
      pointBorderColor: lineColor,
      pointBorderWidth: 2,
      pointHoverBackgroundColor: lineColor,
      pointHoverBorderColor: '#fff',
      pointHoverBorderWidth: 2,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: 'rgba(15,23,42,0.85)',
        titleFont: { size: 13 },
        bodyFont: { size: 14, weight: 'bold' },
        padding: { top: 10, bottom: 10, left: 14, right: 14 },
        cornerRadius: 8,
        callbacks: {
          title: ctx => '3月' + ctx[0].label,
          label: ctx => '消费：¥' + ctx.raw
        }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: {
          maxRotation: 45,
          autoSkip: true,
          maxTicksLimit: 14,
          font: { size: 11 }
        }
      },
      y: {
        beginAtZero: true,
        grid: { color: gridColor, drawBorder: false },
        ticks: {
          callback: v => '¥' + v,
          font: { size: 11 }
        }
      }
    },
    interaction: {
      intersect: false,
      mode: 'index'
    }
  }
});

// 2. 品类占比柱状图
new Chart(document.getElementById('categoryChart'), {
  type: 'bar',
  data: {
    labels: categoryLabels,
    datasets: [{
      label: '消费金额（元）',
      data: categoryData,
      backgroundColor: barColors,
      borderRadius: 8,
      borderSkipped: false,
      hoverBackgroundColor: lineColor,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: 'rgba(15,23,42,0.85)',
        titleFont: { size: 13 },
        bodyFont: { size: 14, weight: 'bold' },
        padding: { top: 10, bottom: 10, left: 14, right: 14 },
        cornerRadius: 8,
        callbacks: {
          title: ctx => ctx[0].label,
          label: ctx => {
            const pct = categoryPercentages[ctx.dataIndex];
            return '¥' + ctx.raw + '  (' + pct + '%)';
          }
        }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { font: { size: 12 } }
      },
      y: {
        beginAtZero: true,
        grid: { color: gridColor, drawBorder: false },
        ticks: {
          callback: v => '¥' + v,
          font: { size: 11 }
        }
      }
    }
  }
});
</script>

</body>
</html>
