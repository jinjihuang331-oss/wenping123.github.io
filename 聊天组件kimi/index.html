<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即时聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 700px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部 */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .online-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            opacity: 0.9;
        }

        .online-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 消息列表 */
        .message-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #fafafa;
        }

        .message-list::-webkit-scrollbar {
            width: 6px;
        }

        .message-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .message-list::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        /* 消息项 */
        .message-item {
            display: flex;
            margin-bottom: 16px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-item.self {
            flex-direction: row-reverse;
        }

        .message-item.unread .message-bubble {
            background: #fee2e2;
            border: 1px solid #fecaca;
        }

        .message-item.unread .message-bubble::before {
            content: '未读';
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message-item.self .avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .message-content {
            max-width: 70%;
            margin: 0 12px;
            position: relative;
        }

        .message-sender {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .message-item.self .message-sender {
            text-align: right;
        }

        .message-bubble {
            background: white;
            padding: 12px 16px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            word-break: break-word;
            line-height: 1.5;
            font-size: 14px;
            color: #333;
            position: relative;
        }

        .message-item.self .message-bubble {
            background: #667eea;
            color: white;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .message-item.self .message-time {
            text-align: right;
        }

        /* 系统消息 */
        .system-message {
            text-align: center;
            margin: 16px 0;
            font-size: 12px;
            color: #999;
        }

        /* 输入区域 */
        .input-area {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #eee;
        }

        .input-toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }

        .toolbar-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: #e5e5e5;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            min-height: 44px;
            max-height: 120px;
            padding: 12px 16px;
            border: 1px solid #e5e5e5;
            border-radius: 22px;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        .message-input:focus {
            border-color: #667eea;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Emoji 面板 */
        .emoji-panel {
            position: absolute;
            bottom: 100%;
            left: 16px;
            right: 16px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
            padding: 16px;
            display: none;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .emoji-panel.show {
            display: grid;
        }

        .emoji-item {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .emoji-item:hover {
            background: #f5f5f5;
        }

        .input-wrapper {
            position: relative;
        }

        /* 未读提示 */
        .unread-tip {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: #ef4444;
            color: white;
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            display: none;
            animation: bounce 0.5s ease;
        }

        .unread-tip.show {
            display: block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-4px); }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- 头部 -->
        <div class="chat-header">
            <h2>聊天室</h2>
            <span class="online-status">在线</span>
        </div>

        <!-- 未读提示 -->
        <div class="unread-tip" id="unreadTip">有新消息</div>

        <!-- 消息列表 -->
        <div class="message-list" id="messageList">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <p>开始聊天吧</p>
            </div>
        </div>

        <!-- Emoji 面板 -->
        <div class="emoji-panel" id="emojiPanel"></div>

        <!-- 输入区域 -->
        <div class="input-area">
            <div class="input-toolbar">
                <button class="toolbar-btn" id="emojiBtn" title="表情">😊</button>
                <button class="toolbar-btn" id="imageBtn" title="图片">📷</button>
                <button class="toolbar-btn" id="fileBtn" title="文件">📎</button>
            </div>
            <div class="input-wrapper">
                <textarea
                    class="message-input"
                    id="messageInput"
                    placeholder="输入消息..."
                    rows="1"
                ></textarea>
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // DOM 元素
        const messageList = document.getElementById('messageList');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPanel = document.getElementById('emojiPanel');
        const unreadTip = document.getElementById('unreadTip');

        // 状态
        let messages = [];
        let unreadCount = 0;
        let isAtBottom = true;
        let currentUser = {
            id: 1,
            name: '我',
            avatar: '我'
        };

        // Emoji 列表
        const emojis = ['😀','😃','😄','😁','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🥸','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤤','😪','😵','🤐','🥴','🤢','🤮','🤧','😷','🤒','🤕','🤑','🤠','😈','👿','👹','👺','🤡','💩','👻','💀','☠️','👽','👾','🤖','🎃','😺','😸','😹','😻','😼','😽','🙀','😿','😾'];

        // 初始化 Emoji 面板
        function initEmojiPanel() {
            emojiPanel.innerHTML = emojis.map(emoji =>
                `<div class="emoji-item">${emoji}</div>`
            ).join('');

            emojiPanel.querySelectorAll('.emoji-item').forEach(item => {
                item.addEventListener('click', () => {
                    insertEmoji(item.textContent);
                    emojiPanel.classList.remove('show');
                });
            });
        }

        // 插入 Emoji
        function insertEmoji(emoji) {
            const start = messageInput.selectionStart;
            const end = messageInput.selectionEnd;
            const value = messageInput.value;
            messageInput.value = value.slice(0, start) + emoji + value.slice(end);
            messageInput.focus();
            messageInput.setSelectionRange(start + emoji.length, start + emoji.length);
            autoResizeTextarea();
        }

        // Emoji 按钮点击
        emojiBtn.addEventListener('click', () => {
            emojiPanel.classList.toggle('show');
        });

        // 点击外部关闭 Emoji 面板
        document.addEventListener('click', (e) => {
            if (!emojiBtn.contains(e.target) && !emojiPanel.contains(e.target)) {
                emojiPanel.classList.remove('show');
            }
        });

        // 自动调整输入框高度
        function autoResizeTextarea() {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
        }

        messageInput.addEventListener('input', autoResizeTextarea);

        // 发送消息
        function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;

            const message = {
                id: Date.now(),
                content: content,
                sender: currentUser,
                isSelf: true,
                timestamp: new Date(),
                unread: false
            };

            addMessage(message);
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // 模拟对方回复
            setTimeout(() => {
                receiveMessage();
            }, 1000 + Math.random() * 2000);
        }

        // 接收消息
        function receiveMessage() {
            const replies = [
                '好的，收到！👍',
                '这也太棒了吧！',
                '哈哈，确实如此 😄',
                '稍等一下，我在忙',
                '这个主意不错！',
                'OK，没问题',
                '👏👏👏',
                '明天见！',
                '我也这么觉得',
                '太厉害了！🎉'
            ];

            const message = {
                id: Date.now(),
                content: replies[Math.floor(Math.random() * replies.length)],
                sender: { id: 2, name: '小明', avatar: '明' },
                isSelf: false,
                timestamp: new Date(),
                unread: true
            };

            addMessage(message);

            // 如果不在底部，显示未读提示
            if (!isAtBottom) {
                unreadCount++;
                unreadTip.textContent = `${unreadCount} 条新消息`;
                unreadTip.classList.add('show');
            }
        }

        // 添加消息到列表
        function addMessage(message) {
            // 移除空状态
            const emptyState = messageList.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            messages.push(message);

            const messageEl = createMessageElement(message);
            messageList.appendChild(messageEl);

            // 自动滚动到底部（如果是自己发的消息或在底部）
            if (message.isSelf || isAtBottom) {
                scrollToBottom();
                if (!message.isSelf) {
                    message.unread = false;
                    messageEl.classList.remove('unread');
                }
            }
        }

        // 创建消息元素
        function createMessageElement(message) {
            const div = document.createElement('div');
            div.className = `message-item ${message.isSelf ? 'self' : ''} ${message.unread ? 'unread' : ''}`;
            div.dataset.id = message.id;

            const time = formatTime(message.timestamp);

            div.innerHTML = `
                <div class="avatar">${message.sender.avatar}</div>
                <div class="message-content">
                    <div class="message-sender">${message.sender.name}</div>
                    <div class="message-bubble">${escapeHtml(message.content)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            // 点击未读消息标记为已读
            if (message.unread) {
                div.addEventListener('click', () => {
                    message.unread = false;
                    div.classList.remove('unread');
                });
            }

            return div;
        }

        // 格式化时间
        function formatTime(date) {
            const now = new Date();
            const isToday = date.toDateString() === now.toDateString();

            if (isToday) {
                return date.toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }
            return date.toLocaleString('zh-CN', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 滚动到底部
        function scrollToBottom() {
            messageList.scrollTop = messageList.scrollHeight;
            isAtBottom = true;
            unreadCount = 0;
            unreadTip.classList.remove('show');
        }

        // 监听滚动
        messageList.addEventListener('scroll', () => {
            const threshold = 50;
            isAtBottom = messageList.scrollHeight - messageList.scrollTop - messageList.clientHeight < threshold;

            // 如果在底部，标记所有未读消息为已读
            if (isAtBottom && unreadCount > 0) {
                messages.forEach(msg => {
                    if (msg.unread) {
                        msg.unread = false;
                        const el = messageList.querySelector(`[data-id="${msg.id}"]`);
                        if (el) el.classList.remove('unread');
                    }
                });
                unreadCount = 0;
                unreadTip.classList.remove('show');
            }
        });

        // 未读提示点击
        unreadTip.addEventListener('click', scrollToBottom);

        // 发送按钮点击
        sendBtn.addEventListener('click', sendMessage);

        // 回车发送（Shift+回车换行）
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 图片按钮（演示）
        document.getElementById('imageBtn').addEventListener('click', () => {
            messageInput.value = '[图片] 📷';
            sendMessage();
        });

        // 文件按钮（演示）
        document.getElementById('fileBtn').addEventListener('click', () => {
            messageInput.value = '[文件] 📎';
            sendMessage();
        });

        // 初始化
        initEmojiPanel();

        // 模拟欢迎消息
        setTimeout(() => {
            const welcome = {
                id: Date.now(),
                content: '欢迎来到聊天室！👋',
                sender: { id: 0, name: '系统', avatar: '系' },
                isSelf: false,
                timestamp: new Date(),
                unread: false
            };
            addMessage(welcome);
        }, 500);
    </script>
</body>
</html>
