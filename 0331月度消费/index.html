<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月度消费统计</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: #f8f9fa;
    color: #333;
    padding: 40px 20px;
  }

  .dashboard { max-width: 960px; margin: 0 auto; }

  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #888;
    margin-bottom: 32px;
  }

  /* Summary Cards */
  .summary {
    display: flex; gap: 16px; margin-bottom: 32px;
  }
  .card {
    flex: 1; background: #fff; border-radius: 12px;
    padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .card-label { font-size: 13px; color: #999; margin-bottom: 6px; }
  .card-value { font-size: 24px; font-weight: 700; color: #1a1a2e; }
  .card-value.accent { color: #4361ee; }
  .card-value.warn   { color: #f77f00; }

  /* Chart Containers */
  .chart-section {
    background: #fff; border-radius: 12px;
    padding: 28px 24px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    margin-bottom: 24px;
  }
  .chart-title {
    text-align: center; font-size: 16px; font-weight: 600;
    color: #1a1a2e; margin-bottom: 20px;
  }
  .chart-wrapper { position: relative; width: 100%; }
  .chart-wrapper.line { height: 340px; }
  .chart-wrapper.bar  { height: 320px; }

  @media (max-width: 640px) {
    .summary { flex-direction: column; }
    .chart-wrapper.line, .chart-wrapper.bar { height: 260px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="dashboard">
  <h1>月度消费统计</h1>
  <p class="subtitle">2026 年 3 月 1 日 — 3 月 31 日</p>

  <!-- Summary Cards -->
  <div class="summary">
    <div class="card">
      <div class="card-label">总支出</div>
      <div class="card-value accent">¥8,426.50</div>
    </div>
    <div class="card">
      <div class="card-label">日均消费</div>
      <div class="card-value">¥271.82</div>
    </div>
    <div class="card">
      <div class="card-label">最高单日消费</div>
      <div class="card-value warn">¥680.00</div>
    </div>
  </div>

  <!-- Line Chart -->
  <div class="chart-section">
    <div class="chart-title">每日消费趋势</div>
    <div class="chart-wrapper line">
      <canvas id="lineChart"></canvas>
    </div>
  </div>

  <!-- Bar Chart -->
  <div class="chart-section">
    <div class="chart-title">品类消费占比</div>
    <div class="chart-wrapper bar">
      <canvas id="barChart"></canvas>
    </div>
  </div>
</div>

<script>
// ── Mock Data ──────────────────────────────────────
const dailySpending = [
  120, 340, 52, 89, 210, 680, 45,
  167, 230, 98, 310, 56, 190, 420,
  78, 145, 360, 112, 58, 290, 430,
  88, 175, 25, 155, 320, 200, 95,
  410, 62, 180
];
const days     = Array.from({length: 31}, (_, i) => `3/${i + 1}`);
const categories    = ["餐饮", "交通", "购物", "娱乐", "日用", "住房"];
const categoryAmts  = [2680, 1250, 1890, 960, 620, 1026.5];
const totalSpending = 8426.5;

const COLORS = {
  primary:   "#4361ee",
  grid:      "rgba(0,0,0,0.06)",
  text:      "#666",
  barColors: ["#4361ee","#f77f00","#06d6a0","#ef476f","#118ab2","#8ac4d0"],
};

// ── Line Chart ─────────────────────────────────────
const lineCtx = document.getElementById("lineChart").getContext("2d");
const gradient = lineCtx.createLinearGradient(0, 0, 0, 340);
gradient.addColorStop(0, "rgba(67,97,238,0.18)");
gradient.addColorStop(1, "rgba(67,97,238,0.01)");

new Chart(lineCtx, {
  type: "line",
  data: {
    labels: days,
    datasets: [{
      label: "消费金额 (¥)",
      data: dailySpending,
      borderColor: COLORS.primary,
      backgroundColor: gradient,
      borderWidth: 2,
      pointRadius: 0,
      pointHoverRadius: 6,
      pointHoverBackgroundColor: "#fff",
      pointHoverBorderColor: COLORS.primary,
      pointHoverBorderWidth: 3,
      fill: true,
      tension: 0.35,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: "index", intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: "rgba(26,26,46,0.88)",
        titleFont: { size: 13 },
        bodyFont: { size: 13, weight: "600" },
        padding: 12, cornerRadius: 8, displayColors: false,
        callbacks: { label: ctx => `消费金额:  ¥${ctx.parsed.y.toFixed(2)}` },
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { color: COLORS.text, font: { size: 11 }, maxTicksLimit: 10 },
        border: { display: false },
      },
      y: {
        grid: { color: COLORS.grid },
        ticks: { color: COLORS.text, font: { size: 11 }, callback: v => `¥${v}` },
        border: { display: false },
        beginAtZero: true,
      }
    }
  }
});

// ── Bar Chart ──────────────────────────────────────
const barColors = COLORS.barColors;
const barHoverColors = barColors.map(c => {
  const r = Math.min(255, parseInt(c.slice(1,3),16) + 35);
  const g = Math.min(255, parseInt(c.slice(3,5),16) + 35);
  const b = Math.min(255, parseInt(c.slice(5,7),16) + 35);
  return `rgb(${r},${g},${b})`;
});

new Chart(document.getElementById("barChart"), {
  type: "bar",
  data: {
    labels: categories,
    datasets: [{
      label: "品类金额 (¥)",
      data: categoryAmts,
      backgroundColor: barColors,
      hoverBackgroundColor: barHoverColors,
      borderWidth: 0,
      borderRadius: 6,
      barPercentage: 0.6,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: "dataset", intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: "rgba(26,26,46,0.88)",
        titleFont: { size: 13 },
        bodyFont: { size: 13, weight: "600" },
        padding: 12, cornerRadius: 8, boxPadding: 4, displayColors: true,
        callbacks: {
          label: ctx =>
            `金额: ¥${ctx.parsed.y.toFixed(2)}  (${(ctx.parsed.y / totalSpending * 100).toFixed(1)}%)`,
        }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { color: COLORS.text, font: { size: 12 } },
        border: { display: false },
      },
      y: {
        grid: { color: COLORS.grid },
        ticks: { color: COLORS.text, font: { size: 11 }, callback: v => `¥${v}` },
        border: { display: false },
        beginAtZero: true,
      }
    }
  }
});
</script>
</body>
</html>
