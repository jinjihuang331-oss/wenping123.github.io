<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金矿工</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a0e05;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        #menu {
            text-align: center;
            z-index: 10;
            position: absolute;
        }
        #menu h1 {
            font-size: 72px;
            color: #FFD700;
            text-shadow: 3px 3px 0 #8B4513, 0 0 30px rgba(255,215,0,0.4);
            margin-bottom: 8px;
            letter-spacing: 12px;
        }
        #menu .subtitle {
            color: #CD853F;
            font-size: 22px;
            margin-bottom: 60px;
            letter-spacing: 4px;
        }
        #menu button {
            display: block;
            width: 280px;
            margin: 16px auto;
            padding: 18px 40px;
            font-size: 26px;
            color: #FFD700;
            background: linear-gradient(180deg, #6B3A1F, #3E2210);
            border: 3px solid #8B6914;
            border-radius: 12px;
            cursor: pointer;
            text-shadow: 1px 1px 3px #000;
            transition: all 0.3s;
            letter-spacing: 6px;
        }
        #menu button:hover {
            background: linear-gradient(180deg, #7B4B27, #5C3317);
            transform: scale(1.06);
            box-shadow: 0 0 25px rgba(255,215,0,0.35);
        }
        canvas {
            display: none;
            border-radius: 6px;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>黄金矿工</h1>
        <div class="subtitle">Gold Miner</div>
        <button onclick="startGame(1)">单人模式</button>
        <button onclick="startGame(2)">双人模式</button>
    </div>
    <canvas id="gameCanvas" width="1000" height="650"></canvas>

    <script>
    // ==================== CONFIGURATION ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const CW = canvas.width;
    const CH = canvas.height;

    const SURFACE_Y = 125;
    const HOOK_ORIGIN_Y = 98;
    const SWING_SPEED = 0.022;
    const MAX_ANGLE = Math.PI * 0.43;
    const EXTEND_SPEED = 5;
    const BASE_RETRACT = 6;
    const HOOK_REST = 42;
    const MAX_HOOK = 540;
    const WIN_SCORE = 800;

    // ==================== GAME STATE ====================
    let gameState = 'MENU';
    let players = [];
    let items = [];
    let scorePopups = [];
    let confetti = [];
    let explosionParts = [];
    let dirtSpeckles = [];
    let frameCount = 0;
    let screenShake = 0;
    let winner = null;

    // ==================== INITIALIZATION ====================
    function startGame(count) {
        document.getElementById('menu').style.display = 'none';
        canvas.style.display = 'block';
        gameState = 'PLAYING';
        winner = null;
        players = [];
        scorePopups = [];
        confetti = [];
        explosionParts = [];
        frameCount = 0;
        screenShake = 0;

        if (count === 1) {
            players.push(createPlayer(CW / 2, '玩家 A', 'S'));
        } else {
            players.push(createPlayer(CW * 0.3, '玩家 A', 'S'));
            players.push(createPlayer(CW * 0.7, '玩家 B', '\u2193'));
        }
        initDirtSpeckles();
        generateItems();
        gameLoop();
    }

    function createPlayer(x, label, keyName) {
        return {
            x, y: HOOK_ORIGIN_Y, label, keyName,
            score: 0, angle: 0, angleDir: 1,
            hookLength: HOOK_REST,
            state: 'SWINGING',
            grabbedItem: null,
            hookX: x, hookY: HOOK_ORIGIN_Y + HOOK_REST,
            isBombExploding: false,
            explosionTimer: 0,
            explosionX: 0, explosionY: 0,
            fastRetract: false,
            isWinner: false,
        };
    }

    function initDirtSpeckles() {
        dirtSpeckles = [];
        for (let i = 0; i < 250; i++) {
            dirtSpeckles.push({
                x: Math.random() * CW,
                y: SURFACE_Y + 20 + Math.random() * (CH - SURFACE_Y - 40),
                r: 1 + Math.random() * 2.5,
                alpha: 0.08 + Math.random() * 0.12,
            });
        }
    }

    // ==================== ITEM GENERATION ====================
    function getRadiusForSpec(spec) {
        if (spec.type === 'diamond') return 14;
        if (spec.type === 'pig') return 20;
        if (spec.type === 'bomb') return 15;
        return { small: 17, medium: 27, large: 38 }[spec.size] || 20;
    }

    function getValueWeight(type, size) {
        const map = {
            gold:   { small: [80,1],   medium: [200,2],  large: [350,3] },
            stone:  { small: [10,3],   medium: [20,5],   large: [30,7] },
        };
        if (type === 'diamond') return [800, 0.5];
        if (type === 'pig')     return [3, 0.5];
        if (type === 'bomb')    return [2, 1];
        return map[type][size];
    }

    function createItem(type, size, x, y) {
        const [value, weight] = getValueWeight(type, size);
        const radius = getRadiusForSpec({ type, size });
        const item = {
            type, size: size || null, x, y, radius, value, weight,
            grabbed: false,
            speedX: type === 'pig' ? (Math.random() > 0.5 ? 0.4 : -0.4) : 0,
        };
        if (type === 'stone') {
            const n = 8 + Math.floor(Math.random() * 4);
            item.vertices = [];
            for (let i = 0; i < n; i++) {
                const a = (Math.PI * 2 / n) * i;
                const r = radius * (0.7 + Math.random() * 0.5);
                item.vertices.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
            }
        }
        return item;
    }

    function generateItems() {
        items = [];
        const specs = [
            // at least 3 diamonds
            { type:'diamond' },{ type:'diamond' },{ type:'diamond' },
            // gold
            { type:'gold', size:'small' },{ type:'gold', size:'small' },{ type:'gold', size:'small' },
            { type:'gold', size:'medium' },{ type:'gold', size:'medium' },
            { type:'gold', size:'large' },
            // stones
            { type:'stone', size:'small' },{ type:'stone', size:'small' },
            { type:'stone', size:'medium' },{ type:'stone', size:'medium' },
            { type:'stone', size:'large' },
            // pigs
            { type:'pig' },{ type:'pig' },{ type:'pig' },
            // bombs
            { type:'bomb' },{ type:'bomb' },{ type:'bomb' },{ type:'bomb' },
        ];
        // shuffle
        for (let i = specs.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [specs[i], specs[j]] = [specs[j], specs[i]];
        }
        for (const spec of specs) {
            let placed = false, attempts = 0;
            const r = getRadiusForSpec(spec);
            while (!placed && attempts < 300) {
                const x = r + 30 + Math.random() * (CW - r * 2 - 60);
                const y = SURFACE_Y + 70 + Math.random() * (CH - SURFACE_Y - r - 90);
                const ok = items.every(ex => {
                    const dx = x - ex.x, dy = y - ex.y;
                    return Math.sqrt(dx*dx + dy*dy) > r + ex.radius + 18;
                });
                if (ok) { items.push(createItem(spec.type, spec.size, x, y)); placed = true; }
                attempts++;
            }
        }
    }

    // ==================== INPUT ====================
    document.addEventListener('keydown', e => {
        if (e.key === 's' || e.key === 'S') {
            if (players.length > 0 && players[0].state === 'SWINGING') players[0].state = 'EXTENDING';
        }
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (players.length > 1 && players[1].state === 'SWINGING') players[1].state = 'EXTENDING';
        }
        // restart from victory/gameover
        if ((gameState === 'VICTORY' || gameState === 'GAMEOVER') && (e.key === 'r' || e.key === 'R' || e.key === ' ')) {
            returnToMenu();
        }
    });

    function returnToMenu() {
        gameState = 'MENU';
        canvas.style.display = 'none';
        document.getElementById('menu').style.display = 'block';
    }

    // ==================== UPDATE ====================
    function update() {
        if (gameState !== 'PLAYING') {
            if (gameState === 'VICTORY') updateConfetti();
            return;
        }
        frameCount++;

        // Update pigs
        for (const item of items) {
            if (!item.grabbed && item.type === 'pig') {
                item.x += item.speedX;
                if (item.x - item.radius < 15 || item.x + item.radius > CW - 15) {
                    item.speedX *= -1;
                }
            }
        }

        // Update players
        for (const p of players) updatePlayer(p);

        // Score popups
        for (const pop of scorePopups) { pop.y -= 0.8; pop.timer--; pop.alpha = pop.timer / pop.maxTimer; }
        scorePopups = scorePopups.filter(p => p.timer > 0);

        // Explosion particles
        for (const ep of explosionParts) { ep.x += ep.vx; ep.y += ep.vy; ep.vy += 0.05; ep.life -= 0.025; }
        explosionParts = explosionParts.filter(ep => ep.life > 0);

        // Screen shake
        if (screenShake > 0) { screenShake *= 0.88; if (screenShake < 0.3) screenShake = 0; }
    }

    function updatePlayer(p) {
        switch (p.state) {
            case 'SWINGING':
                p.angle += SWING_SPEED * p.angleDir;
                if (p.angle > MAX_ANGLE) { p.angle = MAX_ANGLE; p.angleDir = -1; }
                else if (p.angle < -MAX_ANGLE) { p.angle = -MAX_ANGLE; p.angleDir = 1; }
                setHookPos(p, HOOK_REST);
                break;

            case 'EXTENDING':
                p.hookLength += EXTEND_SPEED;
                setHookPos(p, p.hookLength);
                // Collision
                for (const item of items) {
                    if (item.grabbed) continue;
                    const dx = p.hookX - item.x, dy = p.hookY - item.y;
                    if (Math.sqrt(dx*dx + dy*dy) < item.radius + 6) {
                        p.grabbedItem = item;
                        item.grabbed = true;
                        p.state = 'RETRACTING';
                        if (item.type === 'bomb') {
                            p.isBombExploding = true;
                            p.explosionTimer = 0;
                            p.explosionX = p.hookX;
                            p.explosionY = p.hookY;
                            createExplosion(p.hookX, p.hookY);
                            screenShake = 8;
                        }
                        break;
                    }
                }
                // Out of bounds
                if (p.hookX < -30 || p.hookX > CW + 30 || p.hookY > CH + 30 || p.hookLength > MAX_HOOK) {
                    p.state = 'RETRACTING';
                }
                break;

            case 'RETRACTING':
                if (p.isBombExploding) {
                    p.explosionTimer++;
                    if (p.explosionTimer > 28) {
                        p.isBombExploding = false;
                        const bomb = p.grabbedItem;
                        p.grabbedItem = null;
                        items = items.filter(i => i !== bomb);
                        p.score += bomb.value;
                        addPopup(p.x, p.y - 30, bomb.value, bomb.type);
                        p.fastRetract = true;
                    }
                } else if (p.fastRetract) {
                    p.hookLength -= BASE_RETRACT * 2.5;
                    setHookPos(p, p.hookLength);
                    if (p.hookLength <= HOOK_REST) {
                        p.hookLength = HOOK_REST;
                        setHookPos(p, HOOK_REST);
                        p.state = 'SWINGING';
                        p.fastRetract = false;
                        checkEnd(p);
                    }
                } else {
                    let speed = BASE_RETRACT;
                    if (p.grabbedItem) speed = BASE_RETRACT / (1 + p.grabbedItem.weight * 0.5);
                    p.hookLength -= speed;
                    setHookPos(p, p.hookLength);
                    if (p.grabbedItem) {
                        p.grabbedItem.x = p.hookX;
                        p.grabbedItem.y = p.hookY;
                    }
                    if (p.hookLength <= HOOK_REST) {
                        p.hookLength = HOOK_REST;
                        setHookPos(p, HOOK_REST);
                        p.state = 'SWINGING';
                        if (p.grabbedItem) {
                            p.score += p.grabbedItem.value;
                            addPopup(p.x, p.y - 30, p.grabbedItem.value, p.grabbedItem.type);
                            items = items.filter(i => i !== p.grabbedItem);
                            p.grabbedItem = null;
                        }
                        checkEnd(p);
                    }
                }
                break;
        }
    }

    function setHookPos(p, len) {
        p.hookX = p.x + Math.sin(p.angle) * len;
        p.hookY = p.y + Math.cos(p.angle) * len;
    }

    function checkEnd(p) {
        if (p.score >= WIN_SCORE) {
            p.isWinner = true;
            winner = p;
            gameState = 'VICTORY';
            initConfetti();
            return;
        }
        if (items.length === 0) {
            // check all players
            const anyoneWon = players.some(pl => pl.score >= WIN_SCORE);
            if (!anyoneWon) gameState = 'GAMEOVER';
        }
    }

    function addPopup(x, y, value, type) {
        const color = type === 'diamond' ? '#FFD700' : type === 'bomb' ? '#FF4500' : '#FFF';
        scorePopups.push({ x, y, text: '+' + value, timer: 70, maxTimer: 70, alpha: 1, color });
    }

    function createExplosion(x, y) {
        explosionParts = [];
        for (let i = 0; i < 40; i++) {
            const a = Math.random() * Math.PI * 2;
            const sp = 1.5 + Math.random() * 5;
            explosionParts.push({
                x, y,
                vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1,
                radius: 2 + Math.random() * 6,
                color: ['#FF4500','#FF6347','#FFD700','#FF8C00','#FFA500'][Math.floor(Math.random()*5)],
                life: 1,
            });
        }
    }

    // ==================== CONFETTI ====================
    function initConfetti() {
        confetti = [];
        for (let i = 0; i < 250; i++) {
            confetti.push({
                x: Math.random() * CW, y: -Math.random() * CH,
                vx: (Math.random() - 0.5) * 4,
                vy: 2 + Math.random() * 3,
                w: 5 + Math.random() * 10, h: 3 + Math.random() * 6,
                color: ['#FFD700','#FF6347','#00CED1','#7FFF00','#FF69B4','#9370DB','#FF4500','#00FF7F'][Math.floor(Math.random()*8)],
                rot: Math.random() * Math.PI * 2,
                rotSpd: (Math.random() - 0.5) * 0.15,
            });
        }
    }
    function updateConfetti() {
        for (const c of confetti) {
            c.x += c.vx; c.y += c.vy; c.rot += c.rotSpd;
            if (c.y > CH + 20) { c.y = -20; c.x = Math.random() * CW; }
        }
    }

    // ==================== RENDER ====================
    function render() {
        ctx.clearRect(0, 0, CW, CH);
        ctx.save();
        if (screenShake > 0) {
            ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
        }

        drawBackground();
        drawItems();
        drawRopesAndClaws();
        drawPlayerAvatars();
        drawExplosionParticles();
        drawScorePopups();
        drawUI();

        ctx.restore();

        if (gameState === 'VICTORY') drawVictory();
        if (gameState === 'GAMEOVER') drawGameOver();
    }

    // ---- Background ----
    function drawBackground() {
        // Sky
        const sky = ctx.createLinearGradient(0, 0, 0, SURFACE_Y);
        sky.addColorStop(0, '#5BA3D9');
        sky.addColorStop(1, '#8EC5E8');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, CW, SURFACE_Y);

        // Clouds
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        drawCloud(120, 30, 50);
        drawCloud(400, 50, 40);
        drawCloud(700, 25, 55);
        drawCloud(900, 55, 35);

        // Underground
        const grd = ctx.createLinearGradient(0, SURFACE_Y, 0, CH);
        grd.addColorStop(0, '#9B7530');
        grd.addColorStop(0.15, '#7B5A22');
        grd.addColorStop(0.5, '#5C3D16');
        grd.addColorStop(1, '#3A2410');
        ctx.fillStyle = grd;
        ctx.fillRect(0, SURFACE_Y, CW, CH - SURFACE_Y);

        // Surface (grass)
        ctx.fillStyle = '#3A8C3A';
        ctx.fillRect(0, SURFACE_Y - 4, CW, 8);
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(0, SURFACE_Y - 3, CW, 5);

        // Dirt speckles
        for (const s of dirtSpeckles) {
            ctx.fillStyle = `rgba(60,30,10,${s.alpha})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
        }

        // Rock layers (horizontal lines)
        ctx.strokeStyle = 'rgba(80,50,20,0.15)';
        ctx.lineWidth = 1;
        for (let y = SURFACE_Y + 80; y < CH; y += 70) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            for (let x = 0; x < CW; x += 40) {
                ctx.lineTo(x + 20, y + (Math.sin(x * 0.05) * 4));
            }
            ctx.stroke();
        }
    }

    function drawCloud(cx, cy, size) {
        ctx.beginPath();
        ctx.arc(cx, cy, size * 0.5, 0, Math.PI * 2);
        ctx.arc(cx + size * 0.4, cy - size * 0.1, size * 0.35, 0, Math.PI * 2);
        ctx.arc(cx - size * 0.4, cy + size * 0.05, size * 0.3, 0, Math.PI * 2);
        ctx.arc(cx + size * 0.15, cy + size * 0.15, size * 0.3, 0, Math.PI * 2);
        ctx.fill();
    }

    // ---- Items ----
    function drawItems() {
        for (const item of items) {
            switch (item.type) {
                case 'gold': drawGold(item); break;
                case 'stone': drawStone(item); break;
                case 'diamond': drawDiamond(item); break;
                case 'pig': drawPig(item); break;
                case 'bomb': drawBomb(item); break;
            }
        }
    }

    function drawGold(item) {
        const { x, y, radius } = item;
        const g = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, 0, x, y, radius);
        g.addColorStop(0, '#FFFACD');
        g.addColorStop(0.5, '#FFD700');
        g.addColorStop(1, '#B8860B');
        ctx.fillStyle = g;
        ctx.beginPath();
        // Slightly irregular shape
        for (let i = 0; i <= 24; i++) {
            const a = (Math.PI * 2 / 24) * i;
            const r = radius * (0.9 + 0.1 * Math.sin(i * 2.7 + x));
            const px = x + Math.cos(a) * r, py = y + Math.sin(a) * r;
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#8B6914';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.beginPath();
        ctx.ellipse(x - radius*0.2, y - radius*0.25, radius*0.3, radius*0.18, -0.5, 0, Math.PI*2);
        ctx.fill();
        // Value label for bigger ones
        if (radius >= 27) {
            ctx.fillStyle = '#8B6914';
            ctx.font = `bold ${radius * 0.45}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', x, y + 1);
        }
    }

    function drawStone(item) {
        const { x, y, vertices } = item;
        ctx.beginPath();
        for (let i = 0; i < vertices.length; i++) {
            const v = vertices[i];
            i === 0 ? ctx.moveTo(x + v.x, y + v.y) : ctx.lineTo(x + v.x, y + v.y);
        }
        ctx.closePath();
        const g = ctx.createRadialGradient(x - 5, y - 5, 0, x, y, item.radius);
        g.addColorStop(0, '#A0A0A0');
        g.addColorStop(1, '#606060');
        ctx.fillStyle = g;
        ctx.fill();
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Crack line
        ctx.strokeStyle = 'rgba(50,50,50,0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x - item.radius * 0.4, y - item.radius * 0.2);
        ctx.lineTo(x + item.radius * 0.2, y + item.radius * 0.3);
        ctx.stroke();
    }

    function drawDiamond(item) {
        const { x, y, radius } = item;
        ctx.save();
        ctx.translate(x, y);
        // Glow
        ctx.shadowColor = '#00FFFF';
        ctx.shadowBlur = 12 + Math.sin(frameCount * 0.08) * 5;
        // Diamond shape
        const g = ctx.createLinearGradient(0, -radius, 0, radius);
        g.addColorStop(0, '#E0FFFF');
        g.addColorStop(0.5, '#00CED1');
        g.addColorStop(1, '#008B8B');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.moveTo(0, -radius);
        ctx.lineTo(radius * 0.7, -radius * 0.1);
        ctx.lineTo(radius * 0.4, radius);
        ctx.lineTo(-radius * 0.4, radius);
        ctx.lineTo(-radius * 0.7, -radius * 0.1);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#00FFFF';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Shine facet
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.moveTo(0, -radius * 0.8);
        ctx.lineTo(radius * 0.35, -radius * 0.1);
        ctx.lineTo(-radius * 0.35, -radius * 0.1);
        ctx.closePath();
        ctx.fill();
        // Sparkle
        const sparkle = Math.abs(Math.sin(frameCount * 0.1));
        ctx.fillStyle = `rgba(255,255,255,${sparkle})`;
        ctx.beginPath();
        ctx.arc(radius * 0.15, -radius * 0.45, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    function drawPig(item) {
        const { x, y, radius, speedX } = item;
        ctx.save();
        ctx.translate(x, y);
        if (speedX < 0) ctx.scale(-1, 1);
        const r = radius;
        // Body
        ctx.fillStyle = '#FFB6C1';
        ctx.beginPath();
        ctx.ellipse(0, 0, r, r * 0.65, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#FF69B4';
        ctx.lineWidth = 1;
        ctx.stroke();
        // Head
        ctx.fillStyle = '#FFB6C1';
        ctx.beginPath();
        ctx.arc(r * 0.6, -r * 0.3, r * 0.42, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#FF69B4';
        ctx.stroke();
        // Ears
        ctx.fillStyle = '#FF91A4';
        ctx.beginPath();
        ctx.ellipse(r * 0.35, -r * 0.65, r * 0.14, r * 0.2, -0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(r * 0.72, -r * 0.6, r * 0.14, r * 0.2, 0.3, 0, Math.PI * 2);
        ctx.fill();
        // Snout
        ctx.fillStyle = '#FF69B4';
        ctx.beginPath();
        ctx.ellipse(r * 0.92, -r * 0.15, r * 0.18, r * 0.13, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#C44569';
        ctx.beginPath();
        ctx.arc(r * 0.88, -r * 0.2, 1.5, 0, Math.PI * 2);
        ctx.arc(r * 0.96, -r * 0.2, 1.5, 0, Math.PI * 2);
        ctx.fill();
        // Eyes
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(r * 0.6, -r * 0.4, 2, 0, Math.PI * 2);
        ctx.fill();
        // Tail
        ctx.strokeStyle = '#FF69B4';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-r * 0.85, -r * 0.05);
        ctx.quadraticCurveTo(-r * 1.2, -r * 0.4, -r * 1.05, -r * 0.55);
        ctx.stroke();
        // Legs
        ctx.strokeStyle = '#FF91A4';
        ctx.lineWidth = 3;
        const legOff = Math.sin(frameCount * 0.12) * 3;
        ctx.beginPath();
        ctx.moveTo(r * 0.25, r * 0.5); ctx.lineTo(r * 0.25 + legOff, r * 0.95);
        ctx.moveTo(r * 0.55, r * 0.5); ctx.lineTo(r * 0.55 - legOff, r * 0.95);
        ctx.moveTo(-r * 0.35, r * 0.45); ctx.lineTo(-r * 0.35 - legOff, r * 0.9);
        ctx.moveTo(-r * 0.05, r * 0.5); ctx.lineTo(-r * 0.05 + legOff, r * 0.95);
        ctx.stroke();
        ctx.restore();
    }

    function drawBomb(item) {
        const { x, y, radius } = item;
        // Body
        const g = ctx.createRadialGradient(x - 3, y - 3, 0, x, y, radius);
        g.addColorStop(0, '#555');
        g.addColorStop(1, '#222');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Fuse
        ctx.strokeStyle = '#8B7355';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + radius * 0.3, y - radius);
        ctx.quadraticCurveTo(x + radius * 0.8, y - radius * 1.5, x + radius * 0.5, y - radius * 1.7);
        ctx.stroke();
        // Spark
        const spark = Math.abs(Math.sin(frameCount * 0.2));
        ctx.fillStyle = `rgba(255,200,0,${spark})`;
        ctx.beginPath();
        ctx.arc(x + radius * 0.5, y - radius * 1.7, 3 + spark * 2, 0, Math.PI * 2);
        ctx.fill();
        // Skull icon
        ctx.fillStyle = '#888';
        ctx.font = `${radius * 0.8}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('X', x, y + 1);
    }

    // ---- Ropes & Claws ----
    function drawRopesAndClaws() {
        for (const p of players) {
            // Rope
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.hookX, p.hookY);
            ctx.strokeStyle = '#A0522D';
            ctx.lineWidth = 3;
            ctx.stroke();
            // Rope highlight
            ctx.beginPath();
            ctx.moveTo(p.x - 1, p.y);
            ctx.lineTo(p.hookX - 1, p.hookY);
            ctx.strokeStyle = 'rgba(180,120,60,0.4)';
            ctx.lineWidth = 1;
            ctx.stroke();
            // Claw
            drawClaw(p.hookX, p.hookY, p.angle, p.grabbedItem && !p.isBombExploding);
        }
    }

    function drawClaw(x, y, angle, closed) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        const spread = closed ? 0.15 : 0.35;
        ctx.strokeStyle = '#8B6914';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        // Left arm
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-8 * (closed ? 0.6 : 1), 12);
        ctx.stroke();
        // Right arm
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(8 * (closed ? 0.6 : 1), 12);
        ctx.stroke();
        // Center spike
        ctx.beginPath();
        ctx.moveTo(0, 2);
        ctx.lineTo(0, 10);
        ctx.stroke();
        ctx.restore();
    }

    // ---- Player Avatars ----
    function drawPlayerAvatars() {
        for (const p of players) {
            drawMiner(p);
        }
    }

    function drawMiner(p) {
        const bx = p.x, by = p.y;
        // Machine platform
        ctx.fillStyle = '#5C3317';
        roundRect(ctx, bx - 28, by - 14, 56, 22, 4);
        ctx.fill();
        ctx.strokeStyle = '#3E2210';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Pulley
        ctx.fillStyle = '#999';
        ctx.beginPath();
        ctx.arc(bx, by + 3, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Pulley axle
        ctx.fillStyle = '#555';
        ctx.beginPath();
        ctx.arc(bx, by + 3, 2.5, 0, Math.PI * 2);
        ctx.fill();

        // Person (to the right of machine)
        const px = bx + 35, py = by - 8;
        // Head
        ctx.fillStyle = '#FFDAB9';
        ctx.beginPath();
        ctx.arc(px, py - 10, 9, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#DEB887';
        ctx.lineWidth = 1;
        ctx.stroke();
        // Hard hat
        ctx.fillStyle = '#FFB90F';
        ctx.beginPath();
        ctx.ellipse(px, py - 14, 11, 6, 0, Math.PI, 0);
        ctx.fill();
        ctx.fillStyle = '#E5A800';
        ctx.fillRect(px - 12, py - 14, 24, 3);
        // Eyes
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(px - 3, py - 10, 1.5, 0, Math.PI * 2);
        ctx.arc(px + 3, py - 10, 1.5, 0, Math.PI * 2);
        ctx.fill();
        // Mouth
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(px, py - 6, 3, 0.1, Math.PI - 0.1);
        ctx.stroke();
        // Body
        ctx.fillStyle = '#4682B4';
        ctx.fillRect(px - 8, py, 16, 18);
        // Arms (reaching toward machine)
        ctx.strokeStyle = '#FFDAB9';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(px - 8, py + 5);
        ctx.lineTo(px - 20, py + 2);
        ctx.stroke();
        // Hand holding rope
        ctx.beginPath();
        ctx.moveTo(px + 8, py + 5);
        ctx.lineTo(px + 2, py + 12);
        ctx.stroke();
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    // ---- Explosions ----
    function drawExplosionParticles() {
        for (const ep of explosionParts) {
            ctx.globalAlpha = ep.life;
            ctx.fillStyle = ep.color;
            ctx.beginPath();
            ctx.arc(ep.x, ep.y, ep.radius, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        // Also draw ring explosion for active bomb explosions
        for (const p of players) {
            if (p.isBombExploding) {
                const t = p.explosionTimer / 28;
                const radius = t * 60;
                ctx.strokeStyle = `rgba(255,100,0,${1 - t})`;
                ctx.lineWidth = 4 * (1 - t);
                ctx.beginPath();
                ctx.arc(p.explosionX, p.explosionY, radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = `rgba(255,200,50,${0.3 * (1 - t)})`;
                ctx.beginPath();
                ctx.arc(p.explosionX, p.explosionY, radius * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // ---- Score Popups ----
    function drawScorePopups() {
        for (const pop of scorePopups) {
            ctx.globalAlpha = pop.alpha;
            ctx.fillStyle = pop.color;
            ctx.font = `bold ${pop.text.length > 3 ? 26 : 22}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillText(pop.text, pop.x, pop.y);
            // Glow for high values
            if (pop.text.includes('800')) {
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 10;
                ctx.fillText(pop.text, pop.x, pop.y);
                ctx.shadowBlur = 0;
            }
        }
        ctx.globalAlpha = 1;
    }

    // ---- UI ----
    function drawUI() {
        // Target score
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        roundRect(ctx, CW / 2 - 75, 5, 150, 28, 8);
        ctx.fill();
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('目标: ' + WIN_SCORE + ' 分', CW / 2, 19);

        // Player scores
        for (let i = 0; i < players.length; i++) {
            const p = players[i];
            const sx = players.length === 1 ? CW / 2 : (i === 0 ? 120 : CW - 120);
            // Score background
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            roundRect(ctx, sx - 80, 38, 160, 32, 8);
            ctx.fill();
            // Score text
            ctx.fillStyle = p.score >= WIN_SCORE ? '#FFD700' : '#FFF';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(p.label + ': ' + p.score + ' 分', sx, 54);
            // Key hint
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '12px Arial';
            ctx.fillText('按 ' + p.keyName + ' 键放钩', sx, 78);
        }

        // Items remaining (small, bottom right)
        if (gameState === 'PLAYING') {
            const nonPigBomb = items.filter(it => it.type !== 'bomb').length;
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.font = '12px Arial';
            ctx.textAlign = 'right';
            ctx.fillText('剩余物品: ' + items.length, CW - 15, CH - 10);
        }
    }

    // ---- Victory ----
    function drawVictory() {
        ctx.save();
        // Semi-transparent overlay
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(0, 0, CW, CH);
        // Confetti
        for (const c of confetti) {
            ctx.save();
            ctx.translate(c.x, c.y);
            ctx.rotate(c.rot);
            ctx.fillStyle = c.color;
            ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
            ctx.restore();
        }
        // Victory text
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // Glow
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 30;
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 72px Arial';
        ctx.fillText('胜 利  !', CW / 2, CH / 2 - 40);
        ctx.shadowBlur = 0;
        // Winner info
        if (winner) {
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 30px Arial';
            ctx.fillText(winner.label + ' 获胜!', CW / 2, CH / 2 + 30);
            ctx.font = '22px Arial';
            ctx.fillText('得分: ' + winner.score, CW / 2, CH / 2 + 70);
        }
        // Restart hint
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = '18px Arial';
        ctx.fillText('按 R 键返回主菜单', CW / 2, CH / 2 + 120);
        ctx.restore();
    }

    // ---- Game Over ----
    function drawGameOver() {
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, CW, CH);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#FF6347';
        ctx.font = 'bold 60px Arial';
        ctx.fillText('游 戏 结 束', CW / 2, CH / 2 - 50);
        ctx.fillStyle = '#FFF';
        ctx.font = '22px Arial';
        let y = CH / 2 + 10;
        for (const p of players) {
            ctx.fillText(p.label + ' 得分: ' + p.score, CW / 2, y);
            y += 35;
        }
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '18px Arial';
        ctx.fillText('按 R 键返回主菜单', CW / 2, y + 40);
        ctx.restore();
    }

    // ==================== GAME LOOP ====================
    function gameLoop() {
        update();
        render();
        requestAnimationFrame(gameLoop);
    }
    </script>
</body>
