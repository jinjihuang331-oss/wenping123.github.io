<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundWave - 音乐流媒体</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- 移动端顶部导航栏 -->
  <header class="mobile-header">
    <div class="header-left">
      <div class="logo">
        <i class="fas fa-wave-square"></i>
        <span>SoundWave</span>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="searchToggleBtn" title="搜索">
        <i class="fas fa-search"></i>
      </button>
      <button class="icon-btn" id="offlineIndicator" title="离线状态">
        <i class="fas fa-wifi"></i>
      </button>
    </div>
  </header>

  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="fas fa-wave-square"></i>
          <span>SoundWave</span>
        </div>
        <button class="icon-btn sidebar-close" id="sidebarClose">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="home">
          <i class="fas fa-home"></i><span>首页</span>
        </a>
        <a href="#" class="nav-item" data-view="search">
          <i class="fas fa-search"></i><span>搜索</span>
        </a>
        <a href="#" class="nav-item" data-view="library">
          <i class="fas fa-book-open"></i><span>音乐库</span>
        </a>
        <a href="#" class="nav-item" data-view="offline">
          <i class="fas fa-download"></i><span>离线音乐</span>
        </a>
      </nav>

      <div class="sidebar-section">
        <h3 class="section-title">我的播放列表</h3>
        <div class="playlist-list" id="sidebarPlaylists"></div>
        <button class="btn-text" id="createPlaylistBtn">
          <i class="fas fa-plus"></i> 创建播放列表
        </button>
      </div>

      <div class="sidebar-section">
        <h3 class="section-title">协作播放列表</h3>
        <div class="playlist-list" id="collabPlaylists">
          <div class="collab-playlist-item" data-playlist-id="collab-1">
            <i class="fas fa-users"></i>
            <div class="playlist-info">
              <span class="playlist-name">周五派对</span>
              <span class="playlist-meta">
                <span class="collab-badge">协作</span>
                <span class="online-count"><i class="fas fa-circle"></i> 3人在线</span>
              </span>
            </div>
          </div>
          <div class="collab-playlist-item" data-playlist-id="collab-2">
            <i class="fas fa-users"></i>
            <div class="playlist-info">
              <span class="playlist-name">办公室音乐</span>
              <span class="playlist-meta">
                <span class="collab-badge">协作</span>
                <span class="online-count"><i class="fas fa-circle"></i> 5人在线</span>
              </span>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- 主内容区域 -->
    <main class="main-content" id="mainContent">
      <!-- 首页视图 -->
      <div class="view active" id="homeView">
        <div class="view-header">
          <h1>发现音乐</h1>
          <p class="view-subtitle">根据你的喜好推荐</p>
        </div>

        <!-- 搜索栏（桌面端显示） -->
        <div class="search-bar-desktop" id="searchBarDesktop">
          <div class="search-input-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInputDesktop" placeholder="搜索歌曲、艺术家或专辑..." autocomplete="off">
            <div class="search-suggestions" id="searchSuggestionsDesktop"></div>
          </div>
        </div>

        <!-- 特色播放列表 -->
        <section class="section">
          <h2 class="section-heading">热门播放列表</h2>
          <div class="card-grid">
            <div class="playlist-card" data-playlist-id="featured-1">
              <div class="card-image" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                <i class="fas fa-fire"></i>
                <button class="play-overlay"><i class="fas fa-play"></i></button>
              </div>
              <div class="card-info">
                <h3>热门排行</h3>
                <p>最火热的音乐合集</p>
              </div>
            </div>
            <div class="playlist-card" data-playlist-id="featured-2">
              <div class="card-image" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
                <i class="fas fa-heart"></i>
                <button class="play-overlay"><i class="fas fa-play"></i></button>
              </div>
              <div class="card-info">
                <h3>浪漫情歌</h3>
                <p>感动每一刻</p>
              </div>
            </div>
            <div class="playlist-card" data-playlist-id="featured-3">
              <div class="card-image" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">
                <i class="fas fa-bolt"></i>
                <button class="play-overlay"><i class="fas fa-play"></i></button>
              </div>
              <div class="card-info">
                <h3>电子节拍</h3>
                <p>电子音乐精选</p>
              </div>
            </div>
            <div class="playlist-card" data-playlist-id="featured-4">
              <div class="card-image" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">
                <i class="fas fa-guitar"></i>
                <button class="play-overlay"><i class="fas fa-play"></i></button>
              </div>
              <div class="card-info">
                <h3>民谣时光</h3>
                <p>温暖嗓音的民谣</p>
              </div>
            </div>
          </div>
        </section>

        <!-- 最近播放 -->
        <section class="section">
          <h2 class="section-heading">最近播放</h2>
          <div class="track-list" id="recentTracks"></div>
        </section>
      </div>

      <!-- 搜索视图 -->
      <div class="view" id="searchView">
        <div class="view-header">
          <h1>搜索</h1>
        </div>
        <div class="search-bar-full">
          <div class="search-input-wrapper large">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInputFull" placeholder="搜索歌曲、艺术家或专辑..." autocomplete="off">
            <button class="clear-btn" id="clearSearchBtn"><i class="fas fa-times"></i></button>
            <div class="search-suggestions" id="searchSuggestionsFull"></div>
          </div>
        </div>
        <div class="search-results" id="searchResults">
          <div class="empty-state">
            <i class="fas fa-music"></i>
            <p>输入关键词开始搜索</p>
          </div>
        </div>
      </div>

      <!-- 音乐库视图 -->
      <div class="view" id="libraryView">
        <div class="view-header">
          <h1>音乐库</h1>
          <div class="view-actions">
            <button class="btn-secondary" id="sortByBtn">
              <i class="fas fa-sort"></i> 排序
            </button>
          </div>
        </div>
        <div class="track-list" id="libraryTracks"></div>
      </div>

      <!-- 离线音乐视图 -->
      <div class="view" id="offlineView">
        <div class="view-header">
          <h1>离线音乐</h1>
          <p class="view-subtitle">已缓存可供离线播放的歌曲</p>
        </div>
        <div class="track-list" id="offlineTracks"></div>
        <div class="empty-state" id="offlineEmpty" style="display:none;">
          <i class="fas fa-cloud-download-alt"></i>
          <p>暂无离线音乐</p>
          <p class="text-muted">点击歌曲旁的下载按钮即可缓存</p>
        </div>
      </div>
    </main>
  </div>

  <!-- 歌词面板 -->
  <div class="lyrics-panel" id="lyricsPanel">
    <div class="lyrics-header">
      <h2>歌词</h2>
      <button class="icon-btn" id="closeLyricsBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="lyrics-now-playing">
      <img class="lyrics-art" id="lyricsArt" src="" alt="">
      <div>
        <h3 id="lyricsTitle">--</h3>
        <p id="lyricsArtist">--</p>
      </div>
    </div>
    <div class="lyrics-body" id="lyricsBody"></div>
  </div>

  <!-- 播放列表详情模态框 -->
  <div class="modal-overlay" id="playlistModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalPlaylistTitle">播放列表</h2>
        <button class="icon-btn" id="closeModalBtn"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="track-list" id="modalTracks"></div>
      </div>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 底部播放器 -->
  <div class="player-bar" id="playerBar">
    <div class="player-progress-bar" id="progressBarContainer">
      <div class="player-progress" id="progressBar"></div>
      <div class="player-progress-handle" id="progressHandle"></div>
    </div>

    <div class="player-content">
      <!-- 曲目信息 -->
      <div class="player-track-info" id="playerTrackInfo">
        <div class="track-thumb-wrapper">
          <img class="track-thumb" id="playerThumb" src="" alt="">
          <div class="track-thumb-placeholder"><i class="fas fa-music"></i></div>
        </div>
        <div class="track-details">
          <span class="track-title" id="playerTitle">未在播放</span>
          <span class="track-artist" id="playerArtist">选择一首歌曲开始</span>
        </div>
        <div class="track-actions">
          <button class="icon-btn" id="lyricsToggleBtn" title="歌词">
            <i class="fas fa-align-left"></i>
          </button>
          <button class="icon-btn" id="likeBtn" title="喜欢">
            <i class="far fa-heart"></i>
          </button>
          <button class="icon-btn" id="offlineBtn" title="离线缓存">
            <i class="fas fa-download"></i>
          </button>
        </div>
      </div>

      <!-- 播放控件 -->
      <div class="player-controls">
        <button class="icon-btn" id="shuffleBtn" title="随机播放">
          <i class="fas fa-random"></i>
        </button>
        <button class="icon-btn" id="prevBtn" title="上一首">
          <i class="fas fa-step-backward"></i>
        </button>
        <button class="play-btn" id="playBtn" title="播放">
          <i class="fas fa-play"></i>
        </button>
        <button class="icon-btn" id="nextBtn" title="下一首">
          <i class="fas fa-step-forward"></i>
        </button>
        <button class="icon-btn" id="repeatBtn" title="循环">
          <i class="fas fa-redo"></i>
        </button>
      </div>

      <!-- 右侧控件 -->
      <div class="player-extra">
        <div class="time-display">
          <span id="currentTime">0:00</span>
          <span>/</span>
          <span id="totalTime">0:00</span>
        </div>
        <div class="volume-control">
          <button class="icon-btn" id="muteBtn">
            <i class="fas fa-volume-up"></i>
          </button>
          <input type="range" id="volumeSlider" min="0" max="100" value="80" class="volume-slider">
        </div>
        <button class="icon-btn" id="queueBtn" title="播放队列">
          <i class="fas fa-list-ol"></i>
        </button>
      </div>
    </div>

    <!-- 波形可视化 -->
    <div class="waveform-container" id="waveformContainer">
      <div id="waveform"></div>
    </div>

    <!-- 播放列表面板 -->
    <div class="queue-panel" id="queuePanel">
      <div class="queue-header">
        <h3>播放队列</h3>
        <button class="btn-text" id="clearQueueBtn">清空</button>
      </div>
      <div class="queue-list" id="queueList"></div>
    </div>
  </div>

  <script src="https://unpkg.com/wavesurfer.js@7"></script>
  <script src="data.js"></script>
  <script src="cache-manager.js"></script>
  <script src="lyrics-manager.js"></script>
  <script src="collab-manager.js"></script>
  <script src="player.js"></script>
  <script src="search.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
</body>
</html>
