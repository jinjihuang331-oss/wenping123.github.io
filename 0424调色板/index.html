<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>调色板生成工具</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #242836;
      --border: #2e3348;
      --text: #e2e4ec;
      --text-dim: #8b8fa3;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,.35);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 18px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .history-controls {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    .history-controls button {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .history-controls button:hover:not(:disabled) {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .history-controls button:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    /* ── Layout ── */
    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      min-height: calc(100vh - 57px);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .panel {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .panel h3 {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 12px;
    }

    /* ── Color Picker ── */
    .color-picker-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .color-picker-row input[type="color"] {
      width: 48px; height: 48px;
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      background: none;
      padding: 2px;
    }
    .color-picker-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    .color-picker-row input[type="color"]::-webkit-color-swatch { border-radius: 7px; border: none; }
    .hex-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-family: 'Courier New', monospace;
      font-size: .95rem;
      outline: none;
    }
    .hex-input:focus { border-color: var(--accent); }

    /* ── Mode Buttons ── */
    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px;
    }
    .mode-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 10px 8px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .8rem;
      font-weight: 500;
      transition: all .15s;
      text-align: center;
    }
    .mode-btn:hover { border-color: var(--accent); color: var(--text); }
    .mode-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 600;
      transition: all .15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    /* ── Upload ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      color: var(--text-dim);
      font-size: .85rem;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(99,102,241,.06);
      color: var(--text);
    }
    .upload-zone input { display: none; }

    /* ── Palette Display ── */
    .palette-strip {
      display: flex;
      border-radius: 8px;
      overflow: hidden;
      height: 56px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .palette-swatch {
      flex: 1;
      position: relative;
      cursor: pointer;
      transition: flex .25s;
    }
    .palette-swatch:hover { flex: 2; }
    .palette-swatch .swatch-label {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      font-size: .65rem;
      font-family: monospace;
      background: rgba(0,0,0,.55);
      color: #fff;
      padding: 1px 6px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity .15s;
      white-space: nowrap;
    }
    .palette-swatch:hover .swatch-label { opacity: 1; }

    .palette-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .palette-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: var(--bg);
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
    }
    .palette-item:hover { background: var(--surface); }
    .palette-item .mini-swatches {
      display: flex;
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .palette-item .mini-swatch {
      width: 20px;
      height: 20px;
    }
    .palette-item .palette-label {
      font-size: .8rem;
      color: var(--text-dim);
      flex: 1;
    }
    .palette-item .delete-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: .9rem;
      padding: 2px 6px;
      border-radius: 4px;
      opacity: 0;
      transition: all .15s;
    }
    .palette-item:hover .delete-btn { opacity: 1; }
    .palette-item .delete-btn:hover { color: #f87171; background: rgba(248,113,113,.12); }

    /* ── Export ── */
    .export-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .export-btn {
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text-dim);
      cursor: pointer;
      font-size: .8rem;
      font-weight: 600;
      transition: all .15s;
    }
    .export-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(99,102,241,.08);
    }

    /* ── Color Blind ── */
    select.cb-select {
      width: 100%;
      padding: 8px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .82rem;
      outline: none;
      cursor: pointer;
    }
    select.cb-select:focus { border-color: var(--accent); }

    /* ── Content Area ── */
    .content {
      padding: 28px;
      overflow-y: auto;
    }
    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: var(--surface);
      border-radius: 10px;
      padding: 4px;
      width: fit-content;
    }
    .tab-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: .85rem;
      font-weight: 500;
      transition: all .15s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Preview Website ── */
    .preview-frame {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
    }
    .preview-nav {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      gap: 24px;
      border-bottom: 1px solid #eee;
    }
    .preview-nav .logo {
      font-weight: 700;
      font-size: 1rem;
    }
    .preview-nav a {
      font-size: .82rem;
      text-decoration: none;
      color: #666;
    }
    .preview-hero {
      padding: 40px 28px;
      text-align: center;
    }
    .preview-hero h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a2e;
    }
    .preview-hero p {
      font-size: .9rem;
      color: #555;
      max-width: 500px;
      margin: 0 auto 18px;
    }
    .preview-hero .hero-btn {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 8px;
      color: #fff;
      font-size: .85rem;
      font-weight: 600;
      border: none;
      cursor: default;
    }
    .preview-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 20px 28px 28px;
    }
    .preview-card {
      border-radius: 10px;
      padding: 20px;
      color: #1a1a2e;
    }
    .preview-card h4 {
      font-size: .9rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .preview-card p {
      font-size: .78rem;
      color: rgba(0,0,0,.55);
    }
    .preview-footer {
      padding: 14px 28px;
      border-top: 1px solid #eee;
      font-size: .75rem;
      color: #999;
      text-align: center;
    }

    /* ── Export Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: min(560px, 90vw);
      max-height: 80vh;
      overflow: auto;
      padding: 24px;
      box-shadow: 0 12px 48px rgba(0,0,0,.5);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .modal-header h3 { font-size: 1rem; color: var(--text); text-transform: none; letter-spacing: 0; }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px;
    }
    .modal-close:hover { color: var(--text); }
    .code-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: .8rem;
      line-height: 1.6;
      color: #a5b4fc;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
      position: relative;
    }
    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .75rem;
    }
    .copy-btn:hover { background: var(--accent); color: #fff; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent);
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: .85rem;
      font-weight: 500;
      box-shadow: 0 6px 20px rgba(99,102,241,.4);
      z-index: 300;
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: .4; }
    .empty-state p { font-size: .9rem; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 45vh;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>🎨 调色板生成工具</h1>
    <div class="history-controls">
      <button id="undoBtn" title="撤销 (Ctrl+Z)" disabled>↩</button>
      <button id="redoBtn" title="重做 (Ctrl+Shift+Z)" disabled>↪</button>
    </div>
  </header>

  <main>
    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Color Picker -->
      <div class="panel">
        <h3>基础颜色</h3>
        <div class="color-picker-row">
          <input type="color" id="colorPicker" value="#6366f1" />
          <input type="text" class="hex-input" id="hexInput" value="#6366F1" maxlength="7" />
        </div>

        <h3>生成模式</h3>
        <div class="mode-grid">
          <button class="mode-btn active" data-mode="complementary">互补色</button>
          <button class="mode-btn" data-mode="analogous">邻近色</button>
          <button class="mode-btn" data-mode="triadic">三元色</button>
          <button class="mode-btn" data-mode="split">分裂互补</button>
          <button class="mode-btn" data-mode="tetradic">四元色</button>
          <button class="mode-btn" data-mode="monochromatic">单色</button>
        </div>
        <button class="btn btn-primary" id="generateBtn">生成调色板</button>
      </div>

      <!-- Image Extract -->
      <div class="panel">
        <h3>从图片提取</h3>
        <div class="upload-zone" id="uploadZone">
          <div>📁 点击或拖拽图片</div>
          <input type="file" id="imageInput" accept="image/*" />
        </div>
      </div>

      <!-- Saved Palettes -->
      <div class="panel">
        <h3>已保存调色板</h3>
        <div class="palette-list" id="paletteList">
          <div class="empty-state" id="emptyPalettes">
            <p>暂无调色板</p>
          </div>
        </div>
      </div>

      <!-- Export -->
      <div class="panel">
        <h3>导出</h3>
        <div class="export-grid">
          <button class="export-btn" data-format="css">CSS</button>
          <button class="export-btn" data-format="scss">SCSS</button>
          <button class="export-btn" data-format="svg">SVG</button>
        </div>
      </div>

      <!-- Color Blind -->
      <div class="panel">
        <h3>色盲模拟</h3>
        <select class="cb-select" id="cbSelect">
          <option value="none">正常视觉</option>
          <option value="protanopia">红色盲 (Protanopia)</option>
          <option value="deuteranopia">绿色盲 (Deuteranopia)</option>
          <option value="tritanopia">蓝黄色盲 (Tritanopia)</option>
          <option value="achromatopsia">全色盲 (Achromatopsia)</option>
          <option value="protanomaly">红色弱 (Protanomaly)</option>
          <option value="deuteranomaly">绿色弱 (Deuteranomaly)</option>
          <option value="tritanomaly">蓝色弱 (Tritanomaly)</option>
        </select>
      </div>
    </aside>

    <!-- Content -->
    <section class="content">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="swatches">调色板</button>
        <button class="tab-btn" data-tab="preview">预览布局</button>
      </div>

      <!-- Swatches Tab -->
      <div class="tab-content active" id="tab-swatches">
        <div id="currentPalette">
          <div class="empty-state">
            <div class="icon">🎨</div>
            <p>选择一种生成模式，创建你的调色板</p>
          </div>
        </div>
      </div>

      <!-- Preview Tab -->
      <div class="tab-content" id="tab-preview">
        <div class="preview-frame" id="previewFrame">
          <div class="empty-state">
            <div class="icon">🖥️</div>
            <p>先生成一个调色板，以查看布局预览</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Export Modal -->
  <div class="modal-overlay" id="exportModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">导出</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="code-block" style="position:relative">
        <button class="copy-btn" id="copyBtn">复制</button>
        <pre id="exportCode"></pre>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
  (() => {
    // ── State ──
    let activePalette = [];
    let palettes = [];
    const history = { states: [], index: -1 };
    let colorBlindMode = 'none';

    // ── DOM Refs ──
    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);

    const colorPicker = $('#colorPicker');
    const hexInput = $('#hexInput');
    const generateBtn = $('#generateBtn');
    const uploadZone = $('#uploadZone');
    const imageInput = $('#imageInput');
    const paletteList = $('#paletteList');
    const emptyPalettes = $('#emptyPalettes');
    const currentPaletteEl = $('#currentPalette');
    const previewFrame = $('#previewFrame');
    const cbSelect = $('#cbSelect');
    const undoBtn = $('#undoBtn');
    const redoBtn = $('#redoBtn');
    const exportModal = $('#exportModal');
    const exportCode = $('#exportCode');
    const modalTitle = $('#modalTitle');
    const modalClose = $('#modalClose');
    const copyBtn = $('#copyBtn');
    const toast = $('#toast');

    // ── Color Utilities ──
    function hexToHSL(hex) {
      let r = parseInt(hex.slice(1,3),16)/255;
      let g = parseInt(hex.slice(3,5),16)/255;
      let b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      let h, s, l = (max+min)/2;
      if (max === min) { h = s = 0; }
      else {
        const d = max - min;
        s = l > 0.5 ? d/(2-max-min) : d/(max+min);
        switch(max) {
          case r: h = ((g-b)/d + (g<b?6:0)); break;
          case g: h = ((b-r)/d + 2); break;
          case b: h = ((r-g)/d + 4); break;
        }
        h *= 60;
      }
      return [Math.round(h), Math.round(s*100), Math.round(l*100)];
    }

    function hslToHex(h, s, l) {
      h = ((h % 360) + 360) % 360;
      s = Math.max(0, Math.min(100, s));
      l = Math.max(0, Math.min(100, l));
      const a = s/100 * Math.min(l/100, 1-l/100);
      const f = n => {
        const k = (n + h/30) % 12;
        const color = l/100 - a * Math.max(Math.min(k-3, 9-k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2,'0');
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    // ── Color Generation ──
    const getActiveMode = () => {
      const btn = $('.mode-btn.active');
      return btn ? btn.dataset.mode : 'complementary';
    };

    function generatePalette(hex) {
      const [h, s, l] = hexToHSL(hex);
      const mode = getActiveMode();
      let colors = [];

      switch(mode) {
        case 'complementary':
          colors = [
            hslToHex(h, s, l),
            hslToHex(h, Math.max(s-15,5), Math.min(l+20,92)),
            hslToHex((h+180)%360, s, l),
            hslToHex((h+180)%360, Math.max(s-15,5), Math.min(l+20,92)),
            hslToHex(h, s, Math.max(l-20,8)),
            hslToHex((h+180)%360, s, Math.max(l-20,8)),
          ];
          break;
        case 'analogous':
          for (let i = -2; i <= 2; i++) {
            colors.push(hslToHex(h + i*30, s, l));
          }
          colors.push(hslToHex(h, Math.max(s-20,5), Math.max(l-25,8)));
          break;
        case 'triadic':
          colors = [
            hslToHex(h, s, l),
            hslToHex(h, Math.max(s-20,5), Math.min(l+25,92)),
            hslToHex((h+120)%360, s, l),
            hslToHex((h+120)%360, Math.max(s-20,5), Math.min(l+25,92)),
            hslToHex((h+240)%360, s, l),
            hslToHex((h+240)%360, Math.max(s-20,5), Math.min(l+25,92)),
          ];
          break;
        case 'split':
          colors = [
            hslToHex(h, s, l),
            hslToHex(h, Math.max(s-20,5), Math.min(l+20,92)),
            hslToHex((h+150)%360, s, l),
            hslToHex((h+150)%360, Math.max(s-20,5), Math.min(l+20,92)),
            hslToHex((h+210)%360, s, l),
            hslToHex((h+210)%360, Math.max(s-20,5), Math.min(l+20,92)),
          ];
          break;
        case 'tetradic':
          colors = [
            hslToHex(h, s, l),
            hslToHex((h+90)%360, s, l),
            hslToHex((h+180)%360, s, l),
            hslToHex((h+270)%360, s, l),
            hslToHex(h, Math.max(s-25,5), Math.min(l+20,92)),
            hslToHex((h+180)%360, Math.max(s-25,5), Math.min(l+20,92)),
          ];
          break;
        case 'monochromatic':
          colors = [
            hslToHex(h, s, Math.min(l+30,92)),
            hslToHex(h, s, Math.min(l+15,85)),
            hslToHex(h, s, l),
            hslToHex(h, s, Math.max(l-15,8)),
            hslToHex(h, s, Math.max(l-30,5)),
            hslToHex(h, Math.max(s-30,5), l),
          ];
          break;
      }
      return colors;
    }

    function getModeNameCN(mode) {
      const names = {
        complementary: '互补色', analogous: '邻近色', triadic: '三元色',
        split: '分裂互补', tetradic: '四元色', monochromatic: '单色', image: '图片提取'
      };
      return names[mode] || mode;
    }

    // ── Image Color Extraction ──
    function extractColors(img) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const size = 100;
      canvas.width = size;
      canvas.height = size;
      ctx.drawImage(img, 0, 0, size, size);
      const data = ctx.getImageData(0, 0, size, size).data;

      const buckets = {};
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
        if (a < 128) continue;
        // Quantize
        const qr = Math.round(r/32)*32, qg = Math.round(g/32)*32, qb = Math.round(b/32)*32;
        const key = `${qr},${qg},${qb}`;
        buckets[key] = (buckets[key]||0) + 1;
      }

      const sorted = Object.entries(buckets).sort((a,b) => b[1]-a[1]);

      // Simple k-means-like: pick dominant distinct colors
      const result = [];
      for (const [key] of sorted) {
        const [r,g,b] = key.split(',').map(Number);
        const hex = '#' + [r,g,b].map(v => Math.min(255,Math.max(0,v)).toString(16).padStart(2,'0'));
        // Check distance from already chosen colors
        if (result.every(c => colorDistance(hex, c) > 40)) {
          result.push(hex);
        }
        if (result.length >= 6) break;
      }

      // Fill up if needed
      while (result.length < 6) {
        const [h, s, l] = hexToHSL(result[0] || '#6366f1');
        result.push(hslToHex(h + result.length*40, s, l));
      }

      return result.slice(0, 6);
    }

    function colorDistance(a, b) {
      const ar = parseInt(a.slice(1,3),16), ag = parseInt(a.slice(3,5),16), ab = parseInt(a.slice(5,7),16);
      const br = parseInt(b.slice(1,3),16), bg = parseInt(b.slice(3,5),16), bb = parseInt(b.slice(5,7),16);
      return Math.sqrt((ar-br)**2 + (ag-bg)**2 + (ab-bb)**2);
    }

    // ── Color Blindness Simulation ──
    const cbMatrices = {
      protanopia:    [0.56667,0.43333,0, 0.55833,0.44167,0, 0,0.24167,0.75833],
      deuteranopia:  [0.625,0.375,0, 0.7,0.3,0, 0,0.3,0.7],
      tritanopia:    [0.95,0.05,0, 0,0.43333,0.56667, 0,0.475,0.525],
      protanomaly:   [0.81667,0.18333,0, 0.33333,0.66667,0, 0,0.125,0.875],
      deuteranomaly: [0.8,0.2,0, 0.25833,0.74167,0, 0,0.14167,0.85833],
      tritanomaly:   [0.96667,0.03333,0, 0,0.73333,0.26667, 0,0.18333,0.81667],
      achromatopsia: [0.299,0.587,0.114, 0.299,0.587,0.114, 0.299,0.587,0.114],
    };

    function simulateCB(hex, type) {
      if (type === 'none') return hex;
      const m = cbMatrices[type];
      if (!m) return hex;
      const r = parseInt(hex.slice(1,3),16)/255;
      const g = parseInt(hex.slice(3,5),16)/255;
      const b = parseInt(hex.slice(5,7),16)/255;
      const nr = Math.min(1, Math.max(0, m[0]*r + m[1]*g + m[2]*b));
      const ng = Math.min(1, Math.max(0, m[3]*r + m[4]*g + m[5]*b));
      const nb = Math.min(1, Math.max(0, m[6]*r + m[7]*g + m[8]*b));
      return '#' + [nr,ng,nb].map(v => Math.round(v*255).toString(16).padStart(2,'0')).join('');
    }

    function cbColors(colors) {
      return colors.map(c => simulateCB(c, colorBlindMode));
    }

    // ── History ──
    function pushHistory(action) {
      history.states.splice(history.index + 1);
      history.states.push(JSON.parse(JSON.stringify(action)));
      history.index = history.states.length - 1;
      updateHistoryBtns();
    }

    function undo() {
      if (history.index <= 0) return;
      history.index--;
      restoreState(history.states[history.index]);
      updateHistoryBtns();
    }

    function redo() {
      if (history.index >= history.states.length - 1) return;
      history.index++;
      restoreState(history.states[history.index]);
      updateHistoryBtns();
    }

    function restoreState(state) {
      palettes = JSON.parse(JSON.stringify(state.palettes));
      if (state.activeIndex !== undefined && palettes[state.activeIndex]) {
        activePalette = palettes[state.activeIndex].colors;
      }
      renderPaletteList();
      renderCurrentPalette();
      renderPreview();
    }

    function updateHistoryBtns() {
      undoBtn.disabled = history.index <= 0;
      redoBtn.disabled = history.index >= history.states.length - 1;
    }

    // ── Rendering ──
    function renderCurrentPalette() {
      if (!activePalette.length) {
        currentPaletteEl.innerHTML = `<div class="empty-state"><div class="icon">🎨</div><p>选择一种生成模式，创建你的调色板</p></div>`;
        return;
      }
      const display = cbColors(activePalette);
      currentPaletteEl.innerHTML = `
        <div class="palette-strip">
          ${display.map((c,i) => `
            <div class="palette-swatch" style="background:${c}" title="${activePalette[i]}">
              <span class="swatch-label">${activePalette[i].toUpperCase()}</span>
            </div>
          `).join('')}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;">
          ${display.map((c, i) => `
            <div style="flex:1;min-width:120px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;">
              <div style="width:40px;height:40px;border-radius:8px;background:${c};margin:0 auto 8px;box-shadow:0 2px 8px ${c}55;"></div>
              <div style="font-family:monospace;font-size:.82rem;color:var(--text)">${activePalette[i].toUpperCase()}</div>
              <div style="font-size:.7rem;color:var(--text-dim)">HSL: ${hexToHSL(activePalette[i]).join(', ')}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderPaletteList() {
      if (!palettes.length) {
        paletteList.innerHTML = `<div class="empty-state" id="emptyPalettes"><p>暂无调色板</p></div>`;
        return;
      }
      paletteList.innerHTML = palettes.map((p, idx) => {
        const display = cbColors(p.colors);
        return `
          <div class="palette-item" data-idx="${idx}">
            <div class="mini-swatches">
              ${display.map(c => `<div class="mini-swatch" style="background:${c}"></div>`).join('')}
            </div>
            <span class="palette-label">${p.label}</span>
            <button class="delete-btn" data-delidx="${idx}" title="删除">✕</button>
          </div>
        `;
      }).join('');

      paletteList.querySelectorAll('.palette-item').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target.closest('.delete-btn')) return;
          const idx = +el.dataset.idx;
          activePalette = palettes[idx].colors;
          pushHistory({ palettes: JSON.parse(JSON.stringify(palettes)), activeIndex: idx });
          renderCurrentPalette();
          renderPreview();
        });
      });

      paletteList.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = +btn.dataset.delidx;
          palettes.splice(idx, 1);
          if (activePalette && palettes.length && palettes[idx]) {
            activePalette = palettes[idx].colors;
          } else if (palettes.length) {
            activePalette = palettes[0].colors;
          } else {
            activePalette = [];
          }
          pushHistory({ palettes: JSON.parse(JSON.stringify(palettes)), activeIndex: 0 });
          renderPaletteList();
          renderCurrentPalette();
          renderPreview();
        });
      });
    }

    function renderPreview() {
      if (!activePalette.length) {
        previewFrame.innerHTML = `<div class="empty-state"><div class="icon">🖥️</div><p>先生成一个调色板，以查看布局预览</p></div>`;
        return;
      }
      const c = cbColors(activePalette);

      previewFrame.innerHTML = `
        <div class="preview-nav" style="background:${c[0]}">
          <span class="logo" style="color:#fff">MyBrand</span>
          <a href="#" style="color:${ciddle(c[0])}">首页</a>
          <a href="#" style="color:${ciddle(c[0])}">关于</a>
          <a href="#" style="color:${ciddle(c[0])}">服务</a>
          <a href="#" style="color:${ciddle(c[0])}">联系</a>
        </div>
        <div class="preview-hero" style="background:${c[1]}">
          <h2 style="color:${contrastText(c[1])}">欢迎来到我们的平台</h2>
          <p style="color:${contrastText(c[1], 0.7)}">这是一段示例文字，展示当前调色板在实际网站布局中的效果。</p>
          <span class="hero-btn" style="background:${c[0]};color:#fff">了解更多</span>
        </div>
        <div class="preview-cards" style="background:#f7f7fa">
          <div class="preview-card" style="background:${c[2]};color:${contrastText(c[2])}">
            <h4 style="color:${contrastText(c[2])}">功能模块 A</h4>
            <p style="color:${contrastText(c[2], 0.65)}">描述文字展示区域，使用调色板的第三种颜色作为背景。</p>
          </div>
          <div class="preview-card" style="background:${c[3]};color:${contrastText(c[3])}">
            <h4 style="color:${contrastText(c[3])}">功能模块 B</h4>
            <p style="color:${contrastText(c[3], 0.65)}">描述文字展示区域，使用调色板的第四种颜色作为背景。</p>
          </div>
          <div class="preview-card" style="background:${c[4]};color:${contrastText(c[4])}">
            <h4 style="color:${contrastText(c[4])}">功能模块 C</h4>
            <p style="color:${contrastText(c[4], 0.65)}">描述文字展示区域，使用调色板的第五种颜色作为背景。</p>
          </div>
        </div>
        <div class="preview-footer" style="background:${c[5]};color:${contrastText(c[5], 0.7)}">
          © 2026 MyBrand — 调色板预览
        </div>
      `;
    }

    function ciddle(hex) {
      // Lighter version for nav links
      const [h,s,l] = hexToHSL(hex);
      return hslToHex(h, s, Math.min(l+30, 92));
    }

    function contrastText(hex, alpha = 1) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
      return lum > 0.55
        ? `rgba(20,20,40,${alpha})`
        : `rgba(255,255,255,${alpha})`;
    }

    // ── Export ──
    function exportCSS(colors) {
      const vars = colors.map((c,i) => `  --color-${i}: ${c};`).join('\n');
      return `:root {\n${vars}\n}`;
    }

    function exportSCSS(colors) {
      const vars = colors.map((c,i) => `$color-${i}: ${c};`).join('\n');
      return vars;
    }

    function exportSVG(colors) {
      const rects = colors.map((c,i) =>
        `    <rect x="${i*100}" y="0" width="100" height="60" fill="${c}" />`
      ).join('\n');
      const texts = colors.map((c,i) =>
        `    <text x="${i*100+50}" y="85" text-anchor="middle" font-size="10" font-family="monospace" fill="#333">${c.toUpperCase()}</text>`
      ).join('\n');
      return `<svg xmlns="http://www.w3.org/2000/svg" width="600" height="100" viewBox="0 0 600 100">\n${rects}\n${texts}\n</svg>`;
    }

    // ── Toast ──
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ── Event Handlers ──
    colorPicker.addEventListener('input', e => {
      hexInput.value = e.target.value.toUpperCase();
    });

    hexInput.addEventListener('input', e => {
      const val = e.target.value;
      if (/^#[0-9a-fA-F]{6}$/.test(val)) {
        colorPicker.value = val.toLowerCase();
      }
    });

    $$('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        $$('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    generateBtn.addEventListener('click', () => {
      const hex = colorPicker.value;
      const colors = generatePalette(hex);
      activePalette = colors;
      const mode = getActiveMode();
      const palette = {
        label: `${getModeNameCN(mode)} ${hex.toUpperCase()}`,
        colors,
        mode
      };
      palettes.push(palette);
      pushHistory({ palettes: JSON.parse(JSON.stringify(palettes)), activeIndex: palettes.length - 1 });
      renderPaletteList();
      renderCurrentPalette();
      renderPreview();
      showToast('调色板已生成！');
    });

    // Image upload
    uploadZone.addEventListener('click', () => imageInput.click());
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleImageUpload(e.dataTransfer.files[0]);
    });
    imageInput.addEventListener('change', e => {
      if (e.target.files[0]) handleImageUpload(e.target.files[0]);
    });

    function handleImageUpload(file) {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const colors = extractColors(img);
          activePalette = colors;
          const palette = {
            label: `图片提取 ${file.name.slice(0,12)}`,
            colors,
            mode: 'image'
          };
          palettes.push(palette);
          pushHistory({ palettes: JSON.parse(JSON.stringify(palettes)), activeIndex: palettes.length - 1 });
          renderPaletteList();
          renderCurrentPalette();
          renderPreview();
          showToast('已从图片提取调色板！');
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    // Tabs
    $$('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        $$('.tab-btn').forEach(b => b.classList.remove('active'));
        $$('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        $(`#tab-${btn.dataset.tab}`).classList.add('active');
      });
    });

    // Export
    $$('.export-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!activePalette.length) { showToast('请先生成调色板'); return; }
        const format = btn.dataset.format;
        let code, title;
        if (format === 'css') {
          code = exportCSS(activePalette);
          title = '导出 CSS';
        } else if (format === 'scss') {
          code = exportSCSS(activePalette);
          title = '导出 SCSS';
        } else {
          code = exportSVG(activePalette);
          title = '导出 SVG';
        }
        modalTitle.textContent = title;
        exportCode.textContent = code;
        exportModal.classList.add('open');
      });
    });

    modalClose.addEventListener('click', () => exportModal.classList.remove('open'));
    exportModal.addEventListener('click', e => { if (e.target === exportModal) exportModal.classList.remove('open'); });
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(exportCode.textContent).then(() => showToast('已复制到剪贴板'));
    });

    // Color Blind
    cbSelect.addEventListener('change', () => {
      colorBlindMode = cbSelect.value;
      renderCurrentPalette();
      renderPreview();
      renderPaletteList();
    });

    // History
    undoBtn.addEventListener('click', undo);
    redoBtn.addEventListener('click', redo);
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && e.shiftKey) { e.preventDefault(); redo(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); }
    });

    // Init
    pushHistory({ palettes: [], activeIndex: -1 });
  })();
  </script>
</body>
</html>
