<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>调色板生成工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部工具栏 -->
  <header class="toolbar">
    <div class="toolbar-left">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28">
          <circle cx="14" cy="14" r="12" fill="none" stroke="currentColor" stroke-width="2"/>
          <circle cx="14" cy="5" r="3" fill="#ff6b6b"/>
          <circle cx="21" cy="18" r="3" fill="#4ecdc4"/>
          <circle cx="7" cy="18" r="3" fill="#ffe66d"/>
        </svg>
        <span>调色板工具</span>
      </div>
    </div>
    <div class="toolbar-center">
      <button class="toolbar-btn" id="undoBtn" title="撤销 (Ctrl+Z)" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 10h10a5 5 0 0 1 5 5v0a5 5 0 0 1-5 5H8"/><path d="M7 6l-4 4 4 4"/>
        </svg>
      </button>
      <button class="toolbar-btn" id="redoBtn" title="重做 (Ctrl+Shift+Z)" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10H11a5 5 0 0 0-5 5v0a5 5 0 0 0 5 5h5"/><path d="M17 6l4 4-4 4"/>
        </svg>
      </button>
    </div>
    <div class="toolbar-right">
      <label class="colorblind-selector">
        <span>视觉模拟</span>
        <select id="colorblindSelect">
          <option value="normal">正常视觉</option>
          <option value="protanopia">红色盲 (Protanopia)</option>
          <option value="deuteranopia">绿色盲 (Deuteranopia)</option>
          <option value="tritanopia">蓝黄色盲 (Tritanopia)</option>
        </select>
      </label>
    </div>
  </header>

  <main class="app-layout">
    <!-- 左侧面板 -->
    <aside class="panel panel-left">
      <!-- 色轮选择器 -->
      <section class="panel-section">
        <h3 class="section-title">色轮选取</h3>
        <div class="color-wheel-container">
          <canvas id="colorWheel" width="220" height="220"></canvas>
          <div class="color-wheel-indicator" id="wheelIndicator"></div>
        </div>
        <div class="selected-color-display">
          <div class="selected-swatch" id="selectedSwatch"></div>
          <div class="selected-info">
            <span id="selectedHex">#FF6B6B</span>
            <span id="selectedHSL">H:0 S:100 L:70</span>
          </div>
        </div>
      </section>

      <!-- 生成模式 -->
      <section class="panel-section">
        <h3 class="section-title">调色板模式</h3>
        <div class="mode-buttons">
          <button class="mode-btn active" data-mode="complementary">互补色</button>
          <button class="mode-btn" data-mode="analogous">邻近色</button>
          <button class="mode-btn" data-mode="triadic">三元色</button>
          <button class="mode-btn" data-mode="tetradic">四元色</button>
        </div>
      </section>

      <!-- 图片上传 -->
      <section class="panel-section">
        <h3 class="section-title">图片取色</h3>
        <div class="image-upload-zone" id="imageUploadZone">
          <input type="file" id="imageInput" accept="image/*" hidden>
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <p>拖拽图片或点击上传</p>
          <p class="hint">支持 JPG / PNG / WebP</p>
        </div>
        <div class="extracted-preview" id="extractedPreview" style="display:none">
          <img id="extractedImage" alt="uploaded">
          <span class="extracted-count" id="extractedCount"></span>
        </div>
      </section>

      <!-- 操作按钮 -->
      <section class="panel-section">
        <div class="action-buttons">
          <button class="btn btn-primary" id="generateBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
            </svg>
            生成调色板
          </button>
          <button class="btn btn-secondary" id="randomBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/>
            </svg>
            随机生成
          </button>
          <button class="btn btn-danger" id="clearBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M8 6V4h8v2M5 6v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6M10 11v6M14 11v6"/>
            </svg>
            清除
          </button>
        </div>
      </section>
    </aside>

    <!-- 中央区域 -->
    <div class="panel panel-center">
      <!-- 调色板展示 -->
      <section class="palette-section">
        <h3 class="section-title">调色板 <span class="color-count" id="colorCount">0 色</span></h3>
        <div class="palette-container" id="paletteContainer">
          <div class="palette-empty" id="paletteEmpty">
            <p>点击色轮选取基准色，然后生成调色板</p>
            <p>或上传图片提取颜色</p>
          </div>
        </div>
      </section>

      <!-- 颜色编辑器 -->
      <section class="editor-section" id="editorSection" style="display:none">
        <h3 class="section-title">颜色编辑器</h3>
        <div class="color-editor">
          <div class="editor-preview">
            <div class="editor-swatch" id="editorSwatch"></div>
            <span class="editor-label" id="editorLabel"></span>
          </div>
          <div class="editor-sliders">
            <div class="slider-group">
              <label>色相 (H)</label>
              <input type="range" id="editorHue" min="0" max="360" class="slider slider-hue">
              <span class="slider-value" id="editorHueVal">0</span>
            </div>
            <div class="slider-group">
              <label>饱和度 (S)</label>
              <input type="range" id="editorSat" min="0" max="100" class="slider slider-sat">
              <span class="slider-value" id="editorSatVal">50</span>
            </div>
            <div class="slider-group">
              <label>亮度 (L)</label>
              <input type="range" id="editorLight" min="0" max="100" class="slider slider-light">
              <span class="slider-value" id="editorLightVal">50</span>
            </div>
            <div class="editor-actions">
              <button class="btn btn-sm btn-primary" id="editorApply">应用</button>
              <button class="btn btn-sm btn-secondary" id="editorCancel">取消</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- 右侧面板 -->
    <aside class="panel panel-right">
      <!-- 预览区 -->
      <section class="panel-section">
        <h3 class="section-title">网站预览</h3>
        <div class="preview-frame" id="previewFrame">
          <div class="preview-navbar" id="previewNavbar">
            <div class="preview-brand">Brand</div>
            <div class="preview-nav-links">
              <span>首页</span>
              <span>产品</span>
              <span>关于</span>
            </div>
          </div>
          <div class="preview-hero" id="previewHero">
            <h2>欢迎体验</h2>
            <p>使用调色板生成工具创建您的专属配色</p>
            <button class="preview-btn" id="previewBtnPrimary">了解更多</button>
          </div>
          <div class="preview-cards" id="previewCards">
            <div class="preview-card">
              <div class="preview-card-body">
                <h4>功能一</h4>
                <p>简洁高效的设计工具</p>
                <button class="preview-card-btn">查看详情</button>
              </div>
            </div>
            <div class="preview-card">
              <div class="preview-card-body">
                <h4>功能二</h4>
                <p>多种调色板模式</p>
                <button class="preview-card-btn">查看详情</button>
              </div>
            </div>
            <div class="preview-card">
              <div class="preview-card-body">
                <h4>功能三</h4>
                <p>一键导出代码</p>
                <button class="preview-card-btn">查看详情</button>
              </div>
            </div>
          </div>
          <div class="preview-footer" id="previewFooter">
            <span>&copy; 2026 Brand</span>
            <span>隐私政策 | 使用条款</span>
          </div>
        </div>
      </section>

      <!-- 导出区 -->
      <section class="panel-section">
        <h3 class="section-title">导出</h3>
        <div class="export-buttons">
          <button class="btn btn-export" id="exportCSS">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            </svg>
            CSS
          </button>
          <button class="btn btn-export" id="exportSCSS">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            </svg>
            SCSS
          </button>
          <button class="btn btn-export" id="exportSVG">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            </svg>
            SVG
          </button>
        </div>
      </section>
    </aside>
  </main>

  <!-- 导出模态框 -->
  <div class="modal-overlay" id="exportModal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3 id="exportModalTitle">导出代码</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <pre class="code-block"><code id="exportCode"></code></pre>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="copyExportBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          复制代码
        </button>
      </div>
    </div>
  </div>

  <!-- 提示 Toast -->
  <div class="toast" id="toast" style="display:none"></div>

  <script src="app.js"></script>
</body>
</html>
