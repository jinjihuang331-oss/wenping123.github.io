<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>虚拟教室平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#4f46e5;--primary-light:#818cf8;--bg:#0f172a;--bg-card:#1e293b;
  --bg-light:#334155;--text:#e2e8f0;--text-dim:#94a3b8;--border:#475569;
  --danger:#ef4444;--success:#22c55e;--warn:#f59e0b;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,textarea{border:1px solid var(--border);border-radius:8px;padding:8px 12px;background:var(--bg-light);color:var(--text);outline:none;font-size:14px;resize:none}
input:focus,textarea:focus{border-color:var(--primary)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg-card)}::-webkit-scrollbar-thumb{background:var(--bg-light);border-radius:3px}

/* Layout */
.app{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;flex-wrap:wrap}
.header h1{font-size:1.1rem;white-space:nowrap}
.header .controls{display:flex;gap:6px;flex-wrap:wrap}
.header .controls button{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;transition:all .15s;background:var(--bg-light);display:flex;align-items:center;gap:5px;white-space:nowrap}
.header .controls button:hover{background:var(--primary);transform:translateY(-1px)}
.header .controls button.active{background:var(--primary);box-shadow:0 0 12px rgba(79,70,229,.5)}
.header .controls button.recording{background:var(--danger);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
.header .controls button .dot{width:8px;height:8px;border-radius:50%;background:currentColor}

.main{display:flex;flex:1;overflow:hidden;position:relative}
.left-panel{width:220px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--bg-card);flex-shrink:0;overflow:hidden}
.center-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.right-panel{width:280px;display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--bg-card);flex-shrink:0;overflow:hidden}

/* Participants */
.participants{padding:12px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1}
.participants h2{font-size:.85rem;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.participant{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;background:var(--bg-light);font-size:.85rem;transition:transform .15s}
.participant:hover{transform:translateX(2px)}
.participant .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;flex-shrink:0}
.participant .info{flex:1;min-width:0}
.participant .name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.participant .role{font-size:.7rem;color:var(--text-dim)}
.participant .status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status.online{background:var(--success)}
.status.offline{background:var(--border)}
.status.presenting{background:var(--warn);animation:pulse 1.5s infinite}

/* Whiteboard */
.whiteboard-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.toolbar{display:flex;align-items:center;gap:4px;padding:6px 12px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-wrap:wrap}
.toolbar button{padding:6px 10px;border-radius:6px;font-size:13px;background:var(--bg-light);display:flex;align-items:center;gap:4px;transition:all .15s}
.toolbar button:hover{background:var(--primary)}
.toolbar button.active{background:var(--primary)}
.toolbar .divider{width:1px;height:20px;background:var(--border);margin:0 4px}
.toolbar .color-picker{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0}
.toolbar input[type="range"]{width:80px;accent-color:var(--primary);background:transparent}
.toolbar label{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:4px}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#1a1a2e}
#whiteboard{display:block;width:100%;height:100%;touch-action:none;cursor:crosshair}

/* Screen Share */
.share-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(79,70,229,.08);pointer-events:none;display:none}
.share-overlay.active{display:block}
.share-selection{position:absolute;border:3px dashed var(--primary);background:rgba(79,70,229,.12);border-radius:8px;pointer-events:none;display:none}
.share-label{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:var(--danger);color:#fff;padding:4px 16px;border-radius:20px;font-size:12px;font-weight:700;z-index:10;white-space:nowrap}

/* Chat */
.chat-area{display:flex;flex-direction:column;height:100%;overflow:hidden}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border)}
.chat-header h2{font-size:.85rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;flex-direction:column;max-width:85%;padding:8px 12px;border-radius:12px;font-size:.85rem;line-height:1.4;word-break:break-word}
.msg.self{align-self:flex-end;background:var(--primary);border-bottom-right-radius:4px;color:#fff}
.msg.other{align-self:flex-start;background:var(--bg-light);border-bottom-left-radius:4px}
.msg .sender{font-size:.7rem;font-weight:700;margin-bottom:2px;opacity:.8}
.msg.self .sender{text-align:right}
.msg .time{font-size:.65rem;opacity:.5;margin-top:3px}
.msg.self .time{text-align:right}
.system-msg{text-align:center;font-size:.75rem;color:var(--text-dim);padding:4px 0}
.chat-input-area{display:flex;flex-direction:column;padding:8px;border-top:1px solid var(--border);gap:6px}
.emoji-bar{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px}
.emoji-bar button{font-size:20px;padding:4px 6px;border-radius:6px;background:var(--bg-light);transition:transform .15s}
.emoji-bar button:hover{transform:scale(1.2)}
.chat-input{display:flex;gap:6px}
.chat-input textarea{flex:1;max-height:60px;font-size:13px}
.chat-input button{padding:8px 16px;border-radius:8px;background:var(--primary);font-weight:600;font-size:13px;transition:all .15s}
.chat-input button:hover{opacity:.85}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.active{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:400px;width:90%;text-align:center}
.modal h2{margin-bottom:12px}
.modal p{color:var(--text-dim);margin-bottom:20px;font-size:.9rem;line-height:1.5}
.modal button{padding:10px 24px;border-radius:8px;font-weight:600;font-size:14px}
.modal .btn-primary{background:var(--primary);margin-right:8px}
.modal .btn-secondary{background:var(--bg-light)}

/* Responsive */
@media(max-width:900px){
  .left-panel{width:180px}
  .right-panel{width:220px}
}
@media(max-width:700px){
  .app{flex-direction:column}
  .header{flex-direction:column;align-items:stretch}
  .header h1{text-align:center}
  .header .controls{justify-content:center}
  .main{flex-direction:column}
  .left-panel{width:100%;max-height:120px;border-right:none;border-bottom:1px solid var(--border);flex-direction:row;overflow-x:auto;overflow-y:hidden;padding:8px;gap:6px;flex-shrink:0}
  .participants{flex-direction:row;padding:0;display:flex;gap:6px}
  .participants h2{display:none}
  .participant{padding:4px 8px;flex-direction:column;align-items:center;text-align:center;min-width:60px}
  .participant .name,.participant .role{font-size:.7rem}
  .right-panel{width:100%;max-height:200px;flex-shrink:0}
  .whiteboard-area{flex:1;min-height:200px}
}
@media(max-width:480px){
  .toolbar{padding:4px 6px}
  .toolbar button{padding:4px 6px;font-size:11px}
  .toolbar input[type="range"]{width:50px}
  .left-panel{max-height:80px}
  .right-panel{max-height:160px}
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>虚拟教室 - 计算机科学101</h1>
    <div class="controls">
      <button id="btn-share" title="共享屏幕">
        <span>&#127760;</span> 共享屏幕
      </button>
      <button id="btn-record" title="录制">
        <span class="dot"></span> 录制
      </button>
      <button id="btn-hand" title="举手">
        <span>&#9995;</span> 举手
      </button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Left: Participants -->
    <div class="left-panel">
      <div class="participants" id="participants"></div>
    </div>

    <!-- Center: Whiteboard -->
    <div class="center-area">
      <div class="whiteboard-area">
        <div class="toolbar">
          <button id="tool-pen" class="active" title="画笔">&#9998; 画笔</button>
          <button id="tool-eraser" title="橡皮擦">&#128465; 橡皮擦</button>
          <div class="divider"></div>
          <input type="color" id="color-picker" class="color-picker" value="#ffffff" title="颜色">
          <label>粗细 <input type="range" id="size-picker" min="1" max="30" value="3"></label>
          <div class="divider"></div>
          <button id="tool-clear" title="清空">&#128465; 清空</button>
          <button id="tool-undo" title="撤销">&#8630; 撤销</button>
        </div>
        <div class="canvas-wrap" id="canvas-wrap">
          <canvas id="whiteboard"></canvas>
          <div class="share-overlay" id="share-overlay"></div>
          <div class="share-selection" id="share-selection"></div>
          <div class="share-label" id="share-label">正在共享屏幕</div>
        </div>
      </div>
    </div>

    <!-- Right: Chat -->
    <div class="right-panel">
      <div class="chat-area">
        <div class="chat-header">
          <h2>聊天室</h2>
          <span id="online-count" style="font-size:.8rem;color:var(--success)">5 在线</span>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
          <div class="emoji-bar" id="emoji-bar"></div>
          <div class="chat-input">
            <textarea id="chat-input" rows="1" placeholder="输入消息..." maxlength="500"></textarea>
            <button id="btn-send">发送</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title"></h2>
    <p id="modal-text"></p>
    <button class="btn-secondary" id="modal-cancel">取消</button>
    <button class="btn-primary" id="modal-confirm">确认</button>
  </div>
</div>

<script>
// ============ State ============
const state = {
  participants: [
    { id:1, name:'张老师', role:'讲师', status:'presenting', color:'#4f46e5', avatar:'张' },
    { id:2, name:'李明', role:'学生', status:'online', color:'#22c55e', avatar:'李' },
    { id:3, name:'王芳', role:'学生', status:'online', color:'#f59e0b', avatar:'王' },
    { id:4, name:'赵伟', role:'学生', status:'online', color:'#06b6d4', avatar:'赵' },
    { id:5, name:'陈静', role:'学生', status:'offline', color:'#a855f7', avatar:'陈' },
  ],
  chatMessages: [
    { id:1, sender:'张老师', self:false, text:'各位同学好，欢迎来到今天的虚拟课堂！', time:'09:00' },
    { id:2, sender:'李明', self:false, text:'老师好！&#128075;', time:'09:01' },
    { id:3, sender:'王芳', self:true, text:'老师，今天的课程内容是什么？', time:'09:02' },
  ],
  isRecording: false,
  isSharing: false,
  shareRect: null,
  drawing: {
    tool: 'pen',
    color: '#ffffff',
    size: 3,
    isDrawing: false,
    lastX: 0,
    lastY: 0,
    history: [],
  }
};

const currentUser = { name: '王芳', id: 3 };

// ============ Emoji List ============
const emojis = ['&#128522;','&#128516;','&#128525;','&#128536;','&#128562;','&#128077;','&#128078;','&#9996;','&#128170;','&#128591;','&#127881;','&#128293;','&#128161;','&#128161;','&#128640;','&#9997;','&#128203;','&#128218;','&#128187;','&#128247;','&#11088;','&#128175;','&#128176;','&#128200;'];

// ============ Render Participants ============
function renderParticipants() {
  const el = document.getElementById('participants');
  el.innerHTML = '<h2>参与者</h2>';
  state.participants.forEach(p => {
    el.innerHTML += `<div class="participant">
      <div class="avatar" style="background:${p.color}20;color:${p.color}">${p.avatar}</div>
      <div class="info"><div class="name">${p.name}</div><div class="role">${p.role}</div></div>
      <div class="status ${p.status}" title="${p.status}"></div>
    </div>`;
  });
  document.getElementById('online-count').textContent = state.participants.filter(p => p.status !== 'offline').length + ' 在线';
}
renderParticipants();

// ============ Render Chat ============
function renderChat() {
  const el = document.getElementById('chat-messages');
  el.innerHTML = '';
  state.chatMessages.forEach(m => {
    if (m.system) {
      el.innerHTML += `<div class="system-msg">${m.text}</div>`;
    } else {
      el.innerHTML += `<div class="msg ${m.self ? 'self' : 'other'}">
        ${!m.self ? `<div class="sender">${m.sender}</div>` : ''}
        <div>${m.text}</div>
        <div class="time">${m.time}</div>
      </div>`;
    }
  });
  el.scrollTop = el.scrollHeight;
}
renderChat();

// ============ Emoji Bar ============
function renderEmojiBar() {
  const bar = document.getElementById('emoji-bar');
  bar.innerHTML = '';
  emojis.forEach(e => {
    const btn = document.createElement('button');
    btn.innerHTML = e;
    btn.onclick = () => insertEmoji(e);
    bar.appendChild(btn);
  });
}
renderEmojiBar();

function insertEmoji(html) {
  const input = document.getElementById('chat-input');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const val = input.value;
  const emoji = decodeHTML(html);
  input.value = val.slice(0, start) + emoji + val.slice(end);
  input.selectionStart = input.selectionEnd = start + emoji.length;
  input.focus();
}

function decodeHTML(html) {
  const t = document.createElement('div');
  t.innerHTML = html;
  return t.textContent;
}

// ============ Chat Send ============
function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  state.chatMessages.push({ id: Date.now(), sender: currentUser.name, self: true, text, time });
  renderChat();
  input.value = '';
  input.style.height = 'auto';
}

document.getElementById('btn-send').onclick = sendMessage;
document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
document.getElementById('chat-input').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 60) + 'px'; });

// ============ Modal ============
function showModal(title, text, onConfirm) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-text').textContent = text;
  overlay.classList.add('active');
  const confirmBtn = document.getElementById('modal-confirm');
  const cancelBtn = document.getElementById('modal-cancel');
  const handler = (fn) => () => { overlay.classList.remove('active'); confirmBtn.onclick = null; cancelBtn.onclick = null; fn(); };
  confirmBtn.onclick = handler(onConfirm);
  cancelBtn.onclick = handler(() => {});
}

// ============ Recording ============
document.getElementById('btn-record').onclick = function() {
  state.isRecording = !state.isRecording;
  this.classList.toggle('recording', state.isRecording);
  if (state.isRecording) {
    state.chatMessages.push({ id: Date.now(), sender: '系统', self: false, system: true, text: '开始录制课程', time: new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) });
    renderChat();
  } else {
    state.chatMessages.push({ id: Date.now(), sender: '系统', self: false, system: true, text: '录制已停止', time: new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) });
    renderChat();
  }
};

// ============ Screen Share ============
let shareSelecting = false;
let shareStartX = 0, shareStartY = 0;

document.getElementById('btn-share').onclick = function() {
  if (state.isSharing) {
    stopSharing();
  } else {
    showModal('共享屏幕', '请点击确认后在画布上拖动选择要共享的区域。', () => {
      state.isSharing = true;
      this.classList.add('active');
      document.getElementById('share-label').style.display = 'block';
      shareSelecting = true;
      document.getElementById('whiteboard').style.cursor = 'cell';
      // Mark presenter
      state.participants.forEach(p => p.status = p.id === currentUser.id ? 'presenting' : p.status);
      renderParticipants();
      state.chatMessages.push({ id: Date.now(), sender: '系统', self: false, system: true, text: `${currentUser.name} 开始共享屏幕`, time: new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) });
      renderChat();
    });
  }
};

function stopSharing() {
  state.isSharing = false;
  shareSelecting = false;
  document.getElementById('btn-share').classList.remove('active');
  document.getElementById('share-overlay').classList.remove('active');
  document.getElementById('share-selection').style.display = 'none';
  document.getElementById('share-label').style.display = 'none';
  document.getElementById('whiteboard').style.cursor = 'crosshair';
  state.participants.forEach(p => p.status = p.id === currentUser.id ? 'online' : p.status);
  renderParticipants();
}

// ============ Raise Hand ============
document.getElementById('btn-hand').onclick = function() {
  state.chatMessages.push({ id: Date.now(), sender: '系统', self: false, system: true, text: `${currentUser.name} 举起了手 &#9995;`, time: new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) });
  renderChat();
};

// ============ Whiteboard ============
const canvas = document.getElementById('whiteboard');
const ctx = canvas.getContext('2d');
const canvasWrap = document.getElementById('canvas-wrap');

function resizeCanvas() {
  const rect = canvasWrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(dpr, dpr);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  redraw();
}

function redraw() {
  const rect = canvasWrap.getBoundingClientRect();
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, rect.width, rect.height);
  // Draw grid
  ctx.strokeStyle = 'rgba(255,255,255,.04)';
  ctx.lineWidth = .5;
  for (let x = 0; x < rect.width; x += 30) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, rect.height); ctx.stroke(); }
  for (let y = 0; y < rect.height; y += 30) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(rect.width, y); ctx.stroke(); }
  // Redraw history
  state.drawing.history.forEach(stroke => {
    if (stroke.type === 'clear') { ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, rect.width, rect.height); return; }
    if (stroke.points.length < 2) return;
    ctx.strokeStyle = stroke.color;
    ctx.lineWidth = stroke.size;
    ctx.globalCompositeOperation = stroke.tool === 'eraser' ? 'destination-out' : 'source-over';
    ctx.beginPath();
    ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
    for (let i = 1; i < stroke.points.length; i++) ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
    ctx.stroke();
  });
  ctx.globalCompositeOperation = 'source-over';
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

let currentStroke = null;

function startDraw(e) {
  if (shareSelecting) {
    const pos = getPos(e);
    shareStartX = pos.x; shareStartY = pos.y;
    const sel = document.getElementById('share-selection');
    sel.style.left = pos.x + 'px';
    sel.style.top = pos.y + 'px';
    sel.style.width = '0';
    sel.style.height = '0';
    sel.style.display = 'block';
    return;
  }
  e.preventDefault();
  state.drawing.isDrawing = true;
  const pos = getPos(e);
  state.drawing.lastX = pos.x;
  state.drawing.lastY = pos.y;
  currentStroke = { tool: state.drawing.tool, color: state.drawing.color, size: state.drawing.size, points: [{ x: pos.x, y: pos.y }] };
}

function moveDraw(e) {
  if (shareSelecting) {
    const pos = getPos(e);
    const sel = document.getElementById('share-selection');
    const x = Math.min(shareStartX, pos.x);
    const y = Math.min(shareStartY, pos.y);
    const w = Math.abs(pos.x - shareStartX);
    const h = Math.abs(pos.y - shareStartY);
    sel.style.left = x + 'px';
    sel.style.top = y + 'px';
    sel.style.width = w + 'px';
    sel.style.height = h + 'px';
    return;
  }
  if (!state.drawing.isDrawing || !currentStroke) return;
  e.preventDefault();
  const pos = getPos(e);
  ctx.strokeStyle = currentStroke.color;
  ctx.lineWidth = currentStroke.size;
  ctx.globalCompositeOperation = currentStroke.tool === 'eraser' ? 'destination-out' : 'source-over';
  ctx.beginPath();
  ctx.moveTo(state.drawing.lastX, state.drawing.lastY);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
  ctx.globalCompositeOperation = 'source-over';
  currentStroke.points.push({ x: pos.x, y: pos.y });
  state.drawing.lastX = pos.x;
  state.drawing.lastY = pos.y;
}

function endDraw(e) {
  if (shareSelecting) {
    shareSelecting = false;
    const sel = document.getElementById('share-selection');
    if (sel.offsetWidth > 20 && sel.offsetHeight > 20) {
      state.shareRect = { x: sel.offsetLeft, y: sel.offsetTop, w: sel.offsetWidth, h: sel.offsetHeight };
      const overlay = document.getElementById('share-overlay');
      overlay.style.left = state.shareRect.x + 'px';
      overlay.style.top = state.shareRect.y + 'px';
      overlay.style.width = state.shareRect.w + 'px';
      overlay.style.height = state.shareRect.h + 'px';
      overlay.classList.add('active');
    } else {
      sel.style.display = 'none';
    }
    document.getElementById('whiteboard').style.cursor = 'crosshair';
    return;
  }
  if (currentStroke) {
    state.drawing.history.push(currentStroke);
    currentStroke = null;
  }
  state.drawing.isDrawing = false;
}

// Mouse events
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);

// Touch events
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', moveDraw, { passive: false });
canvas.addEventListener('touchend', endDraw);
canvas.addEventListener('touchcancel', endDraw);

// ============ Toolbar ============
document.getElementById('tool-pen').onclick = function() { state.drawing.tool = 'pen'; this.classList.add('active'); document.getElementById('tool-eraser').classList.remove('active'); };
document.getElementById('tool-eraser').onclick = function() { state.drawing.tool = 'eraser'; this.classList.add('active'); document.getElementById('tool-pen').classList.remove('active'); };
document.getElementById('color-picker').oninput = function() { state.drawing.color = this.value; };
document.getElementById('size-picker').oninput = function() { state.drawing.size = +this.value; };
document.getElementById('tool-clear').onclick = function() {
  state.drawing.history.push({ type: 'clear' });
  redraw();
};
document.getElementById('tool-undo').onclick = function() {
  if (state.drawing.history.length) {
    // Remove last non-clear stroke, or just pop last
    while (state.drawing.history.length && state.drawing.history[state.drawing.history.length - 1].type === 'clear') {
      state.drawing.history.pop();
    }
    if (state.drawing.history.length) state.drawing.history.pop();
    redraw();
  }
};

// ============ Resize ============
window.addEventListener('resize', () => { resizeCanvas(); if (state.shareRect) { document.getElementById('share-overlay').style.width = state.shareRect.w + 'px'; document.getElementById('share-overlay').style.height = state.shareRect.h + 'px'; } });

// ============ Init ============
resizeCanvas();
</script>
</body>
</html>
