<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金矿工</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
        }
        canvas {
            border: 4px solid #ffd700;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            display: block;
        }
        #homeScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 30%, #4a2c2a 60%, #2a1a0a 100%);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .title {
            font-size: 56px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 3px 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 10px;
            letter-spacing: 8px;
        }
        .subtitle {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 50px;
        }
        .btn {
            padding: 16px 70px;
            font-size: 22px;
            margin: 12px;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            transition: all 0.3s;
            font-family: inherit;
            font-weight: bold;
        }
        .btn-single {
            background: linear-gradient(135deg, #ffd700, #ff9500);
            color: #333;
        }
        .btn-double {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
        }
        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        .controls {
            margin-top: 40px;
            color: #ccc;
            font-size: 15px;
            text-align: center;
            line-height: 2.2;
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            border-radius: 10px;
        }
        .controls span { color: #ffd700; font-weight: bold; }
        .score-display {
            position: absolute;
            top: 8px;
            padding: 6px 18px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            border-radius: 20px;
            z-index: 5;
            border: 1px solid rgba(255,215,0,0.3);
        }
        #scoreA { left: 8px; }
        #scoreB { right: 8px; }
        .target-display {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 18px;
            background: rgba(0,0,0,0.7);
            color: #00e5ff;
            font-size: 16px;
            border-radius: 20px;
            z-index: 5;
            border: 1px solid rgba(0,229,255,0.3);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="homeScreen">
            <div class="title">黄金矿工</div>
            <div class="subtitle">挖掘宝藏，成为最富有的矿工！</div>
            <button class="btn btn-single" onclick="startGame('single')">单人模式</button>
            <button class="btn btn-double" onclick="startGame('double')">双人模式</button>
            <div class="controls">
                <span>玩家A</span>: 按 <span>S</span> 键释放钩子<br>
                <span>玩家B</span>: 按 <span>↓</span> 方向键释放钩子
            </div>
        </div>
        <div id="scoreA" class="score-display" style="display:none;">玩家A: 0</div>
        <div id="scoreB" class="score-display" style="display:none;">玩家B: 0</div>
        <div id="targetDisplay" class="target-display" style="display:none;">目标: 800分</div>
    </div>
    <script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 800, H = 600;
        const SURFACE = 70;
        const WIN = 800;

        let mode, running = false, players = [], items = [], explosions = [];

        // 物品类型定义：半径, 重量, 价值, 颜色
        const TYPE = {
            gold_s:  { r: 18, w: 1,  v: 50,  c: '#ffd700', type: 'gold' },
            gold_m:  { r: 28, w: 2,  v: 100, c: '#ffc800', type: 'gold' },
            gold_l:  { r: 42, w: 3,  v: 200, c: '#ffb800', type: 'gold' },
            stone_s: { r: 24, w: 4,  v: 10,  c: '#999',   type: 'stone' },
            stone_m: { r: 34, w: 6,  v: 20,  c: '#888',   type: 'stone' },
            stone_l: { r: 48, w: 9,  v: 30,  c: '#777',   type: 'stone' },
            diamond: { r: 14, w: 0.5, v: 800, c: '#00e5ff', type: 'diamond' },
            pig:     { r: 16, w: 0.5, v: 3,   c: '#ff91a4', type: 'pig', mv: true },
            bomb:    { r: 16, w: 0.5, v: 2,   c: '#333',   type: 'bomb' }
        };

        function Player(id, px, label) {
            this.id = id;
            this.px = px;
            this.py = SURFACE;
            this.angle = 0;
            this.dir = id === 'A' ? 1 : -1;
            this.len = 45;
            this.state = 'swing';   // swing / extend / retract
            this.extendSpd = 7;
            this.retractSpd = 5;
            this.catch = null;
            this.quick = false;
            this.score = 0;
            this.label = label;
        }

        Player.prototype.update = function() {
            if (this.state === 'swing') {
                // 钩子左右摆动
                this.angle += this.dir * 0.035;
                if (Math.abs(this.angle) > Math.PI * 0.42) this.dir *= -1;
            } else if (this.state === 'extend') {
                // 钩子直线延伸
                this.len += this.extendSpd;
                let hx = this.px + Math.sin(this.angle) * this.len;
                let hy = this.py + Math.cos(this.angle) * this.len;

                // 碰撞检测
                for (let it of items) {
                    if (it.caught) continue;
                    let d = Math.hypot(hx - it.x, hy - it.y);
                    if (d < it.r + 8) {
                        this.catch = it;
                        it.caught = this.id;
                        if (it.type === 'bomb') {
                            // 炸弹：爆炸效果，快速拉起
                            explosions.push({ x: it.x, y: it.y, t: 0 });
                            items.splice(items.indexOf(it), 1);
                            this.catch = null;
                            this.quick = true;
                        }
                        this.state = 'retract';
                        break;
                    }
                }

                // 超出屏幕边界 → 原路返回
                if (hx < -30 || hx > W + 30 || hy > H + 30) {
                    this.state = 'retract';
                }
            } else if (this.state === 'retract') {
                // 拉回钩子，越重越慢
                let spd = this.quick ? this.retractSpd * 2.5 : this.retractSpd;
                if (this.catch) spd = spd / this.catch.w;
                this.len -= spd;

                if (this.len <= 45) {
                    this.len = 45;
                    this.state = 'swing';
                    if (this.catch) {
                        this.score += this.catch.v;
                        items.splice(items.indexOf(this.catch), 1);
                        this.catch = null;
                    }
                    this.quick = false;
                    checkWin();
                }
            }
        };

        Player.prototype.hookPos = function() {
            return {
                x: this.px + Math.sin(this.angle) * this.len,
                y: this.py + Math.cos(this.angle) * this.len
            };
        };

        // 绘制钩子
        Player.prototype.draw = function() {
            let hp = this.hookPos();

            // 绘制绳索
            ctx.strokeStyle = '#a0522d';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(this.px, this.py);
            ctx.lineTo(hp.x, hp.y);
            ctx.stroke();

            // 绘制钩子本体
            ctx.save();
            ctx.translate(hp.x, hp.y);
            ctx.rotate(this.angle);
            ctx.fillStyle = '#555';
            ctx.fillRect(-2, -12, 4, 16);
            // 钩爪
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(-7, 4);
            ctx.quadraticCurveTo(-10, 10, -6, 14);
            ctx.moveTo(7, 4);
            ctx.quadraticCurveTo(10, 10, 6, 14);
            ctx.stroke();
            ctx.restore();

            // 拉回时，在钩子处绘制抓到的物品
            if (this.catch) drawItem(this.catch, hp.x, hp.y);
        };

        // 绘制矿工小人
        function drawMiner(x, y, facing) {
            ctx.save();
            ctx.translate(x, y);

            // 身体
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(-8, -2, 16, 18);

            // 头
            ctx.fillStyle = '#fdbf6f';
            ctx.beginPath();
            ctx.arc(0, -8, 10, 0, Math.PI * 2);
            ctx.fill();

            // 安全帽
            ctx.fillStyle = '#f39c12';
            ctx.beginPath();
            ctx.arc(0, -12, 11, Math.PI, 0);
            ctx.fill();
            ctx.fillRect(-12, -12, 24, 3);

            // 眼睛
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(-3 + facing * 2, -9, 1.5, 0, Math.PI * 2);
            ctx.arc(3 + facing * 2, -9, 1.5, 0, Math.PI * 2);
            ctx.fill();

            // 安全帽灯
            ctx.fillStyle = '#ffeb3b';
            ctx.beginPath();
            ctx.arc(facing * 8, -14, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // 生成地下物品
        function generateItems() {
            items = [];
            let list = [
                ['gold_s', 4], ['gold_m', 3], ['gold_l', 2],
                ['stone_s', 3], ['stone_m', 2], ['stone_l', 1],
                ['diamond', 3], ['pig', 2], ['bomb', 2]
            ];
            let placed = [];

            for (let [t, n] of list) {
                let info = TYPE[t];
                for (let i = 0; i < n; i++) {
                    let x, y, ok, tries = 0;
                    do {
                        x = 40 + Math.random() * (W - 80);
                        y = SURFACE + 100 + Math.random() * (H - SURFACE - 160);
                        ok = !placed.some(p => Math.hypot(x - p.x, y - p.y) < p.r + info.r + 15);
                        tries++;
                    } while (!ok && tries < 80);

                    let it = { x, y, r: info.r, w: info.w, v: info.v, c: info.c, type: info.type, caught: null };
                    if (info.mv) it.vx = (Math.random() > 0.5 ? 1 : -1) * 0.6;
                    items.push(it);
                    placed.push(it);
                }
            }
        }

        // 绘制单个物品
        function drawItem(it, ox, oy) {
            ctx.save();
            ctx.translate(ox !== undefined ? ox : it.x, oy !== undefined ? oy : it.y);

            if (it.type === 'pig') {
                // 小猪身体
                ctx.fillStyle = it.c;
                ctx.beginPath();
                ctx.arc(0, 0, it.r, 0, Math.PI * 2);
                ctx.fill();
                // 耳朵
                ctx.fillStyle = '#ff69b4';
                ctx.beginPath();
                ctx.arc(-7, -it.r + 2, 4, 0, Math.PI * 2);
                ctx.arc(7, -it.r + 2, 4, 0, Math.PI * 2);
                ctx.fill();
                // 眼睛
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(-4, -2, 2, 0, Math.PI * 2);
                ctx.arc(4, -2, 2, 0, Math.PI * 2);
                ctx.fill();
                // 鼻子
                ctx.fillStyle = '#ff7da0';
                ctx.beginPath();
                ctx.ellipse(0, 3, 5, 3.5, 0, 0, Math.PI * 2);
                ctx.fill();
                // 鼻孔
                ctx.fillStyle = '#c4506f';
                ctx.beginPath();
                ctx.arc(-2, 3, 1, 0, Math.PI * 2);
                ctx.arc(2, 3, 1, 0, Math.PI * 2);
                ctx.fill();
                // 小腿
                ctx.strokeStyle = '#ff69b4';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-8, it.r - 2);
                ctx.lineTo(-10, it.r + 5);
                ctx.moveTo(8, it.r - 2);
                ctx.lineTo(10, it.r + 5);
                ctx.stroke();
            } else if (it.type === 'diamond') {
                // 钻石菱形
                ctx.fillStyle = it.c;
                ctx.beginPath();
                ctx.moveTo(0, -it.r);
                ctx.lineTo(it.r, 0);
                ctx.lineTo(0, it.r);
                ctx.lineTo(-it.r, 0);
                ctx.closePath();
                ctx.fill();
                // 闪光
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.moveTo(-it.r * 0.4, -it.r * 0.3);
                ctx.lineTo(-it.r * 0.2, -it.r * 0.5);
                ctx.lineTo(0, -it.r * 0.3);
                ctx.closePath();
                ctx.fill();
            } else if (it.type === 'bomb') {
                // 炸弹主体
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(0, 0, it.r, 0, Math.PI * 2);
                ctx.fill();
                // 高光
                let bg = ctx.createRadialGradient(-it.r * 0.3, -it.r * 0.3, 0, 0, 0, it.r);
                bg.addColorStop(0, 'rgba(255,255,255,0.15)');
                bg.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = bg;
                ctx.fill();
                // 引线
                ctx.strokeStyle = '#f80';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, -it.r);
                ctx.quadraticCurveTo(4, -it.r - 4, 2, -it.r - 6);
                ctx.stroke();
                // 火花
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.arc(2, -it.r - 6, 2, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // 金矿和石头（圆形）
                ctx.fillStyle = it.c;
                ctx.beginPath();
                ctx.arc(0, 0, it.r, 0, Math.PI * 2);
                ctx.fill();
                // 高光效果
                let g = ctx.createRadialGradient(-it.r * 0.3, -it.r * 0.3, 0, 0, 0, it.r);
                g.addColorStop(0, 'rgba(255,255,255,0.4)');
                g.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = g;
                ctx.fill();
            }

            ctx.restore();
        }

        // 绘制爆炸效果
        function drawExplosion(e) {
            let p = e.t / 25;
            let r = 20 + p * 70;
            ctx.save();
            ctx.globalAlpha = 1 - p;
            let g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r);
            g.addColorStop(0, 'rgba(255,220,50,0.9)');
            g.addColorStop(0.25, 'rgba(255,120,0,0.7)');
            g.addColorStop(0.5, 'rgba(255,50,0,0.4)');
            g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
            ctx.fill();

            // 碎片粒子
            for (let i = 0; i < 12; i++) {
                let a = (i / 12) * Math.PI * 2;
                let d = p * 90;
                ctx.fillStyle = `rgba(255,${120 + Math.floor(Math.random() * 135)},0,${1 - p})`;
                ctx.beginPath();
                ctx.arc(e.x + Math.cos(a) * d, e.y + Math.sin(a) * d, 2 + p * 4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        // 检查胜利条件
        function checkWin() {
            for (let p of players) {
                if (p.score >= WIN) {
                    running = false;
                    showVictory(p.label);
                    return;
                }
            }
        }

        // 开始游戏
        function startGame(m) {
            mode = m;
            running = true;
            document.getElementById('homeScreen').style.display = 'none';

            players = [];
            if (m === 'single') {
                players.push(new Player('A', W / 2, '玩家A'));
                showScore('A', true);
                showScore('B', false);
            } else {
                players.push(new Player('A', W * 0.25, '玩家A'));
                players.push(new Player('B', W * 0.75, '玩家B'));
                showScore('A', true);
                showScore('B', true);
            }
            document.getElementById('targetDisplay').style.display = 'block';

            generateItems();
            explosions = [];
            loop();
        }

        function showScore(id, show) {
            let el = document.getElementById('score' + id);
            el.style.display = show ? 'block' : 'none';
            el.textContent = id === 'A' ? '玩家A: 0' : '玩家B: 0';
        }

        function update() {
            for (let p of players) p.update();
            // 小猪移动
            for (let it of items) {
                if (it.vx) {
                    it.x += it.vx;
                    if (it.x < it.r + 25 || it.x > W - it.r - 25) it.vx *= -1;
                }
            }
            // 爆炸动画
            for (let i = explosions.length - 1; i >= 0; i--) {
                explosions[i].t++;
                if (explosions[i].t > 25) explosions.splice(i, 1);
            }
            // 更新分数显示
            for (let p of players) {
                let el = document.getElementById('score' + p.id);
                if (el) el.textContent = p.label + ': ' + p.score;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // 天空渐变
            let sg = ctx.createLinearGradient(0, 0, 0, SURFACE);
            sg.addColorStop(0, '#6eb5ff');
            sg.addColorStop(1, '#a8d8ff');
            ctx.fillStyle = sg;
            ctx.fillRect(0, 0, W, SURFACE);

            // 云朵
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.beginPath();
            ctx.arc(100, 25, 20, 0, Math.PI * 2);
            ctx.arc(130, 20, 25, 0, Math.PI * 2);
            ctx.arc(160, 28, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(550, 30, 22, 0, Math.PI * 2);
            ctx.arc(580, 25, 28, 0, Math.PI * 2);
            ctx.arc(615, 32, 20, 0, Math.PI * 2);
            ctx.fill();

            // 地下渐变
            let gg = ctx.createLinearGradient(0, SURFACE, 0, H);
            gg.addColorStop(0, '#8B5A2B');
            gg.addColorStop(0.08, '#6B4423');
            gg.addColorStop(0.4, '#5a3a1f');
            gg.addColorStop(1, '#3d2a15');
            ctx.fillStyle = gg;
            ctx.fillRect(0, SURFACE, W, H - SURFACE);

            // 地表草地
            ctx.fillStyle = '#4a7c2e';
            ctx.fillRect(0, SURFACE - 4, W, 8);

            // 绘制所有物品
            for (let it of items) drawItem(it);

            // 绘制玩家钩子
            for (let p of players) {
                p.draw();
                // 绘制矿工小人
                let facing = p.angle > 0 ? 1 : -1;
                drawMiner(p.px, p.py, facing);
            }

            // 绘制爆炸效果
            for (let e of explosions) drawExplosion(e);
        }

        function loop() {
            if (!running) return;
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // 胜利彩蛋
        function showVictory(winner) {
            let overlay = document.createElement('div');
            overlay.id = 'victoryOverlay';
            overlay.style.cssText = 'position:absolute;top:0;left:0;width:800px;height:600px;' +
                'background:rgba(0,0,0,0.75);display:flex;flex-direction:column;' +
                'justify-content:center;align-items:center;z-index:200;border-radius:10px;';

            let textDiv = document.createElement('div');
            textDiv.innerHTML =
                '<h1 style="font-size:52px;color:#ffd700;' +
                'text-shadow:0 0 30px #ff6600,0 0 60px #ff3300;margin-bottom:10px;">' + winner + ' 胜利！</h1>' +
                '<p style="font-size:22px;color:#eee;margin-bottom:30px;">恭喜达到 800 分！成为最富有的矿工！</p>' +
                '<button onclick="location.reload()" style="padding:12px 50px;font-size:20px;' +
                'border:none;border-radius:25px;background:linear-gradient(135deg,#ffd700,#ff9500);' +
                'color:#333;font-weight:bold;cursor:pointer;box-shadow:0 5px 20px rgba(255,215,0,0.4);' +
                'transition:transform 0.2s;" onmouseover="this.style.transform=\'scale(1.05)\'"' +
                ' onmouseout="this.style.transform=\'scale(1)\'">再来一局</button>';
            overlay.appendChild(textDiv);
            document.getElementById('gameContainer').appendChild(overlay);

            // 五彩纸屑动画
            let conf = [];
            for (let i = 0; i < 150; i++) {
                conf.push({
                    x: Math.random() * W,
                    y: Math.random() * H - H,
                    c: 'hsl(' + (Math.random() * 360) + ',100%,60%)',
                    s: 4 + Math.random() * 8,
                    v: 2 + Math.random() * 4,
                    r: Math.random() * 360,
                    rs: (Math.random() - 0.5) * 12
                });
            }

            (function cfAnim() {
                if (!document.getElementById('victoryOverlay')) return;
                draw();
                ctx.save();
                for (let c of conf) {
                    c.y += c.v;
                    c.r += c.rs;
                    if (c.y > H + 20) { c.y = -10; c.x = Math.random() * W; }
                    ctx.save();
                    ctx.translate(c.x, c.y);
                    ctx.rotate(c.r * Math.PI / 180);
                    ctx.fillStyle = c.c;
                    ctx.fillRect(-c.s / 2, -c.s / 2, c.s, c.s);
                    ctx.restore();
                }
                ctx.restore();
                requestAnimationFrame(cfAnim);
            })();
        }

        // 键盘事件
        document.addEventListener('keydown', function(e) {
            if (!running) return;
            for (let p of players) {
                if (p.state === 'swing') {
                    if ((p.id === 'A' && (e.key === 's' || e.key === 'S')) ||
                        (p.id === 'B' && e.key === 'ArrowDown')) {
                        p.state = 'extend';
                        e.preventDefault();
                    }
                }
            }
        });
    })();
    </script>
</body>
</html>
