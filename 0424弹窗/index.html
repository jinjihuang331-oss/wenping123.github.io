<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弹窗组件 Demo</title>
  <link rel="stylesheet" href="modal.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f8fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    button.trigger {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      background: #1677ff;
      color: #fff;
      transition: background 0.2s;
    }
    button.trigger:hover { background: #4096ff; }
  </style>
</head>
<body>

  <button class="trigger" id="btn-basic">基础弹窗</button>
  <button class="trigger" id="btn-confirm">确认弹窗</button>
  <button class="trigger" id="btn-nomask">禁止遮罩关闭</button>

  <script src="modal.js"></script>
  <script>
    // 1. 基础弹窗
    document.getElementById('btn-basic').addEventListener('click', () => {
      new Modal({
        title: '提示',
        content: '这是一个基础的弹窗组件，支持淡入淡出动画和移动端适配。',
      }).open();
    });

    // 2. 确认弹窗（带回调）
    document.getElementById('btn-confirm').addEventListener('click', () => {
      const m = new Modal({
        title: '确认操作',
        content: '你确定要执行此操作吗？',
        confirmText: '确认',
        cancelText: '取消',
        onConfirm() {
          console.log('用户点击了确认');
          m.close();
        },
        onCancel() {
          console.log('用户点击了取消');
          m.close();
        },
      });
      m.open();
    });

    // 3. 禁止遮罩关闭
    document.getElementById('btn-nomask').addEventListener('click', () => {
      new Modal({
        title: '重要提示',
        content: '此弹窗只能通过按钮或右上角关闭按钮关闭，点击遮罩无效。',
        maskClosable: false,
      }).open();
    });
  </script>
</body>
</html>
