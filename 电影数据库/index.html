<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电影数据库 - TMDB</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="#home" class="nav-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="20" height="20" rx="2.18"></rect>
          <line x1="7" y1="2" x2="7" y2="22"></line>
          <line x1="17" y1="2" x2="17" y2="22"></line>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <line x1="2" y1="7" x2="7" y2="7"></line>
          <line x1="2" y1="17" x2="7" y2="17"></line>
          <line x1="17" y1="17" x2="22" y2="17"></line>
          <line x1="17" y1="7" x2="22" y2="7"></line>
        </svg>
        <span>电影数据库</span>
      </a>

      <div class="nav-search">
        <input type="text" id="searchInput" placeholder="搜索电影..." autocomplete="off">
        <button id="searchBtn" aria-label="搜索">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>

      <div class="nav-actions">
        <a href="#watchlist" class="nav-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
          <span class="watchlist-count" id="watchlistCount">0</span>
          观影列表
        </a>
        <button id="themeToggle" class="theme-toggle" aria-label="切换深色/浅色模式">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- API 配置界面 -->
  <section id="apiConfigSection" class="api-config hidden">
    <div class="api-config-content">
      <div class="api-config-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
      </div>
      <h2>需要 API 密钥</h2>
      <p>要使用此应用，您需要提供 TMDB API 密钥。</p>
      <div class="api-config-form">
        <input type="text" id="apiKeyInput" placeholder="输入您的 TMDB API 密钥" maxlength="32">
        <button id="saveApiKeyBtn">保存 API 密钥</button>
      </div>
      <p class="api-config-help">
        还没有 API 密钥？
        <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">
          在 TMDB 上获取免费 API 密钥
        </a>
      </p>
    </div>
  </section>

  <!-- 主页 -->
  <main id="homeSection" class="main-content">
    <!-- Hero 区域 -->
    <section id="heroSection" class="hero">
      <div class="hero-backdrop">
        <div class="hero-gradient"></div>
      </div>
      <div class="hero-content">
        <span class="hero-badge">精选推荐</span>
        <h1 class="hero-title" id="heroTitle">加载中...</h1>
        <p class="hero-overview" id="heroOverview">正在获取电影信息...</p>
        <div class="hero-actions">
          <a href="#" class="btn btn-primary" id="heroDetailBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
            查看详情
          </a>
          <button class="btn btn-secondary" id="heroWatchlistBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            加入观影列表
          </button>
        </div>
      </div>
    </section>

    <!-- 电影分类区域 -->
    <section class="movie-section">
      <div class="section-header">
        <h2>热门电影</h2>
        <a href="#popular" class="view-all">查看全部</a>
      </div>
      <div class="movie-grid" id="popularGrid">
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
      </div>
    </section>

    <section class="movie-section">
      <div class="section-header">
        <h2>评分最高</h2>
        <a href="#toprated" class="view-all">查看全部</a>
      </div>
      <div class="movie-grid" id="topRatedGrid">
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
      </div>
    </section>

    <section class="movie-section">
      <div class="section-header">
        <h2>即将上映</h2>
        <a href="#upcoming" class="view-all">查看全部</a>
      </div>
      <div class="movie-grid" id="upcomingGrid">
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
        <div class="loading-skeleton"></div>
      </div>
    </section>
  </main>

  <!-- 电影详情页 -->
  <section id="movieDetailSection" class="movie-detail hidden">
    <div class="detail-backdrop">
      <div class="detail-gradient"></div>
    </div>
    <div class="detail-content">
      <button class="back-btn" id="detailBackBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        返回
      </button>
      <div class="detail-poster">
        <img id="detailPosterImg" src="" alt="电影海报">
      </div>
      <div class="detail-info">
        <h1 id="detailTitle"></h1>
        <div class="detail-meta">
          <span class="rating" id="detailRating"></span>
          <span class="year" id="detailYear"></span>
          <span class="runtime" id="detailRuntime"></span>
          <span class="genres" id="detailGenres"></span>
        </div>
        <p class="detail-tagline" id="detailTagline"></p>
        <p class="detail-overview" id="detailOverview"></p>
        <div class="detail-actions">
          <button class="btn btn-primary" id="detailWatchlistBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            <span id="detailWatchlistText">加入观影列表</span>
          </button>
          <button class="btn btn-secondary" id="detailTrailerBtn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            观看预告片
          </button>
        </div>
      </div>
    </div>

    <!-- 演员表 -->
    <div class="detail-section">
      <h3>主要演员</h3>
      <div class="cast-grid" id="castGrid"></div>
    </div>

    <!-- 预告片 -->
    <div class="detail-section" id="trailerSection">
      <h3>预告片</h3>
      <div class="trailer-container" id="trailerContainer"></div>
    </div>
  </section>

  <!-- 搜索结果页 -->
  <section id="searchSection" class="search-results hidden">
    <div class="search-header">
      <h2>搜索结果: <span id="searchQuery"></span></h2>
      <button class="back-btn" id="searchBackBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        返回首页
      </button>
    </div>
    <div class="movie-grid" id="searchGrid"></div>
    <div class="loading-spinner" id="searchLoading">
      <div class="spinner"></div>
    </div>
  </section>

  <!-- 观影列表页 -->
  <section id="watchlistSection" class="watchlist-page hidden">
    <div class="watchlist-header">
      <h2>我的观影列表</h2>
      <button class="back-btn" id="watchlistBackBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        返回首页
      </button>
    </div>
    <div id="watchlistEmpty" class="empty-state hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
      <p>您的观影列表为空</p>
      <a href="#home" class="btn btn-primary">浏览电影</a>
    </div>
    <div class="movie-grid" id="watchlistGrid"></div>

    <!-- 推荐电影 -->
    <div id="recommendationsSection" class="recommendations-section hidden">
      <div class="section-header">
        <h2>为您推荐</h2>
        <p class="recommendations-desc">基于您观影列表中的电影类型</p>
      </div>
      <div class="movie-grid" id="recommendationsGrid"></div>
    </div>
  </section>

  <!-- 加载指示器 -->
  <div class="loading-indicator" id="loadingIndicator">
    <div class="spinner"></div>
  </div>

  <!-- 通知提示 -->
  <div class="notification" id="notification">
    <span class="notification-text"></span>
  </div>

  <!-- 预告片模态框 -->
  <div class="modal" id="trailerModal">
    <div class="modal-content">
      <button class="modal-close" id="modalCloseBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- 无限滚动触发器 -->
  <div id="infiniteScrollTrigger"></div>

  <!-- JavaScript 模块 -->
  <script src="js/config.js"></script>
  <script src="js/cache.js"></script>
  <script src="js/api.js"></script>
  <script src="js/watchlist.js"></script>
  <script src="js/recommendations.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/search.js"></script>
  <script src="js/scroll.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
