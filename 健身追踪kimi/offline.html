<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线模式 - 健身追踪仪表盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .offline-container {
            text-align: center;
            padding: 40px;
            max-width: 400px;
        }

        .offline-icon {
            font-size: 80px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .features {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .features h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .features ul {
            list-style: none;
            text-align: left;
        }

        .features li {
            padding: 8px 0;
            padding-left: 30px;
            position: relative;
        }

        .features li::before {
            content: '✓';
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        .btn {
            background: white;
            color: #4CAF50;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        .spinner.show {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📴</div>
        <h1>您当前处于离线状态</h1>
        <p>别担心！健身追踪仪表盘支持离线使用，您的数据会安全保存在本地。</p>

        <div class="features">
            <h2>离线功能可用</h2>
            <ul>
                <li>查看历史锻炼记录</li>
                <li>记录新的锻炼</li>
                <li>查看进展图表</li>
                <li>追踪健身目标</li>
                <li>使用计步器</li>
            </ul>
        </div>

        <div class="spinner" id="spinner"></div>

        <button class="btn" onclick="retryConnection()">
            🔄 重新连接
        </button>

        <p style="margin-top: 20px; font-size: 0.85rem; opacity: 0.7;">
            或 <a href="index.html" style="color: white;">返回应用</a>
        </p>
    </div>

    <script>
        function retryConnection() {
            const spinner = document.getElementById('spinner');
            spinner.classList.add('show');

            // Try to reload
            setTimeout(() => {
                fetch(window.location.href, { method: 'HEAD' })
                    .then(() => {
                        window.location.href = 'index.html';
                    })
                    .catch(() => {
                        spinner.classList.remove('show');
                        alert('仍然无法连接网络，请稍后重试');
                    });
            }, 1000);
        }

        // Auto-redirect if online
        window.addEventListener('online', () => {
            window.location.href = 'index.html';
        });

        // Check if actually offline
        if (navigator.onLine) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
