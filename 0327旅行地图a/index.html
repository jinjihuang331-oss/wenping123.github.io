<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>旅行地图 - 交互式旅行地图</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5TRR9Q2TlE="
        crossorigin="anonymous">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>🗺️ 旅行地图</h1>
      <p>点击地图添加景点 · 规划路线</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="add">添加景点</button>
      <button class="tab-btn" data-tab="list">景点列表</button>
      <button class="tab-btn" data-tab="route">路线规划</button>
    </div>

    <div class="tab-content">
      <!-- Tab: Add Marker -->
      <div class="tab-panel active" id="tab-add">
        <form id="add-form">
          <div class="form-group">
            <label>景点名称 *</label>
            <input type="text" name="name" placeholder="如：故宫博物院" required>
          </div>

          <div class="form-group">
            <label>景点描述</label>
            <textarea name="description" placeholder="简单描述这个景点..." rows="2"></textarea>
          </div>

          <div class="form-group">
            <label>景点分类</label>
            <select name="emoji">
              <option value="🏛️">🏛️ 历史古迹</option>
              <option value="🏔️">🏔️ 自然风光</option>
              <option value="🏖️">🏖️ 海滩度假</option>
              <option value="🍜">🍜 美食餐饮</option>
              <option value="🎭">🎭 文化艺术</option>
              <option value="🏨">🏨 住宿酒店</option>
              <option value="✈️">✈️ 交通枢纽</option>
              <option value="📷">📷 摄影点</option>
              <option value="🎡">🎡 游乐场所</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            ➕ 添加到地图
          </button>
        </form>

        <p style="font-size:11px;color:#bbb;margin-top:12px;text-align:center;">
          💡 也可以直接点击地图任意位置添加景点
        </p>
      </div>

      <!-- Tab: Marker List -->
      <div class="tab-panel" id="tab-list">
        <div id="marker-list">
          <div class="empty-state">
            <div class="icon">🗺️</div>
            <p>还没有景点</p>
            <p style="margin-top:4px;">点击地图或使用表单添加</p>
          </div>
        </div>

        <div class="btn-group" style="margin-top:16px;">
          <button id="clear-all" class="btn btn-danger" style="flex:1;">清空全部</button>
        </div>
      </div>
    </div>

    <!-- Tab: Route -->
    <div class="tab-panel" id="tab-route">
      <div id="route-summary" class="route-summary">
        <p style="font-size:13px;color:#999;">添加至少 2 个景点以查看路线</p>
      </div>

      <div id="route-list" class="route-list"></div>

      <div class="btn-group" style="margin-top:12px;">
        <button id="show-route" class="btn btn-primary" style="flex:1;">📍 在地图上显示路线</button>
      </div>

      <!-- Export/Import -->
      <div class="export-section">
        <h3>📤 导入 / 导出</h3>
        <div class="btn-group">
          <button id="export-data" class="btn btn-secondary" style="flex:1;">导出 JSON</button>
          <label class="btn btn-secondary" style="flex:1;text-align:center;">
            导入 JSON
            <input type="file" id="import-file" accept=".json" hidden>
          </label>
        </div>
      </div>
    </div>
  </aside>

  <!-- Sidebar Toggle -->
  <button class="sidebar-toggle" onclick="window.TravelMap._toggleSidebar()">☰</button>

  <!-- Map -->
  <div id="map"></div>
</div>

<!-- PWA Install Banner -->
<div id="pwa-banner" class="pwa-banner" onclick="window.TravelMap.installPWA()">
  📱 安装到桌面，离线使用
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+N+QqYnE8r8wH5sM="
        crossorigin="anonymous"></script>

<!-- App JS -->
<script src="app.js"></script>

</body>
</html>
