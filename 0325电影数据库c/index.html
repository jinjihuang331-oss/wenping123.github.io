<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineVault - 电影数据库</title>
<style>
/* ===== CSS Variables & Theming ===== */
:root {
  --bg-primary: #f5f7fa;
  --bg-secondary: #ffffff;
  --bg-card: #ffffff;
  --bg-header: rgba(255,255,255,0.95);
  --text-primary: #1a1a2e;
  --text-secondary: #555;
  --text-muted: #888;
  --border-color: #e0e0e0;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-hover: 0 6px 24px rgba(0,0,0,0.12);
  --accent: #6c5ce7;
  --accent-light: #a29bfe;
  --accent-dark: #5a4bd1;
  --gradient: linear-gradient(135deg, #6c5ce7, #a29bfe);
  --danger: #e74c3c;
  --success: #2ecc71;
  --star: #f39c12;
  --overlay: rgba(0,0,0,0.6);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.3s ease;
}

[data-theme="dark"] {
  --bg-primary: #0a0a1a;
  --bg-secondary: #141428;
  --bg-card: #1a1a3e;
  --bg-header: rgba(10,10,26,0.95);
  --text-primary: #e8e8f0;
  --text-secondary: #a0a0c0;
  --text-muted: #6a6a8a;
  --border-color: #2a2a4a;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --shadow-hover: 0 6px 24px rgba(0,0,0,0.5);
  --overlay: rgba(0,0,0,0.8);
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  transition: background var(--transition), color var(--transition);
  min-height: 100vh;
  overflow-x: hidden;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--accent-light); border-radius: 4px; }

/* ===== Header ===== */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg-header);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-color);
  transition: background var(--transition), border-color var(--transition);
}

.header-inner {
  max-width: 1400px; margin: 0 auto;
  padding: 12px 24px;
  display: flex; align-items: center; gap: 20px;
}

.logo {
  font-size: 1.5rem; font-weight: 800;
  background: var(--gradient); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  cursor: pointer; white-space: nowrap;
  letter-spacing: -0.5px;
}

.search-box {
  flex: 1; max-width: 500px; position: relative;
}

.search-box input {
  width: 100%; padding: 10px 16px 10px 42px;
  border: 2px solid var(--border-color);
  border-radius: 50px; background: var(--bg-secondary);
  color: var(--text-primary); font-size: 0.95rem;
  transition: all var(--transition); outline: none;
}

.search-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(108,92,231,0.15);
}

.search-box .search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 1.1rem; pointer-events: none;
}

.header-actions { display: flex; align-items: center; gap: 12px; }

.icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-primary); font-size: 1.3rem;
  padding: 8px; border-radius: 50%;
  transition: all var(--transition);
  display: flex; align-items: center; gap: 6px;
  position: relative;
}

.icon-btn:hover { background: var(--border-color); }

.watchlist-badge {
  position: absolute; top: 2px; right: 2px;
  background: var(--danger); color: #fff;
  font-size: 0.65rem; font-weight: 700;
  min-width: 16px; height: 16px;
  border-radius: 8px; display: flex;
  align-items: center; justify-content: center;
}

.theme-toggle {
  width: 48px; height: 26px; border-radius: 13px;
  background: var(--border-color); border: none;
  cursor: pointer; position: relative;
  transition: background var(--transition);
}

.theme-toggle::after {
  content: ''; position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  border-radius: 50%; background: var(--accent);
  transition: transform var(--transition);
}

[data-theme="dark"] .theme-toggle::after {
  transform: translateX(22px);
}

/* ===== Main Content ===== */
.main { max-width: 1400px; margin: 0 auto; padding: 80px 24px 40px; }

/* ===== Section ===== */
.section { margin-bottom: 48px; }

.section-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.section-title {
  font-size: 1.5rem; font-weight: 700;
  position: relative; padding-left: 16px;
}

.section-title::before {
  content: ''; position: absolute; left: 0;
  top: 4px; bottom: 4px; width: 4px;
  background: var(--gradient); border-radius: 2px;
}

.section-toggle {
  font-size: 0.85rem; color: var(--accent);
  cursor: pointer; background: none; border: none;
  font-weight: 600;
}

.section-toggle:hover { text-decoration: underline; }

/* ===== Movie Grid ===== */
.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
  gap: 20px;
}

.movie-card {
  background: var(--bg-card); border-radius: var(--radius);
  overflow: hidden; cursor: pointer;
  box-shadow: var(--shadow);
  transition: all var(--transition);
  position: relative;
}

.movie-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
}

.movie-card-poster {
  width: 100%; aspect-ratio: 2/3;
  object-fit: cover; display: block;
  background: var(--border-color);
}

.movie-card-no-poster {
  width: 100%; aspect-ratio: 2/3;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-secondary); color: var(--text-muted);
  font-size: 3rem;
}

.movie-card-info { padding: 12px; }

.movie-card-title {
  font-size: 0.9rem; font-weight: 600;
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; margin-bottom: 4px;
}

.movie-card-meta {
  display: flex; align-items: center;
  gap: 8px; font-size: 0.8rem;
  color: var(--text-muted);
}

.movie-card-rating {
  display: flex; align-items: center; gap: 3px;
  color: var(--star); font-weight: 600;
}

.movie-card-watchlist-btn {
  position: absolute; top: 8px; right: 8px;
  background: rgba(0,0,0,0.6); border: none;
  color: #fff; width: 32px; height: 32px;
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; backdrop-filter: blur(4px);
  transition: all var(--transition); opacity: 0;
}

.movie-card:hover .movie-card-watchlist-btn { opacity: 1; }
.movie-card-watchlist-btn:hover { background: var(--accent); }
.movie-card-watchlist-btn.in-list { opacity: 1; color: var(--star); }

/* ===== Movie Detail Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; background: var(--overlay);
  z-index: 200; display: none; align-items: flex-start;
  justify-content: center; overflow-y: auto;
  padding: 60px 20px;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--bg-secondary); border-radius: var(--radius);
  max-width: 900px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  position: relative; overflow: hidden;
}

.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: rgba(0,0,0,0.5); border: none;
  color: #fff; width: 36px; height: 36px;
  border-radius: 50%; cursor: pointer;
  font-size: 1.2rem; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}

.modal-close:hover { background: var(--danger); }

.detail-backdrop {
  width: 100%; height: 300px;
  object-fit: cover; display: block;
}

.detail-backdrop-placeholder {
  width: 100%; height: 300px;
  background: var(--gradient);
  display: flex; align-items: center; justify-content: center;
  font-size: 4rem; color: rgba(255,255,255,0.5);
}

.detail-body { padding: 28px; }

.detail-top { display: flex; gap: 24px; margin-bottom: 24px; }

.detail-poster {
  width: 180px; min-width: 180px; border-radius: var(--radius-sm);
  overflow: hidden; box-shadow: var(--shadow);
}

.detail-poster img { width: 100%; display: block; }

.detail-info { flex: 1; }

.detail-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }

.detail-meta {
  display: flex; flex-wrap: wrap; gap: 12px;
  font-size: 0.9rem; color: var(--text-muted);
  margin-bottom: 16px; align-items: center;
}

.detail-rating {
  display: flex; align-items: center; gap: 4px;
  color: var(--star); font-weight: 700; font-size: 1rem;
}

.detail-genres { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }

.genre-tag {
  padding: 4px 12px; border-radius: 50px;
  background: rgba(108,92,231,0.12);
  color: var(--accent); font-size: 0.8rem; font-weight: 600;
}

.detail-overview { line-height: 1.7; color: var(--text-secondary); margin-bottom: 20px; }

.detail-actions { display: flex; gap: 12px; }

.btn {
  padding: 10px 20px; border-radius: 50px;
  border: none; cursor: pointer;
  font-weight: 600; font-size: 0.9rem;
  display: flex; align-items: center; gap: 6px;
  transition: all var(--transition);
}

.btn-primary {
  background: var(--gradient); color: #fff;
}

.btn-primary:hover { transform: scale(1.03); }

.btn-outline {
  background: transparent;
  border: 2px solid var(--accent);
  color: var(--accent);
}

.btn-outline:hover { background: var(--accent); color: #fff; }

.btn-outline.in-list {
  background: var(--accent); color: #fff;
}

/* ===== Tabs ===== */
.tabs {
  display: flex; border-bottom: 2px solid var(--border-color);
  margin-bottom: 20px; gap: 0;
}

.tab-btn {
  padding: 10px 20px; background: none; border: none;
  color: var(--text-muted); cursor: pointer;
  font-weight: 600; font-size: 0.9rem;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all var(--transition);
}

.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn:hover { color: var(--accent); }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ===== Cast Grid ===== */
.cast-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 16px;
}

.cast-card { text-align: center; }

.cast-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  object-fit: cover; margin: 0 auto 8px;
  background: var(--border-color); display: block;
}

.cast-name {
  font-size: 0.8rem; font-weight: 600;
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis;
}

.cast-character {
  font-size: 0.75rem; color: var(--text-muted);
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis;
}

/* ===== Video Embed ===== */
.video-container {
  position: relative; padding-bottom: 56.25%;
  height: 0; overflow: hidden;
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
}

.video-container iframe {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; border: none;
}

/* ===== Watchlist ===== */
.watchlist-page { display: none; }
.watchlist-page.active { display: block; }
.home-page.hidden { display: none; }

.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state-icon { font-size: 4rem; margin-bottom: 16px; }
.empty-state-text { font-size: 1.1rem; }

/* ===== Recommendation ===== */
.rec-section { margin-top: 40px; }

.rec-section .section-title { font-size: 1.3rem; }

/* ===== Loading & Infinite Scroll ===== */
.loading-spinner {
  text-align: center; padding: 24px;
  color: var(--text-muted); font-size: 0.9rem;
}

.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border-color);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 8px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.sentinel { height: 1px; }

/* ===== API Key Modal ===== */
.api-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  z-index: 300; display: flex; align-items: center;
  justify-content: center; padding: 20px;
}

.api-modal {
  background: var(--bg-secondary); border-radius: var(--radius);
  padding: 36px; max-width: 480px; width: 100%; text-align: center;
}

.api-modal h2 { margin-bottom: 8px; font-size: 1.4rem; }
.api-modal p { color: var(--text-secondary); margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }

.api-modal input {
  width: 100%; padding: 12px 16px;
  border: 2px solid var(--border-color);
  border-radius: var(--radius-sm);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 0.95rem; margin-bottom: 16px;
  outline: none; transition: border var(--transition);
}

.api-modal input:focus { border-color: var(--accent); }

.api-modal .btn { width: 100%; justify-content: center; }

.api-link { color: var(--accent); font-size: 0.85rem; }

/* ===== Search Results ===== */
.search-results-info {
  font-size: 1.1rem; color: var(--text-secondary);
  margin-bottom: 20px;
}

.search-results-info strong { color: var(--text-primary); }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .header-inner { padding: 10px 16px; gap: 12px; }
  .logo { font-size: 1.2rem; }
  .search-box { max-width: none; }
  .main { padding: 72px 16px 30px; }
  .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .detail-top { flex-direction: column; align-items: center; text-align: center; }
  .detail-poster { width: 140px; min-width: 140px; }
  .detail-genres { justify-content: center; }
  .detail-meta { justify-content: center; }
  .detail-actions { justify-content: center; }
  .cast-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
}

/* ===== Back Button ===== */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: none; color: var(--accent);
  cursor: pointer; font-size: 0.9rem; font-weight: 600;
  margin-bottom: 16px; padding: 4px 0;
}

.back-btn:hover { text-decoration: underline; }

/* ===== Year filter in section ===== */
.section-year {
  font-size: 0.8rem; color: var(--text-muted);
  margin-left: 8px;
}

/* ===== Fade In Animation ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in { animation: fadeInUp 0.4s ease forwards; }
</style>
</head>
<body>

<!-- API Key Modal -->
<div class="api-modal-overlay" id="apiModal">
  <div class="api-modal">
    <h2>🎬 CineVault</h2>
    <p>欢迎使用电影数据库应用。请输入你的 TMDB API 密钥以开始浏览电影。<br>你可以在 <a href="https://www.themoviedb.org/settings/api" target="_blank" class="api-link">themoviedb.org</a> 免费注册获取。</p>
    <input type="text" id="apiKeyInput" placeholder="请输入 TMDB API Key (v3 auth)">
    <button class="btn btn-primary" onclick="saveApiKey()">开始探索</button>
  </div>
</div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo" onclick="showHome()">CineVault</div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索电影..." oninput="handleSearch(this.value)">
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleWatchlistPage()" title="我的观影列表">
        🎬
        <span class="watchlist-badge" id="watchlistBadge" style="display:none">0</span>
      </button>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换深色模式"></button>
    </div>
  </div>
</header>

<!-- Main Content -->
<main class="main">
  <!-- Home Page -->
  <div class="home-page" id="homePage">
    <div id="searchResults" style="display:none"></div>
    <div id="sectionsContainer"></div>
  </div>

  <!-- Watchlist Page -->
  <div class="watchlist-page" id="watchlistPage">
    <button class="back-btn" onclick="showHome()">← 返回首页</button>
    <div class="section">
      <div class="section-header">
        <h2 class="section-title">我的观影列表</h2>
        <button class="section-toggle" onclick="clearWatchlist()" id="clearWlBtn" style="display:none">清空列表</button>
      </div>
      <div id="watchlistGrid" class="movie-grid"></div>
      <div id="watchlistEmpty" class="empty-state" style="display:none">
        <div class="empty-state-icon">🎬</div>
        <div class="empty-state-text">你的观影列表还是空的<br>浏览电影并点击 ♡ 添加吧</div>
      </div>
    </div>
    <div class="rec-section" id="recSection" style="display:none">
      <div class="section-header">
        <h2 class="section-title">为你推荐</h2>
        <button class="section-toggle" onclick="refreshRecommendations()">🔄 换一批</button>
      </div>
      <div id="recGrid" class="movie-grid"></div>
    </div>
  </div>
</main>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" id="detailContent"></div>
</div>

<script>
// ===== Config & State =====
const TMDB_BASE = 'https://api.themoviedb.org/3';
const IMG_BASE = 'https://image.tmdb.org/t/p';
let API_KEY = localStorage.getItem('tmdb_api_key') || '';
let watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');
let cache = new Map();
let cacheTimestamps = new Map();
const CACHE_TTL = 10 * 60 * 1000; // 10 min
let searchTimeout = null;
let currentView = 'home';
let infiniteScrollObserver = null;
let currentInfiniteTarget = null;
let genreMap = {};
let pendingInfinite = {};

// ===== API Cache =====
function getCached(key) {
  if (cache.has(key)) {
    const ts = cacheTimestamps.get(key);
    if (Date.now() - ts < CACHE_TTL) return cache.get(key);
    cache.delete(key);
    cacheTimestamps.delete(key);
  }
  return null;
}

function setCache(key, data) {
  cache.set(key, data);
  cacheTimestamps.set(key, Date.now());
}

async function tmdbFetch(endpoint, params = {}) {
  const url = new URL(`${TMDB_BASE}${endpoint}`);
  url.searchParams.set('api_key', API_KEY);
  url.searchParams.set('language', 'zh-CN');
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const cacheKey = url.toString();
  const cached = getCached(cacheKey);
  if (cached) return cached;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`API Error: ${res.status}`);
  const data = await res.json();
  setCache(cacheKey, data);
  return data;
}

// ===== Genre Map =====
async function loadGenres() {
  try {
    const data = await tmdbFetch('/genre/movie/list');
    data.genres.forEach(g => genreMap[g.id] = g.name);
  } catch (e) { console.error('Failed to load genres:', e); }
}

// ===== API Key =====
function saveApiKey() {
  const input = document.getElementById('apiKeyInput');
  const key = input.value.trim();
  if (!key) return;
  API_KEY = key;
  localStorage.setItem('tmdb_api_key', key);
  document.getElementById('apiModal').style.display = 'none';
  initApp();
}

function checkApiKey() {
  if (!API_KEY) {
    document.getElementById('apiModal').style.display = 'flex';
    return false;
  }
  document.getElementById('apiModal').style.display = 'none';
  return true;
}

// ===== Theme =====
function initTheme() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// ===== Search with Debounce =====
let searchAbort = null;

function handleSearch(query) {
  clearTimeout(searchTimeout);
  if (searchAbort) { searchAbort.abort(); searchAbort = null; }

  if (!query.trim()) {
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('sectionsContainer').style.display = 'block';
    return;
  }

  searchTimeout = setTimeout(async () => {
    await performSearch(query.trim());
  }, 400);
}

async function performSearch(query) {
  const container = document.getElementById('searchResults');
  container.style.display = 'block';
  container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div>搜索中...</div>';
  document.getElementById('sectionsContainer').style.display = 'none';

  try {
    const data = await tmdbFetch('/search/movie', { query, page: 1 });
    container.innerHTML = `
      <div class="search-results-info">搜索 "<strong>${escapeHtml(query)}</strong>" 找到 ${data.total_results} 个结果</div>
      <div class="movie-grid" id="searchGrid"></div>
    `;
    const grid = document.getElementById('searchGrid');
    grid.innerHTML = data.results.map(m => createMovieCard(m)).join('');

    if (data.total_pages > 1) {
      setupInfiniteScroll('searchGrid', '/search/movie', { query }, data.total_pages, 1);
    }
  } catch (e) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">😕</div><div class="empty-state-text">搜索出错，请重试</div></div>';
  }
}

// ===== Movie Card HTML =====
function createMovieCard(movie) {
  const inList = watchlist.some(m => m.id === movie.id);
  const poster = movie.poster_path
    ? `<img class="movie-card-poster" src="${IMG_BASE}/w500${movie.poster_path}" alt="${escapeHtml(movie.title)}" loading="lazy">`
    : `<div class="movie-card-no-poster">🎬</div>`;
  const rating = movie.vote_average ? movie.vote_average.toFixed(1) : '—';
  const year = movie.release_date ? movie.release_date.substring(0, 4) : '';
  return `
    <div class="movie-card fade-in" onclick="showDetail(${movie.id})">
      ${poster}
      <button class="movie-card-watchlist-btn ${inList ? 'in-list' : ''}"
              onclick="event.stopPropagation(); toggleWatchlistItem(${movie.id}, '${escapeHtml(movie.title)}', '${movie.poster_path || ''}')"
              title="${inList ? '从列表移除' : '添加到列表'}">
        ${inList ? '❤️' : '🤍'}
      </button>
      <div class="movie-card-info">
        <div class="movie-card-title" title="${escapeHtml(movie.title)}">${escapeHtml(movie.title)}</div>
        <div class="movie-card-meta">
          <span class="movie-card-rating">⭐ ${rating}</span>
          <span>${year}</span>
        </div>
      </div>
    </div>
  `;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== Home Sections =====
async function loadHomeSections() {
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div>加载中...</div>';

  try {
    const [trending, topRated, upcoming] = await Promise.all([
      tmdbFetch('/trending/movie/week'),
      tmdbFetch('/movie/top_rated', { page: 1 }),
      tmdbFetch('/movie/upcoming', { page: 1 })
    ]);

    container.innerHTML = '';

    renderSection(container, '🔥 热门电影', trending.results, 'trending', '/trending/movie/week', trending.total_pages);
    renderSection(container, '⭐ 评分最高', topRated.results, 'top_rated', '/movie/top_rated', topRated.total_pages);
    renderSection(container, '🎬 即将上映', upcoming.results, 'upcoming', '/movie/upcoming', upcoming.total_pages);
  } catch (e) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">😕</div><div class="empty-state-text">加载失败，请检查 API Key 是否正确</div></div>';
    console.error(e);
  }
}

function renderSection(container, title, movies, id, endpoint, totalPages) {
  const section = document.createElement('div');
  section.className = 'section';
  section.innerHTML = `
    <div class="section-header">
      <h2 class="section-title">${title}</h2>
      <button class="section-toggle" id="toggle-${id}" onclick="toggleSectionGrid('${id}')">展开全部 ▼</button>
    </div>
    <div class="movie-grid" id="grid-${id}">
      ${movies.map(m => createMovieCard(m)).join('')}
    </div>
  `;
  container.appendChild(section);

  // Store data for infinite scroll
  pendingInfinite[id] = { endpoint, params: { page: 2 }, totalPages, currentPage: 1, expanded: false };
}

function toggleSectionGrid(id) {
  const info = pendingInfinite[id];
  if (!info) return;

  if (!info.expanded) {
    info.expanded = true;
    info.params = info.endpoint === '/trending/movie/week' ? {} : {};
    setupInfiniteScroll(`grid-${id}`, info.endpoint, {}, info.totalPages, info.currentPage);
    const btn = document.getElementById(`toggle-${id}`);
    if (btn) btn.textContent = '收起 ▲';
  } else {
    // Collapse: remove infinite scroll, keep only first set
    info.expanded = false;
    if (infiniteScrollObserver && currentInfiniteTarget) {
      infiniteScrollObserver.unobserve(currentInfiniteTarget);
    }
    const grid = document.getElementById(`grid-${id}`);
    // Keep only first items (the ones that were originally rendered)
    const cards = grid.querySelectorAll('.movie-card');
    cards.forEach((card, i) => { if (i >= 20) card.remove(); });
    const sentinel = grid.querySelector('.sentinel');
    if (sentinel) sentinel.remove();
    const btn = document.getElementById(`toggle-${id}`);
    if (btn) btn.textContent = '展开全部 ▼';
  }
}

// ===== Infinite Scroll =====
function setupInfiniteScroll(gridId, endpoint, baseParams, totalPages, startPage) {
  if (infiniteScrollObserver && currentInfiniteTarget) {
    infiniteScrollObserver.unobserve(currentInfiniteTarget);
  }

  let currentPage = startPage;
  let loading = false;

  const grid = document.getElementById(gridId);
  if (!grid) return;

  // Remove existing sentinel
  const oldSentinel = grid.querySelector('.sentinel');
  if (oldSentinel) oldSentinel.remove();

  const sentinel = document.createElement('div');
  sentinel.className = 'sentinel';
  grid.appendChild(sentinel);

  infiniteScrollObserver = new IntersectionObserver(async (entries) => {
    if (entries[0].isIntersecting && !loading && currentPage < totalPages) {
      loading = true;
      currentPage++;
      const spinner = document.createElement('div');
      spinner.className = 'loading-spinner';
      spinner.innerHTML = '<div class="spinner"></div>加载更多...';
      grid.insertBefore(spinner, sentinel);

      try {
        const data = await tmdbFetch(endpoint, { ...baseParams, page: currentPage });
        spinner.remove();
        data.results.forEach(m => {
          const div = document.createElement('div');
          div.outerHTML = createMovieCard(m);
          grid.insertBefore(div, sentinel);
        });
        // Re-render by using innerHTML approach
        const fragment = document.createElement('div');
        data.results.forEach(m => fragment.innerHTML += createMovieCard(m));
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = fragment.innerHTML;
        while (tempDiv.firstChild) {
          grid.insertBefore(tempDiv.firstChild, sentinel);
        }
      } catch (e) {
        spinner.remove();
        console.error('Infinite scroll error:', e);
      }
      loading = false;
    }
  }, { rootMargin: '200px' });

  infiniteScrollObserver.observe(sentinel);
  currentInfiniteTarget = sentinel;
}

// ===== Movie Detail =====
async function showDetail(movieId) {
  const modal = document.getElementById('detailModal');
  const content = document.getElementById('detailContent');
  content.innerHTML = '<div class="loading-spinner" style="padding:60px"><div class="spinner"></div>加载中...</div>';
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';

  try {
    const [movie, credits, videos] = await Promise.all([
      tmdbFetch(`/movie/${movieId}`),
      tmdbFetch(`/movie/${movieId}/credits`),
      tmdbFetch(`/movie/${movieId}/videos`)
    ]);

    const inList = watchlist.some(m => m.id === movie.id);
    const backdrop = movie.backdrop_path
      ? `<img class="detail-backdrop" src="${IMG_BASE}/w1280${movie.backdrop_path}" alt="">`
      : `<div class="detail-backdrop-placeholder">🎬</div>`;
    const poster = movie.poster_path
      ? `<img src="${IMG_BASE}/w500${movie.poster_path}" alt="${escapeHtml(movie.title)}">`
      : `<div class="movie-card-no-poster" style="aspect-ratio:2/3;border-radius:8px">🎬</div>`;
    const rating = movie.vote_average ? movie.vote_average.toFixed(1) : '—';
    const year = movie.release_date ? movie.release_date.substring(0, 4) : '';
    const runtime = movie.runtime ? `${Math.floor(movie.runtime / 60)}h ${movie.runtime % 60}m` : '';
    const genres = movie.genres ? movie.genres.map(g => `<span class="genre-tag">${escapeHtml(g.name)}</span>`).join('') : '';
    const trailer = videos.results ? videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube') : null;
    const director = credits.crew ? credits.crew.find(c => c.job === 'Director') : null;
    const cast = credits.cast ? credits.cast.slice(0, 18) : [];

    content.innerHTML = `
      <button class="modal-close" onclick="closeDetail()">✕</button>
      ${backdrop}
      <div class="detail-body">
        <div class="detail-top">
          <div class="detail-poster">${poster}</div>
          <div class="detail-info">
            <h1 class="detail-title">${escapeHtml(movie.title)}</h1>
            ${movie.tagline ? `<p style="color:var(--text-muted);font-style:italic;margin-bottom:12px">${escapeHtml(movie.tagline)}</p>` : ''}
            <div class="detail-meta">
              <span class="detail-rating">⭐ ${rating}</span>
              <span>${year}</span>
              ${runtime ? `<span>⏱ ${runtime}</span>` : ''}
              ${director ? `<span>🎬 ${escapeHtml(director.name)}</span>` : ''}
            </div>
            <div class="detail-genres">${genres}</div>
            <p class="detail-overview">${escapeHtml(movie.overview) || '暂无简介'}</p>
            <div class="detail-actions">
              <button class="btn ${inList ? 'btn-outline in-list' : 'btn-primary'}" onclick="toggleWatchlistItem(${movie.id}, '${escapeHtml(movie.title)}', '${movie.poster_path || ''}'); refreshDetailBtn(${movie.id})">
                ${inList ? '❤️ 已在列表中' : '🤍 加入观影列表'}
              </button>
            </div>
          </div>
        </div>

        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab(this, 'tab-trailer-${movieId}')">🎬 预告片</button>
          <button class="tab-btn" onclick="switchTab(this, 'tab-cast-${movieId}')">🎭 演员</button>
          <button class="tab-btn" onclick="switchTab(this, 'tab-crew-${movieId}')">📋 剧组</button>
        </div>

        <div class="tab-content active" id="tab-trailer-${movieId}">
          ${trailer
            ? `<div class="video-container"><iframe src="https://www.youtube.com/embed/${trailer.key}" allowfullscreen></iframe></div>`
            : '<div class="empty-state"><div class="empty-state-text">暂无预告片</div></div>'}
        </div>

        <div class="tab-content" id="tab-cast-${movieId}">
          <div class="cast-grid">
            ${cast.map(c => `
              <div class="cast-card">
                ${c.profile_path
                  ? `<img class="cast-avatar" src="${IMG_BASE}/w185${c.profile_path}" alt="${escapeHtml(c.name)}" loading="lazy">`
                  : `<div class="cast-avatar" style="background:var(--border-color);display:flex;align-items:center;justify-content:center">👤</div>`}
                <div class="cast-name">${escapeHtml(c.name)}</div>
                <div class="cast-character">${escapeHtml(c.character)}</div>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="tab-content" id="tab-crew-${movieId}">
          <div class="cast-grid">
            ${(credits.crew || []).slice(0, 18).map(c => `
              <div class="cast-card">
                ${c.profile_path
                  ? `<img class="cast-avatar" src="${IMG_BASE}/w185${c.profile_path}" alt="${escapeHtml(c.name)}" loading="lazy">`
                  : `<div class="cast-avatar" style="background:var(--border-color);display:flex;align-items:center;justify-content:center">👤</div>`}
                <div class="cast-name">${escapeHtml(c.name)}</div>
                <div class="cast-character">${escapeHtml(c.job)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  } catch (e) {
    content.innerHTML = '<div class="empty-state" style="padding:60px"><div class="empty-state-icon">😕</div><div class="empty-state-text">加载失败</div></div>';
    console.error(e);
  }
}

function refreshDetailBtn(movieId) {
  // Refresh the button state in the detail modal - handled by re-reading watchlist
}

function switchTab(btn, tabId) {
  const parent = btn.parentElement;
  parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const modal = document.getElementById('detailContent');
  modal.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('active');
  document.body.style.overflow = '';
}

// ===== Watchlist =====
function toggleWatchlistItem(id, title, posterPath) {
  const idx = watchlist.findIndex(m => m.id === id);
  if (idx > -1) {
    watchlist.splice(idx, 1);
  } else {
    // Fetch movie details to get genres
    tmdbFetch(`/movie/${id}`).then(movie => {
      watchlist.push({
        id: movie.id,
        title: movie.title || title,
        poster_path: movie.poster_path || posterPath,
        genre_ids: movie.genres ? movie.genres.map(g => g.id) : [],
        vote_average: movie.vote_average,
        release_date: movie.release_date
      });
      saveWatchlist();
      updateWatchlistBadge();
      refreshAllCards();
    });
    return;
  }
  saveWatchlist();
  updateWatchlistBadge();
  refreshAllCards();
}

function saveWatchlist() {
  localStorage.setItem('watchlist', JSON.stringify(watchlist));
}

function updateWatchlistBadge() {
  const badge = document.getElementById('watchlistBadge');
  if (watchlist.length > 0) {
    badge.style.display = 'flex';
    badge.textContent = watchlist.length;
  } else {
    badge.style.display = 'none';
  }
}

function refreshAllCards() {
  // Refresh any visible movie cards' watchlist status
  document.querySelectorAll('.movie-card-watchlist-btn').forEach(btn => {
    // Cards are refreshed on next render anyway
  });
}

function toggleWatchlistPage() {
  if (currentView === 'watchlist') {
    showHome();
  } else {
    showWatchlist();
  }
}

function showHome() {
  currentView = 'home';
  document.getElementById('homePage').classList.remove('hidden');
  document.getElementById('watchlistPage').classList.remove('active');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('sectionsContainer').style.display = 'block';
}

function showWatchlist() {
  currentView = 'watchlist';
  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('watchlistPage').classList.add('active');
  renderWatchlist();
  loadRecommendations();
}

function renderWatchlist() {
  const grid = document.getElementById('watchlistGrid');
  const empty = document.getElementById('watchlistEmpty');
  const clearBtn = document.getElementById('clearWlBtn');

  if (watchlist.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    clearBtn.style.display = 'none';
  } else {
    empty.style.display = 'none';
    clearBtn.style.display = 'inline';
    // Build full movie objects for cards
    const movies = watchlist.map(m => ({
      ...m,
      vote_average: m.vote_average || 0,
      release_date: m.release_date || ''
    }));
    grid.innerHTML = movies.map(m => createMovieCard(m)).join('');
  }
}

function clearWatchlist() {
  if (confirm('确定要清空观影列表吗？')) {
    watchlist = [];
    saveWatchlist();
    updateWatchlistBadge();
    renderWatchlist();
    document.getElementById('recSection').style.display = 'none';
  }
}

// ===== Recommendation Engine =====
async function loadRecommendations() {
  const recSection = document.getElementById('recSection');
  const recGrid = document.getElementById('recGrid');

  if (watchlist.length === 0) {
    recSection.style.display = 'none';
    return;
  }

  // Collect all genres from watchlist
  const genreCount = {};
  watchlist.forEach(m => {
    (m.genre_ids || []).forEach(gid => {
      genreCount[gid] = (genreCount[gid] || 0) + 1;
    });
  });

  // Sort by frequency
  const topGenres = Object.entries(genreCount)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3)
    .map(([gid]) => gid);

  if (topGenres.length === 0) {
    recSection.style.display = 'none';
    return;
  }

  recSection.style.display = 'block';
  recGrid.innerHTML = '<div class="loading-spinner"><div class="spinner"></div>生成推荐中...</div>';

  try {
    // Fetch movies for each top genre and combine
    const watchlistIds = new Set(watchlist.map(m => m.id));
    const genrePromises = topGenres.map(gid =>
      tmdbFetch('/discover/movie', {
        with_genres: gid,
        sort_by: 'vote_average.desc',
        'vote_count.gte': 100,
        page: Math.floor(Math.random() * 3) + 1
      })
    );

    const results = await Promise.all(genrePromises);
    let allMovies = results.flatMap(r => r.results);

    // Deduplicate, remove already in watchlist, and shuffle
    const seen = new Set();
    const filtered = allMovies.filter(m => {
      if (seen.has(m.id) || watchlistIds.has(m.id)) return false;
      seen.add(m.id);
      return true;
    });

    // Shuffle
    for (let i = filtered.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
    }

    const recommendations = filtered.slice(0, 12);
    recGrid.innerHTML = recommendations.length > 0
      ? recommendations.map(m => createMovieCard(m)).join('')
      : '<div class="empty-state"><div class="empty-state-text">暂无推荐</div></div>';
  } catch (e) {
    recGrid.innerHTML = '<div class="empty-state"><div class="empty-state-text">推荐加载失败</div></div>';
    console.error(e);
  }
}

function refreshRecommendations() {
  loadRecommendations();
}

// ===== Init =====
async function initApp() {
  await loadGenres();
  loadHomeSections();
  updateWatchlistBadge();
}

initTheme();
if (checkApiKey()) {
  initApp();
}
