<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月度消费统计</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f8f9fb;
    --card: #ffffff;
    --text: #2c3e50;
    --muted: #8e99a4;
    --border: #e8ecf1;
    --primary: #5b8def;
    --primary-light: rgba(91, 141, 239, 0.15);
    --accent: #43c6ac;
    --accent-light: rgba(67, 198, 172, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 48px 24px 64px;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    color: var(--text);
  }

  .subtitle {
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 40px;
  }

  .charts {
    max-width: 960px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 28px 24px 20px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    transition: box-shadow 0.3s ease;
  }

  .card:hover {
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
  }

  .card-title {
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--text);
  }

  .card canvas {
    width: 100% !important;
  }

  /* 响应式：小屏幕纵向排列 */
  @media (max-width: 720px) {
    .charts { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>月度消费统计</h1>
<p class="subtitle">2026 年 4 月 &middot; 模拟数据</p>

<div class="charts">
  <div class="card">
    <div class="card-title">每日消费趋势</div>
    <canvas id="dailyChart"></canvas>
  </div>
  <div class="card">
    <div class="card-title">品类消费占比</div>
    <canvas id="categoryChart"></canvas>
  </div>
</div>

<script>
/* ========== 模拟数据 ========== */
const days = Array.from({ length: 30 }, (_, i) => `${i + 1} 日`);
const daily = [
  42, 18, 67, 0, 135, 89, 53,
  28, 210, 15, 0, 76, 44, 99,
  168, 7, 55, 0, 123, 88, 34,
  201, 62, 0, 145, 27, 78, 93,
  115, 48
];

const categories = ['餐饮', '交通', '购物', '娱乐', "生活缴费", "医疗", "其他"];
const categoryValues = [2680, 890, 1540, 720, 430, 280, 540];

/* ========== 通用样式配置 ========== */
const tooltipStyle = {
  backgroundColor: 'rgba(44, 62, 80, 0.92)',
  titleFont: { size: 13, weight: '600' },
  bodyFont: { size: 13 },
  padding: 12,
  cornerRadius: 8,
  displayColors: true,
  boxPadding: 4,
};

const gridColor = 'rgba(0, 0, 0, 0.05)';

/* ========== 每日消费折线图 ========== */
const dailyCtx = document.getElementById('dailyChart').getContext('2d');

// 渐变填充
const gradient = dailyCtx.createLinearGradient(0, 0, 0, 320);
gradient.addColorStop(0, 'rgba(91, 141, 239, 0.22)');
gradient.addColorStop(1, 'rgba(91, 141, 239, 0.01)');

new Chart(dailyCtx, {
  type: 'line',
  data: {
    labels: days,
    datasets: [{
      label: '消费金额（元）',
      data: daily,
      borderColor: '#5b8def',
      backgroundColor: gradient,
      borderWidth: 2.5,
      pointRadius: 0,
      pointHoverRadius: 6,
      pointHoverBackgroundColor: '#5b8def',
      pointHoverBorderColor: '#fff',
      pointHoverBorderWidth: 2.5,
      fill: true,
      tension: 0.35,
    }],
  },
  options: {
    responsive: true,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        ...tooltipStyle,
        callbacks: {
          title: (items) => `4 月 ${items[0].label}`,
          label: (item) => `消费：¥${item.raw}`,
        },
      },
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { color: '#8e99a4', font: { size: 11 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 10 },
        border: { display: false },
      },
      y: {
        grid: { color: gridColor },
        ticks: { color: '#8e99a4', font: { size: 11 }, callback: (v) => `¥${v}` },
        border: { display: false },
        beginAtZero: true,
      },
    },
  },
});

/* ========== 品类占比柱状图 ========== */
const barColors = [
  '#5b8def', '#43c6ac', '#f7b731', '#fc6e51', '#a78bfa', '#f472b6', '#94a3b8',
];

new Chart(document.getElementById('categoryChart'), {
  type: 'bar',
  data: {
    labels: categories,
    datasets: [{
      label: '消费金额（元）',
      data: categoryValues,
      backgroundColor: barColors.map(c => c + 'cc'),
      hoverBackgroundColor: barColors,
      borderRadius: 6,
      borderSkipped: false,
      barPercentage: 0.55,
    }],
  },
  options: {
    responsive: true,
    indexAxis: 'y',
    plugins: {
      legend: { display: false },
      tooltip: {
        ...tooltipStyle,
        callbacks: {
          label: (item) => `消费：¥${item.raw}`,
        },
      },
    },
    scales: {
      x: {
        grid: { color: gridColor },
        ticks: { color: '#8e99a4', font: { size: 11 }, callback: (v) => `¥${v}` },
        border: { display: false },
        beginAtZero: true,
      },
      y: {
        grid: { display: false },
        ticks: { color: '#2c3e50', font: { size: 12, weight: '500' } },
        border: { display: false },
      },
    },
  },
});
</script>

</body>
</html>
