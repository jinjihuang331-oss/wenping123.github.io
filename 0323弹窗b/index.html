<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弹窗组件</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 页面触发按钮 */
    .open-btn {
      display: inline-block;
      padding: 12px 32px;
      background: #1890ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(24, 144, 255, 0.35);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .open-btn:hover {
      background: #40a9ff;
      box-shadow: 0 4px 12px rgba(24, 144, 255, 0.5);
    }
    .open-btn:active {
      background: #096dd9;
    }

    /* 弹窗遮罩 */
    .modal-mask {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .modal-mask.show {
      opacity: 1;
      visibility: visible;
    }

    /* 弹窗主体 */
    .modal-wrapper {
      position: relative;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
      padding: 24px;
      width: 90vw;
      max-width: 440px;
      max-height: 80vh;
      overflow-y: auto;
      transform: scale(0.92) translateY(12px);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }
    .modal-mask.show .modal-wrapper {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    /* 关闭按钮 */
    .modal-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #bbb;
      line-height: 1;
      padding: 2px 6px;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-close:hover {
      color: #555;
    }

    /* 头部 */
    .modal-header {
      margin-bottom: 16px;
      padding-right: 24px;
    }
    .modal-header h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }

    /* 内容 */
    .modal-body {
      color: #555;
      font-size: 15px;
      line-height: 1.7;
    }
    .modal-body p {
      margin: 0;
    }

    /* 底部按钮 */
    .modal-footer {
      margin-top: 24px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .modal-footer button {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }
    .btn-cancel {
      background: #e8e8e8;
      color: #333;
    }
    .btn-cancel:hover {
      background: #d9d9d9;
    }
    .btn-confirm {
      background: #1890ff;
      color: #fff;
    }
    .btn-confirm:hover {
      background: #40a9ff;
    }

    /* 移动端适配 */
    @media (max-width: 480px) {
      .modal-wrapper {
        width: 92vw;
        max-width: 92vw;
        border-radius: 10px;
        padding: 20px 18px;
      }
      .modal-footer {
        flex-direction: column;
      }
      .modal-footer button {
        width: 100%;
        padding: 10px 0;
      }
    }
  </style>
</head>
<body>

  <button class="open-btn" onclick="openModal()">打开弹窗</button>

  <div class="modal-mask" id="modalMask" onclick="closeOnMask(event)">
    <div class="modal-wrapper">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div class="modal-header">
        <h3>标题</h3>
      </div>
      <div class="modal-body">
        <p>这是弹窗内容区域，支持自定义内容。</p>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-confirm" onclick="onConfirm()">确定</button>
      </div>
    </div>
  </div>

  <script>
    var mask = document.getElementById('modalMask')

    function openModal() {
      mask.classList.add('show')
      document.body.style.overflow = 'hidden'
    }

    function closeModal() {
      mask.classList.remove('show')
      document.body.style.overflow = ''
    }

    function closeOnMask(e) {
      if (e.target === mask) {
        closeModal()
      }
    }

    function onConfirm() {
      closeModal()
    }

    // ESC 关闭
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal()
    })
  </script>

</body>
</html>
