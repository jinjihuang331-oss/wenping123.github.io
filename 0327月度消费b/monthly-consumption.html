<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月度消费统计</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f7f8fa;
    color: #2c3e50;
    padding: 32px 24px;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    font-size: 24px;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 32px;
    letter-spacing: 2px;
  }
  .charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    background: #ffffff;
    border-radius: 12px;
    padding: 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .card h2 {
    font-size: 16px;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 20px;
    text-align: center;
  }
  .chart-wrap { position: relative; width: 100%; height: 340px; }
  @media (max-width: 768px) {
    .charts { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>2026 年 3 月消费统计</h1>

<div class="charts">
  <div class="card">
    <h2>每日消费趋势</h2>
    <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
  </div>
  <div class="card">
    <h2>品类消费占比</h2>
    <div class="chart-wrap"><canvas id="barChart"></canvas></div>
  </div>
</div>

<script>
// ── 配色方案 ──
const PALETTE = {
  primary:   '#6c5ce7',
  secondary: '#a29bfe',
  accent:    '#fd79a8',
  line:      '#74b9ff',
  barColors: [
    '#6c5ce7','#a29bfe','#74b9ff','#fd79a8',
    '#55efc4','#ffeaa7','#fab1a0','#81ecec'
  ]
};

// ── 模拟数据：每日消费 ──
const days = Array.from({length: 27}, (_, i) => `${i + 1}日`);
const dailySpending = [
  128,  45,  210,  0,   88,  350,  520,
  67,   189,  95,  0,   310, 78,  145,
  230,  0,   56,  420,  180, 92,  0,
  275,  160,  38,  500,  110, 85
];

// ── 模拟数据：品类消费 ──
const categories = ['餐饮', '交通', '购物', '娱乐', '日用', '医疗', '学习', '其他'];
const categorySpending = [1850, 680, 2340, 920, 560, 320, 480, 390];

// ── 图表通用 Tooltip 配置 ──
const tooltipConfig = {
  backgroundColor: 'rgba(26, 26, 46, 0.88)',
  titleFont: { size: 13, weight: '600' },
  bodyFont: { size: 14, weight: '500' },
  padding: 12,
  cornerRadius: 8,
  displayColors: false,
  callbacks: {
    label: ctx => `¥${ctx.parsed.y?.toFixed(0) || ctx.parsed.toFixed(0)}`
  }
};

// ── 1. 每日消费折线图 ──
new Chart(document.getElementById('lineChart'), {
  type: 'line',
  data: {
    labels: days,
    datasets: [{
      label: '消费金额 (元)',
      data: dailySpending,
      borderColor: PALETTE.line,
      backgroundColor: 'rgba(116, 185, 255, 0.12)',
      borderWidth: 2.5,
      fill: true,
      tension: 0.35,
      pointRadius: 3,
      pointHoverRadius: 7,
      pointBackgroundColor: '#ffffff',
      pointBorderColor: PALETTE.line,
      pointBorderWidth: 2,
      pointHoverBackgroundColor: PALETTE.line,
      pointHoverBorderColor: '#fff',
      pointHoverBorderWidth: 2.5
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: tooltipConfig
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { font: { size: 11 }, color: '#999', maxRotation: 45 }
      },
      y: {
        beginAtZero: true,
        grid: { color: 'rgba(0,0,0,0.05)' },
        ticks: {
          font: { size: 11 }, color: '#999',
          callback: v => '¥' + v
        }
      }
    }
  }
});

// ── 2. 品类占比柱状图 ──
new Chart(document.getElementById('barChart'), {
  type: 'bar',
  data: {
    labels: categories,
    datasets: [{
      label: '消费金额 (元)',
      data: categorySpending,
      backgroundColor: PALETTE.barColors,
      borderRadius: 6,
      borderSkipped: false,
      hoverBackgroundColor: PALETTE.barColors.map(c => c + 'dd')
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        ...tooltipConfig,
        callbacks: {
          label: ctx => `¥${ctx.parsed.y}（占比 ${((ctx.parsed.y / categorySpending.reduce((a,b)=>a+b,0)) * 100).toFixed(1)}%）`
        }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { font: { size: 12 }, color: '#666' }
      },
      y: {
        beginAtZero: true,
        grid: { color: 'rgba(0,0,0,0.05)' },
        ticks: {
          font: { size: 11 }, color: '#999',
          callback: v => '¥' + v
        }
      }
    }
  }
});
</script>

</body>
</html>
